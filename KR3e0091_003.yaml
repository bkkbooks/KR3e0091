body:
  text: 尚論篇卷三新建喻昌撰尚論少陽經證治大意仲景少陽經之原文叔和大半編入太陽經中昌殊不得其解豈以太陽行身之背少陽行身之側其營衛顯然易辨非如陽明與三陰之屬腑臟者營衛難窺故將少陽之文彚入太陽耶此等處竊不敢仍叔和之舊蓋六經各有專司乃引少陽之文與三陽合病併病過經不解及壞病諸條悉入太陽篇中適足以亂太陽之正也在太陽一經之病已倍他經辨之倍難而無端蔓引混収此後人所爲多岐亡羊乎茲將治少陽之法悉歸本篇其合病併病壞病痰病另𨽻于三陽經後庻太陽之脉清而少陽之脉亦清耳少陽證用小柴胡湯和解加減一法一傷寒五六日中風徃來寒熱胸脇苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脇下痞鞕或心下悸小便不利或不渴身有微熱或欬者小柴胡湯主之傷寒中風有柴胡證但見一證便是不必悉具若胸中煩而不嘔去半夏人參加栝蔞實若渴者去半夏加人參栝蔞根若腹中痛去黃芩加芍藥若脇下痞鞕去大棗加牡蠣若心下悸小便不利者去黃芩加茯苓若不渴外有微熱者去人參加桂枝溫覆取微似汗愈若欬者去人參大棗生薑加五味子乾薑原文軀殻之表陽也軀殻之裏陰也少陽主半表半裏之間其邪入而併於陰則寒出而併於陽則熱徃來寒熱無常期也風寒之外邪挾身中有形之痰飲結聚于少陽之本位所以胸脇苦滿也胸脇旣滿胃中之水榖亦不消所以默默不欲食卽昏昏之意非靜默也心煩者邪在胸脇逼處心間也或嘔不嘔或渴不渴諸多見證各隨人之氣體不盡同也然總以小柴胡之和法爲主治而各隨見證以加減之耳少陽病有辨證一法二少陽之爲病口苦咽亁目眩也原文口苦咽乾者熱聚於膽也目眩者木盛生風而旋暈也少陽病有汗吐下三禁二法三傷寒脉弦細頭痛發熱者屬少陽少陽不可發汗發汗則讝語此屬胃胃和則愈胃不和則煩而悸原文少陽傷寒禁發汗少陽中風禁吐下二義互舉其㫖益嚴蓋傷寒之頭痛發熱宜於發汗者尚不可汗則傷風之不可汗更不待言矣傷風之胸滿而煩痰飲上逆似可吐下者尚不可吐下則傷寒之不可吐下更不待言矣脉弦細者邪欲入裏其在胃之津液必爲熱耗重復發汗而驅其津液外出安得不讝語乎胃和者邪㪚而津囘也不和者津枯而飲結所以煩而悸也四少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚原文風熱上壅則耳無聞目赤無形風熱與有質痰飲摶結則胸滿而煩此但從和解中行分利法可也若誤汗下則胸中正氣大傷而邪得以逼亂神明此時卽爲城下之盟所喪不滋多乎辨少陽經病有欲解不解四法五傷寒三日三陽爲盡三陰當受邪其人反能食不嘔此爲三陰不受邪也原文能食不嘔與胃和則愈之義互發六傷寒三日少陽脉小者欲已也原文脉不弦大邪微欲解之先徵也七少陽病欲解時從寅至辰上原文受病之經正氣虛衰每藉力於時令之王此趨三避五所繇來乎八傷寒六七日無大熱其人燥煩者此爲陽去入陰故也原文陽去入陰則邪勢得以留連轉致危困者多矣有治傷寒之責者線索在手於邪在陽經之日亟從外奪不亦善乎少陽證具將欲入裏而太陽陽明小有未罷但用小柴胡湯一法九傷寒四五日身熱惡風頭項強脇下滿手足溫而渴者小柴胡湯主之原文身熱惡風太陽證也頭項强太陽兼陽明證也脇下滿少陽證也本當從三陽合併病之例而用表法但其手足溫而加渴外邪輻凑於少陽而向裏之機已著倘更用辛甘發㪚之法是重增其熱而大耗其津也故從小柴胡之和法則陽邪自罷而陰津不傷一舉而兩得矣此用小柴胡湯當從加減法不嘔而渴者去半夏加栝蔞根爲是少陽證脉弦濇加腹痛先用建中後用小柴胡一法十傷寒陽脉澀陰脉弦法當腹中急痛者先用小建中湯不差者與小柴胡湯主之原文陽脉濇陰脉弦渾似在裏之陰寒所以法當腹中急痛故以小建中之緩而和其急腹痛止而脉不弦澀矣若不差則弦爲少陽之本脉而澀乃汗出不徹腹痛乃邪欲傳太陰也則用小柴胡以和陰陽爲的當無疑矣少陽證具已經汗下而太陽未罷胸有微結者宜用柴胡桂枝亁薑湯一法十一傷寒五六日已發汗而復下之胸脇滿微結小便不利渴而不嘔但頭汗出徃來寒熱心煩者此爲未解也柴胡桂枝亁薑湯主之原文少陽證尚兼太陽所以悞下而胸間微結也太陽中篇結胸條内頭微汗出用大陷胸湯以其熱結在裏故從下奪之法也此頭汗出而胸微結用柴胡桂枝亁薑湯以裏證未具故從和解之法也小柴胡方中減半夏人參而加桂枝以行太陽加乾薑以㪚滿栝蔞根以滋乾牡蠣以軟結一一皆從本例也少陽證服小柴胡湯加渴者宜救津液一法十二服柴胡湯已渴者屬陽明也以法治之原文風寒之邪從陽明而轉少陽起先不渴裏證未具及服小柴胡湯已重加口渴則邪還陽明而當調胃以存津液矣然不曰攻下而曰以法治之意味無窮蓋少陽之寒熱徃來間有渴證倘少陽未罷而恣言攻下不自犯少陽之禁乎故見少陽重轉陽明之證但云以法治之其法維何卽發汗利小便已胃中燥煩實大便難之說也若未利其小便則有猪苓五苓之法若津乾熱熾又有人參白虎之法仲景圓機活潑人存政舉未易言矣少陽證具悞下而證尚未變者仍用小柴胡湯二法十三凢柴胡湯病證而下之若柴胡證不罷者復與柴胡湯必蒸蒸而振却發熱汗出而解原文十四傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不爲逆必蒸蒸而振却發熱汗出而解若心下滿而鞕痛者此爲結胸也大陷胸湯主之但滿而不痛者此爲痞柴胡湯不中與之宜半夏瀉心湯原文二條互發前畧後詳悞下雖證未變然正氣先虛故服柴胡湯必蒸蒸而振始得發熱汗出而邪從表解也若悞下而成結胸與痞則邪尚在太陽而柴胡非所宜矣結胸及痞太陽經各有専條重以汗下爲逆不爲逆申上文而廣其義十五本發汗而復下之此爲逆也若先發汗治不爲逆本先下之而反汗之此爲逆也若先下之治不爲逆也原文少陽雖有汗下二禁然而當汗當下正自不同本當發汗而反下之則爲逆若先汗後下則不爲逆本當下之而反發汗則爲逆若先下後汗則不爲逆全在辨其表裏差多差少之間矣少陽病有疑似少陰者當細辨脉證用藥一法十六傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便鞕脉細者此爲陽微結必有表復有裏也脉沉亦在裏也汗出爲陽微假令純陰結不得復有外證悉入在裏此爲半在裏半在外也脉雖沉𦂳不得爲少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解陽微結者陽邪微結未盡㪚也註作陽氣衰微故邪氣結聚大差果爾則頭汗出爲亡陽之證非半表半裏之證矣果爾則陰結又是陰氣衰微矣玩本文假令純陰結等語謂陽邪若不微結純是陰邪内結則不得復有外證其義甚明得屎而解卽取大柴胡爲和法之意也用汗吐下後有辨脉證而識其必愈一法十七凢病若發汗若吐若下若亡津液陰陽自和者必自愈原文汗吐下三法難於恰當若悞用之則病未去而胃中之津液已先亡凢見此者診視其脉與證陰陽自和則津液復生必自愈也辨婦人傷寒傳少陽有熱入血室之證四法十八婦人中風發熱惡寒經水適來得之七八日熱除而脉遲身凉胸脇下滿如結胸狀讝語者此爲熱入血室也當刺期門隨其實而瀉之原文十九婦人中風七八日續得寒熱發作有時經水適㫁者此爲熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之原文二十婦人傷寒發熱經水適來晝日明了暮則讝語如見鬼狀者此爲熱入血室無犯胃氣及上二焦必自愈原文二十一血弱氣盡腠理開邪氣因入與正氣相搏結於脇下正邪分爭徃來寒熱休作有時默默不欲飲食臟腑相連其痛必下邪高痛下故使嘔也小柴胡湯主之原文四條皆互文見意也一云經水適來一云經水適㫁一云七八日熱除而脉遲身凉一云七八日續得寒熱發作有時一云胸脇下滿一云邪氣因入與正氣相搏結於脇下一云如結胸狀一云邪高痛下一云讝語一云晝日明了暮則讝語如見鬼狀一云如瘧狀一云徃來寒熱休作有時一云刺期門一云用小柴胡湯一云毋犯胃氣及上二焦皆互文以明大義而自爲註脚也學者試因此而紬繹全書思過半矣又如結胸狀四字仲景尚恐形容不盡重以臟腑相連邪高痛下之語暢發病情蓋血室者衝脉也下居腹内厥陰肝之所主也而少陽之膽與肝相連腑邪在上臟邪在下胃口逼處二邪之界所以默默不欲飲食而但喜嘔耳期門者肝之募也隨其實而瀉之瀉肝之實也又刺期門之註脚也小柴胡湯治少陽之正法也毋犯胃氣及上二焦則舍期門小柴胡更無他法矣必自愈見腑邪可用小柴胡湯而臟邪必俟經水再行其邪熱乃隨血去又非藥之所能勝耳少陽止此重編合病併病壞病痰病附三陽經後其過經不解附三陰經後右症叔和俱編入太陽經中不知何意或謂傷寒只分六經舍太陽一經别無可入諸項也然則霍亂證及陰陽易等證曷不盡入太陽耶况乎旣重六經則少陽亦六經之一曷爲不重耶茲一一淸出以六經等六國以合併諸病等附庸俾業傷寒者一展玩而了然於心目耳合病合病者兩經之證各見一半如日月之合朔如王者之合圭璧界限中分不偏多偏少之謂也一太陽病項背强几几反汗出惡風者桂枝加葛根湯主之原文二太陽病項背强几几無汗惡風者葛根湯主之原文二條以有汗無汗定傷風傷寒之别蓋太陽初交陽明未至兩經各半故仲景原文不用合病二字然雖不名合病其實乃合病之初證也几几者頸不舒也頸屬陽明旣於太陽風傷衛證中纔見陽明一證卽於桂枝湯内加葛根一藥太陽寒傷營證中纔見陽明一證即於麻黃湯内加葛根一藥此大匠天然不易之彀率也然第二條不用麻黃全方加葛根反用桂枝全方加麻黃葛根者則并其巧而傳之矣見寒邪旣欲傳於陽明則胸間之喘必自止自可不用杏仁况頸項背俱是陽位易於得汗之處設以麻黃本湯加葛根大發其汗將毋項背强几几者變爲經脉振搖動惕乎此仲景之所爲精義入神也桂枝湯麻黃湯分主太陽之表葛根湯總主陽明之表小柴胡湯總主少陽之表三陽經合併受病即隨表邪見證多寡定方絲絲入扣三太陽與陽明合病不下利但嘔者葛根加半夏湯主之原文四太陽與陽明合病者必自下利葛根湯主之原文二條又以下利不下利辨别合病主風主寒之不同也風者陽也陽性上行故合陽明胃中之水飲而上逆寒者陰也陰性下行故合陽明胃中之水榖而下奔然上逆則必加半夏入葛根湯以滌飲止嘔若下利則但用葛根湯以解兩經之邪不治利而利自止耳葛根湯即第一條桂枝湯加葛根不用麻黃者是也五太陽與陽明合病喘而胸滿者不可下麻黃湯主之原文兩經合病當合用兩經之藥何得偏用麻黃湯耶此見仲景析義之精蓋太陽邪在胸陽明邪在胃兩邪相合必上攻其肺所以喘而胸滿麻黃杏仁治肺氣喘逆之專藥用之恰當正所謂内舉不避親也何偏之有六太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯原文太陽陽明合病下利表證爲多陽明少陽合病下利裏證爲多太陽少陽合病下利半表半裏之證爲多故用黃芩甘草芍藥太棗爲和法也七陽明少陽合病必下利其脉不負者順也負者失也互相尅賊名爲負也脉滑而數者有宿食也當下之宜大承氣湯原文土木之邪交動則水榖不停而急奔故下利可必也陽明脉大少陽脉弦兩無相負乃爲順候然兩經合病陽明氣衰則弦脉獨見少陽勝而陽明負矣下之固是通因通用之法而土受尅賊之邪勢必藉大力之藥急從下奪乃爲解圍之善着然亦必其脉滑而且數有宿食者始爲當下無疑也設脉不滑數而遲軟方慮土敗垂亡尚敢下之乎按太陽與陽明合病陽明與少陽合病俱半兼陽明所以胃中之水榖不安而必自下利其有不下利者亦必水飲上越而嘔與少陽一經之證乾嘔者大不同也或利或嘔胃中之真氣與津液俱傷所以亟須㪚邪以安其胃更慮少陽勝而陽明負即當急下以救陽明其取用大承氣湯正迅掃外邪而承領元氣之義也設稍牽泥則脉之滑數必轉爲遲軟下之無及矣微哉危哉八三陽合病脉浮大上関上但欲眠睡目合則汗九三陽合病腹滿身重難以轉側口不仁而面垢讝語遺尿發汗則讝語下之則額上生汗手足逆冷若自汗者白虎湯主之原文三陽合病五合之表裏俱傷故其脉浮大其證欲眠而目合則汗中州之擾亂可知矣此時發汗則偏於陽而陽明之津液倍竭故讝語益甚將成無陽之證也下之則偏於陰而真陽以無偶而益孤故手足逆冷而額上生汗將成亡陽之證也既不宜於汗下惟有白虎一湯主解熱而不碍表裏在所急用然非自汗出則表猶未解尚未可用此證夏月最多當與痙濕暍篇叅看按三陽經之受外邪太陽頭疼腰脊痛陽明目痛鼻乾不眠少陽寒熱徃來口苦嘔渴各有專司合病者即兼司二陽三陽之證也仲景但以合之一字括其義而歸重在下利與嘔喘胸滿之内症蓋以邪旣相合其人腹内必有相合之微騐故也後人於此等處漫不加察是以不知合病爲何病耳再按少陽篇第九條云傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡桂枝湯主之一條其證全是太陽與少陽合併之病但内無下利其嘔復微即不謂之合病心下支結又與心下痞鞕時如結胸者不同即不謂之併病乃知合併之病重在内有合併之微騐非昌之臆説矣後人謂三陽合病宜從中治此等議論似得仲景表邪未㪚用小柴胡湯裏熱已極用白虎湯之㫖然未可向痴人説夢也設泥此則仲景所用麻黃湯大承氣湯之妙法萬不敢從矣噫吾安得盡闢㨗徑爲周行也哉併病併病者兩經之證連串爲一如貫索然即兼併之義也併則不論多寡一經見三五證一經見一二證即可言併病也然太陽證多陽明少陽證少如秦之併六國者乃病之常若陽明少陽證多太陽證少則太陽必將自罷又不得擬之爲六國併秦矣一二陽併病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽病證不罷者不可下下之爲逆如此可小發汗設面色縁縁正赤者陽氣怫鬱在表當解之熏之若發汗不徹不足言陽氣怫鬱不得越當汗不汗其人燥煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發汗則愈何以知汗出不徹以脉濇故知也原文二二陽併病太陽證罷但發潮熱手足漐漐汗出大便難而讝語者下之則愈宜大承氣湯原文按二陽併病二條皆是太陽與陽明併也上條證初入陽明而太陽仍未罷宜小汗此條證已入陽明而太陽亦隨罷宜大下所以宜小汗大下之故昌言之已悉可以無贅但上條之文從前未有註釋茲特明之太陽初得寒傷營之病以麻黃湯發其汗汗出而邪去病不傳矣因汗出不徹故傳陽明續自微汗出不惡寒陽明熱熾似乎當用下法以太陽之邪未徹故下之爲逆謂其必成結胸等症也如此者可小發汗然後下之設面色緣緣正赤者寒邪深重陽氣怫鬱在表必始先未用麻黃湯或已用麻黃湯而未得汗所以重當解之熏之又非小發汗所能勝矣若是發汗不徹不足言陽氣怫鬱不得越也畢竟當汗不汗其人燥煩不知痛處乍在腹中乍在四肢按之不可得方是陽氣不得越耳短氣者因汗而氣傷也脉濇者因汗而血傷也汗雖未徹其已得汗可知其不怫鬱又可知所以宜更他藥以小發其汗更字讀平聲與太陽中篇傷寒發汗解半日許復煩脉浮數者可更發汗互發然則彼更桂枝湯此更桂枝加葛根湯并可推矣三太陽與少陽併病頭項强痛或眩冐時如結胸心下痞鞕者當刺大椎第一間肺俞肝俞慎不可發汗發汗則讝語脉弦五六日讝語不止當刺期門少陽之脉絡脇脇間併入太陽之邪則與結胸證似是而實非也肝與膽合刺肝俞所以瀉膽也膀胱不與肺合然肺主氣刺肺俞以通其氣斯膀胱之氣化行而邪自不能留矣發汗則讝語與合病木盛尅土之意同註謂水盛則生心火節外生枝反失正意脉弦亦即合病内少陽勝而陽明負之互詞此所以刺期門隨木邪之實而瀉之也仲景通身手眼後人只泥於一手一目可乎四太陽少陽併病心下鞕頸項强而眩者當刺大椎肺俞肝俞慎勿下之原文重申不可下之禁與上條不可汗互發五太陽少陽併病而反下之成結胸心下鞕下利不止水漿不下其人心煩原文悞下之變乃至結胸下利上下交征而陽明之居中者水漿不入心煩待斃傷寒顧可易言哉併病即不悞用汗下已如結胸心下痞鞕矣况加悞下乎此比太陽一經悞下之結胸殆有甚焉其人心煩似不了之語然仲景太陽經謂結胸證悉具煩燥者亦死意者此謂其人心煩者死乎壞病壞病者已汗已吐已下已溫鍼病猶不解治法多端無一定可擬故名之爲壞病也壞病與過經不解大異過經不解者連三陰經俱已傳過故其治但在表裏差多差少宜先宜後之間若壞病則病在三陽未入於陰故其治但在陽經其證有結胸下利眩冐振愓驚悸讝妄嘔噦燥煩之不同其脉有弦促細數𦂳滑沉微澀弱結代之不同故必辨其脉證犯何逆然後得以法而治其逆也一太陽病三日已發汗若吐若下若溫鍼仍不解者此爲壞病桂枝不中與也觀其脉證知犯何逆隨証治之原文相傳傷寒過經日久二三十日不痊者謂之壞病遂與過經不解之病無辨此古今大悞也仲景止説病三日即五六日亦未説到且此條止説太陽病連少陽亦未説到故謂桂枝偏表之法不可用觀下條太陽轉入少陽之壞證有柴胡證罷四字可見此爲桂枝證罷故不可復用也設桂枝證仍在即不得謂之壞病與少陽篇内柴胡證仍在者此雖已下之不爲逆復與柴胡湯必蒸蒸而振却發熱汗出而解之文又互相綰照也豈有桂枝柴胡之證尚未罷而得指爲壞病之理哉故必細察其脉爲何脉證爲何證從前所悞今犯何逆然後隨其證而治之始爲當耳二本太陽病不解轉入少陽者脇下鞕滿乾嘔不能食徃來寒熱尚未吐下脉沉𦂳者與小柴胡湯若已吐下發汗溫鍼讝語柴胡證罷此爲壞病知犯何逆以法治之原文按上條太陽經之壞病也此條少陽經之壞病也兩條文意互發其㫖甚明叔和分彚致滋疑惑茲合而觀之乃知上條云桂枝湯不中與則其所犯要不離於太陽一經之悞吐悞下悞發汗悞燒鍼之諸逆也此條云柴胡湯不中與則其所犯要不離於少陽一經之悞吐悞下悞發汗悞燒鍼之諸逆也後人擬議何逆四治見爲創獲繇茲觀之真囈語矣痰病慨自傷寒失傳後人乃以食積虛煩痰飲脚氣牽合爲類傷寒四證此等名目一出凢習傷寒之家苟簡粗疎已自不識要妙况復加冬溫溫病寒疫熱病濕溫風溫霍亂痙内􅏴畜血爲類傷寒十四證頭上安頭愈求愈失茲欲直遡淵源不得不盡闢岐𣲖蓋仲景於春夏秋三時之病既以冬月之傷寒統之則十四證亦皆傷寒中之所有也若諉之局外漫不加察至臨證糢糊其何以應無窮之變哉昌於春夏病中逐叚拈出茲於三陽經後特立痰病一門凢痰飲素積之人有挾外感而動者有不繇外感而自動者仲景分别甚明挾外感之邪搏結胸脇三陽篇中已致詳矣此但舉不繇外感之痰病昭揭其㫖俾學者辨證以施治焉耳一病如桂枝證頭不痛項不强寸脉微浮胸中痞鞕氣上冲咽㗋不得息者此爲胸有寒也當吐之宜𤓰蒂㪚諸亡血虚家不可與原文寒者痰也痰飲内動身必有汗加以發熱惡寒全似中風但頭不痛項不强此非外入之風乃内藴之痰窒塞胸間宜用瓜蒂㪚以湧出其痰也二病人有寒復發汗胃中冷必吐蚘原文寒亦痰也此即上條之互文上條辨非桂枝之證此條辨不可發汗蓋痰從内動無外感與俱誤發其汗必至迷塞經絡留連不返故示戒也設兼外感如三陽證中諸條則無形之感挾有形之痰結於一處非汗則外邪必不解即强吐之其痰飲亦必不出所以小靑龍一法卓擅竒功耳此言有痰無感悞發其汗重亡津液即大損陽氣其人胃冷而吐蚘有必至也三病人手足厥冷脉乍緊者邪結在胸中心中滿而煩饑不能食者病在胸中當須吐之宜瓜蒂㪚原文手足厥冷與厥陰之熱深厥深相似其脉乍𦂳則有時不𦂳殊不似矣可見痰結在胸故滿煩而不能食亦宜瓜蒂爲吐法也合三條總見痰證可吐不可汗合食積虚煩脚氣四證論之勿指爲類傷寒但指爲不可發汗則其理甚精蓋食積胸中陽氣不布更發汗則陽氣外越一團陰氣用事愈成危候虚煩則胃中津液日竭更發汗則津液盡亡矣脚氣即地氣之濕邪從足先受者正濕家不可發汗之義耳奈何舍正路而趨曲徑耶門人問曰吾師於三陽證中挈出合病併病壞病痰病之條可謂暗室一燈炯然達旦矣但不識陽明何以無壞病耶答曰陽明之誤治最多其脉證固當辨别但不得以壞病名之也蓋陽明原有可汗可下之條汗下原不爲大逆且悞在汗當不誤在下矣誤在下當不悞在汗矣即使汗下燒鍼屢悞其病亦止在胃中原有定法可施與壞證無定法之例微有不恊此壞病所以不入陽明耳門人又問曰救陽明誤治之定法可得聞乎答曰仲景云陽明病脉浮而𦂳咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則燥心憒憒反讝語若加燒鍼必怵愓煩燥不得眠若下之則胃中空虚客氣動膈心中懊憹舌上胎者梔子豉湯主之觀其悞汗悞燒鍼之變煩燥怵惕讝語不眠止是邪在胃中擾其津液與亡陽之證不同也觀其悞下之變客氣動膈心中懊憹止是熱邪上膈心逼不安與結胸之證不同也故遵内經高者越之之㫖以桅子豉湯湧出其邪耳此非無定中之定法乎尚論篇卷三
