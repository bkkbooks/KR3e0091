body:
  text: 尚論篇卷四上新建喻昌撰尚論太隂經證治大意仲景傷寒論六經中惟太隂經文止九條方止二道後人致惜其非全書昌細繹其所以約畧之意言中風即不言傷寒言桂枝即不言麻黄言當温者則曰宜四逆輩全是引伸觸類之妙可見治法總不出三陽外但清其風寒之原以定發汗解肌更於腹之或滿或痛間辨其虚實以定當下當温而已了無餘義矣是非深入閫奥者孰能㑹其為全書也哉太隂經全篇法九條一太隂之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結鞕原文腹滿自利太隂之本證也吐而食不下則邪迫於上利甚而腹痛則邪迫於下上下交亂胃中空虛此但可行温散設不知而誤下之其在下之邪可去而在上之邪䧟矣故胸下結鞕與結胸之變頗同胃中津液上結胸中陽氣不布卒難開也二太隂中風四肢煩疼陽㣲隂澀而長者為欲愈原文四肢煩疼者脾主四肢亦風滛末疾之騐也陽脈㣲隂脈澀則風邪已去而顯不足之象但脈見不足正恐元氣已漓暗伏危機故必㣲澀之中更察其脈之長而不短知元氣未漓其病為自愈也註不審來意謂濇為血凝氣滯大謬豈有血凝氣滯反為欲愈之理耶三太隂病脈浮者可發汗宜桂枝湯原文太隂脈尺寸俱沉細今脈浮則邪還於表可知矣故仍用桂枝解肌之法也太陽經中以浮緩為中風浮𦂳為傷寒故此不重贅但揭一浮字其義即全該風邪用桂枝湯其脈之浮緩不待言矣然則寒邪之脈浮𦂳其當用麻黄湯更不待言矣况少陽篇中云設胸滿脇痛者與小柴胡湯脈但浮者用麻黄湯早已挈明用麻黄湯之義故於太隂證中但以桂枝互之乃稱全現全彰也不然同一浮脈何所見而少陽當用麻黄太隂當用桂枝也哉四自利不渴者屬太隂以其藏有寒故也當温之宜服四逆輩原文註謂自利不渴温邪也故用四逆輩以燠土燥濕此老生腐譚非切要也仲景大意以自利不渴者屬太隂以自利而渴者屬少隂分經辨證所闗甚鉅葢太隂屬濕土熱邪入而蒸動其濕則顯有餘故不渴而多發黄少隂屬腎水熱邪入而消耗其水則顯不足故口渴而多煩燥若不全篇體㑹徒博註釋之名其精微之藴不能闡發者多矣五傷寒脈浮而緩手足自温者繫在太隂太隂當發身黄若小便自利者不能發黄至七八日雖暴煩下利日十餘行必自止以脾家實穢腐當去故也原文太隂脈本緩故浮緩雖類太陽中風然手足自温則不似太陽之發熱并不似少隂厥隂之四逆與厥所以繫在太隂允為恰當也太隂脈見浮緩其濕熱交盛勢必蒸身為黄若小便自利者濕熱從水道暗泄不能發黄也前陽明篇中不能發黄以上語句皆同但彼以胃實而便鞕其證復轉陽明此以脾實而下穢腐其證正屬太隂耳至七八日暴煩下利日十餘行其證又與少隂無别而利盡穢腐當自止則不似少隂之煩燥有加下利漫無止期也况少隂之煩而下利手足反温脈𦂳反去者仍為欲愈之候若不辨晰而誤以四逆之法治之幾何不反増危困耶雖陽明與太隂腑臟相連其便鞕與下利自有陽分隂分之别註家歸重於脾謂脾為胃行津液則如此不為胃行津液則如彼似是而非全失仲景三隂互發之旨六本太陽病醫反下之因爾腹滿時痛者屬太隂也桂枝加芍藥湯主之原文太陽病之悞下其變皆在胸脇以上此之悞下而腹滿時痛無胸脇等證則其邪已入隂位所以屬在太隂也仍用桂枝解肌之法以升舉陽邪但倍芍藥以収太隂之逆氣本方不増一藥斯為神耳七大實痛者桂枝加大黄湯主之原文大實大滿宜從急下然陽分之邪初䧟太隂未可峻攻但於桂枝湯中少加大黄七表三裏以分殺其邪可也八太隂為病脈弱其人續於便利設當行大黄芍藥者宜減之以其人胃氣弱易動故也原文此叚叮嚀與陽明篇中互發陽明曰不轉失氣曰先鞕後溏曰未定成鞕皆是恐傷太隂脾氣此太隂證而脈弱便利減用大黄芍藥又是恐傷陽明胃氣也尚論篇卷四上欽定四庫全書尚論篇卷四中新建喻昌撰尚論少隂經證治大意傳經熱邪先傷經中之隂甚者邪未除而隂已竭獨是傳入少隂其急下之證反十之三急温之證反十之七而宜温之中復有次第不同毫釐千里粗工不解必於曽犯房勞之證始敢用温及遇一切當温之證反不能用詎知未病先勞其腎水者不可因是遂認為當温也必其人腎中之真陽素虧復因汗吐下擾之外出而不能内返勢必藉温藥以回其陽方可得生所以傷寒門中亡陽之證最多即在太陽已有種種危候至傳少隂其辨證之際仲景多少遲徊顧惜不得從正治之法清熱奪邪以存隂為先務也今以從權温經之法疏為前篇正治存隂之法疏為後篇俾業醫者免臨岐之惑云少隂經前篇凡本經宜温之證悉列此篇一少隂病始得之反發熱脈沉者麻黄附子細辛湯主之原文脈沉為在裏證見少隂不當復有外熱若發熱者乃是少隂之表邪即當行表散之法者也但三隂之表法與三陽逈異三隂必以温經之藥為表而少隂尤為𦂳闗故麻黄與附子合用俾外邪出而真陽不出纔是少隂表法之正也二少隂病得之一二日口中和其背惡寒者當灸之附子湯主之原文得之一二日即上條始得之之互文口中和者不渇不燥全無裏熱其背惡寒則陽微隂盛之機已露一斑故灸之以火助陽而消隂主之以附子湯温經而散寒也三少隂病得之二三日麻黄附子甘草湯微發汗以二三日無裏證故微發汗也原文不吐利煩燥嘔渴為無裏證既無裏證病尚在表可知故以甘草易細辛而微發汗又温散之緩法也四少隂病欲吐不吐心煩但欲寐五六日自利而渴者屬少隂也虚故引水自救若小便色白者少隂病形悉具小便白者以下焦虚有寒不能制水故令色白也原文欲吐不吐心煩腎氣上逆之徵也自利而渇加以口燥舌乾引水自救似乎傳經熱病之形悉具然腎熱則水道黄赤若小便色白又非腎熱證乃下焦虚寒不能制水仍當從事温法不可誤認為熱而輕用寒下也五病人脈隂陽俱𦂳反汗出者亡陽也此屬少隂法當咽痛而復吐利原文隂陽俱𦂳傷寒之脈也傷寒無汗反汗出者無陽以固䕶其外所以邪不出而汗先出也少隂之邪不出則咽痛吐利一一顯少隂之本證即當用少隂温經散邪之法不言可知矣六少隂病脈微不可發汗亡陽故也陽已虚尺脈弱濇者復不可下之原文亡陽不可發汗與上條互發亡與無同無陽則其邪為隂邪隂邪本宜下然其人陽已虚尺脈弱濇者復不可下其當亟行温法又可見矣七少隂病下利若利自止惡寒而踡卧手足温者可治原文惡寒踡卧證本虚寒利止手足温則陽氣未虧其隂寒亦易散故可用温法也八少隂病惡寒而踡時自煩欲去衣被者可治原文自煩欲去衣被真陽擾亂不寜然尚未至出亡在外故可用温法也九少隂病脈𦂳至七八日自下利脈暴微手足反温脈𦂳反去者為欲解也雖煩下利必自愈原文三條互見此則邪解陽回可勿藥自愈之證即𦂳去自安之互詞也十少隂病身體痛手足寒骨節痛脈沉者附子湯主之原文身體痛手足寒骨節痛脈沉皆寒邪入少隂之本證即當用附子湯行温經散寒之定法也十一少隂病吐利手足厥冷煩燥欲死者吳茱萸湯主之原文吐利厥冷而至於煩燥欲死腎中之隂氣上逆將成危候故用吳茱萸以下其逆氣而用人參薑棗以厚土則隂氣不復上干此葢温經兼用温中矣十二少隂病下利白通湯主之原文下利無陽證者純隂之象恐隂盛而隔絶其陽故用白通湯以通其陽而消其隂也十三少隂病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加猪膽汁湯主之服湯脈暴出者死微續者生原文與白通湯反至厥逆無脈乾嘔而煩此非藥之不勝病也以無鄉𨗳之力宜其不入耳故復加人尿猪膽汁之隂以引陽藥深入然脈暴出者死微續者生亦危矣哉故上條纔見下利早用白通圖功於未著真良法也十四少隂痛二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或欬或小便利或下利或嘔者真武湯主之原文隂寒内持濕勝而水不行因而内滲外薄甚至水糓不分或欬或利泛溢無所不之非頼真武坐鎮北方之水寜有底哉太陽篇中厥逆筋惕肉瞤而亡陽者用真武湯之法已表明之矣兹少隂之水濕上逆仍用真武一法以鎮攝之可見太陽膀胱與少隂腎一藏一府同居北方寒水之位府邪為陽邪藉用麻桂為青龍藏邪為隂邪藉用附子為真武得此二湯以滌痰𨗳水消隂攝陽其神功妙濟真有不可思議者矣十五少隂病下利清榖裏寒外熱手足厥逆脈微欲絶身反不惡寒其人靣赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之其脈即出者愈原文下利裏寒種種危殆其外反熱其靣反赤其人反不惡寒而手足厥逆脈微欲絶明係羣隂隔陽於外不能内返也故倣白通之法加䓤入四逆湯中以入隂迎陽而復其脈也前條云脈暴出者死此條云脈即出者愈其辨最細葢暴出則脈已離根即出則陽已返舍繇其外反不發熱反不惡寒真陽尚在軀殻然必通其脈而脈即出始為休徴設脈出艱遲其陽已隨熱勢外散又主死矣十六少隂病脈沉者急温之宜四逆湯原文外邪入少隂宜與腎氣兩相搏擊乃脈見沉而不鼓即内經所謂腎脈獨沉之義其人陽氣衰微可知故當急温之以助其陽也十七少隂病飲食入口即吐心下温温欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也急温之宜四逆湯原文飲食入口即吐猶曰胃中不能納榖也若不飲食之時復欲吐而不能吐明係隂邪上逆矣此等處必加細察若始得之便手足寒而脈弦遲即非傳經熱邪其為隂邪上逆無疑當從事乎温經之法也若胸中實者是為陽邪在胸而不在腹即不可用下而當吐以提之也然必果係陽邪方可用吐設膈上有寒飲乾嘔即是隂邪用事吐必轉増其逆計惟有急温一法可助陽而勝隂矣十八少隂病下利脈微澀嘔而汗出必數更衣反少者當温其上灸之原文下利而脈見陽微隂澀為真隂真陽兩傷之候矣嘔者隂邪上逆也汗出者陽虚不能外固隂弱不能内守也數更衣反少者陽虚則氣下墜隂弱則勤弩責也是證陽虚本當用温然隂弱復不宜於温一藥之中既欲救陽又欲䕶隂漫難區别故於頂之上百會穴中灸之以温其上而升其陽庶陽不致下䧟以逼迫其隂然後隂得安靜不擾而下利自止耳此證誤用藥以温其下必逼迫轉加下利不止而隂立亡故不用温藥但用灸法有如此之回䕶也前條用吳茱萸湯兼温其中此條用灸法獨温其上妙義天開令人舞蹈十九少隂病吐利手足不逆冷反發熱者不死脈不至者灸少隂七壯原文既吐且利手足逆冷者其常也若反發熱則陽氣似非衰憊然正恐真陽越出軀殻之外故反發熱耳設脈不至則當急温無疑但温藥必至傷隂故於少隂本穴用灸法以引其陽内返斯脈至而吐利亦將自止矣前條背惡寒之證灸後用附子湯者隂寒内凝定非一灸所能勝此條手足反熱止是隂内陽外故但灸本經以招之内入不必更用温藥也絲絲入扣二十少隂病惡寒身踡而利手足逆冷者不治原文隂盛無陽即用四逆等法回陽氣於無何有之鄉其不能回者多矣故曰不治二十一少隂病吐利煩燥四逆者死原文上吐下利因至煩燥則隂陽擾亂而竭絶可虞更加四肢逆冷是中州之土先敗上下交征中氣立斷故主死也使早用温中之法寜至此乎二十二少隂病下利止而頭眩時時自冒者死原文下利既止其人似可得生乃頭眩時時自冒者復為死候葢人身隂陽相為依附者也隂亡於下則諸陽之上聚於頭者紛然而動所以頭眩時時自冒陽脱於上而主死也可見陽回利止則生隂盡利止則死矣二十三少隂病四逆惡寒而身踡脈不至不煩而燥者死原文四逆惡寒身踡更加脈不至陽已去矣陽去故不煩然尚可施種種回陽之法若其人復加燥擾則隂亦垂絶即欲回陽而基址已壊不能回也二十四少隂病六七日息高者死原文諸陽主氣息高則真氣上迸於胸中本實先撥而不能復歸於氣海故主死也六七日三字辨證最細見六七日經傳少隂而息髙與二三日太陽作喘之表證逈殊也二十五少隂病脈微沉細但欲卧汗出不煩自欲吐至五六日自利復煩燥不得卧寐者死原文脈微沉細但欲卧少隂之本證也汗出不煩則陽證悉罷而當顧慮其隂矣乃於中兼帶欲吐一證欲吐明係隂邪上逆正當急温之時失此不圖至五六日自利有加復煩燥不得卧寐非外邪至此轉増正少隂胃中之真陽擾亂頃刻奔散即温之亦無及故主死也少隂經後篇凡少隂傳經熱邪正治之法悉列此篇一少隂之為病脈微細但欲寐也原文陽脈滑大隂脈微細外邪傳入少隂其脈必微細而與三陽之滑大逈殊衛氣行陽則寤行隂則寐邪入少隂則氣行於隂不行於陽故但欲寐也此少隂之總脈總證也二少隂病脈細沉數病為在裏不可發汗原文沉細之中加之以數正熱邪入裏之徴熱邪入裏即不可發汗發汗則動其經氣而有奪血亡陽之變故示戒也三少隂病欬而下利讝語者被火氣刼故也小便必難以强責少隂汗也原文少隂之脈從足入腹上循喉嚨縈繞舌根故多咽痛之證其支别出肺故間有咳證今以火氣强刼其汗則熱邪挾火力上攻必為咳以肺金惡火故也下攻必為利以火勢逼迫而走空竅故也内攻必譫語以火勢燔炳而亂神識故也小便必難者見三證皆妨小便葢肺為火熱所傷則膀胱氣化不行大腸奔迫無度則水榖併趨一路心胞燔灼不已則小腸枯涸必至耳少隂可强責其汗乎四少隂中風陽微隂浮者為欲愈原文風邪傳入少隂仍見陽浮隂弱之脈則其勢方熾必陽脈反㣲隂脈反浮乃為欲愈葢陽㣲則外邪不復内入隂浮則内邪盡從外出故欲愈也少隂傷寒之愈脈自可類推五少隂病欲解時從子至寅上原文各經皆解於所王之時而少隂獨解於陽生之時陽進則隂退陽長則隂消正所謂隂得陽則解也即是推之而少隂所主在真陽不可識乎六少隂病八九日一身手足盡熱者以熱在膀胱必便血也原文少隂病難於得熱熱則隂病見陽故前篇謂手足不逆冷反發熱者不死然病至八九日隂邪内解之時反一身手足盡熱則少隂必無此候當是藏邪傳府腎移熱於膀胱之證也以胱胱主表一身及手足正軀殻之表故爾盡熱也膀胱之血為少隂之熱所逼其出必趨二隂之竅以隂主降故也七少隂病但厥無汗而强發之必動其血未知從何道出或從口鼻或從目出是名下厥上竭為難治原文强發少隂汗而動其血勢必逆行而上出陽竅以諸發汗藥皆陽經藥也或口鼻或耳目較前證血從隂竅出者則倍甚矣下厥者少隂居下不得汗而熱深也上竭者少隂之血盡從上而越竭也少隂本少血且從上逆故為難治然則上條不言難治者豈非以膀胱多血且從便出為順乎八少隂病得之二三日以上心中煩不得卧黄連阿膠湯主之原文心煩不得卧而無燥證則與真陽發動逈别葢真陽發動必先隂氣四布為嘔為下利為四逆乃致煩而且燥魄汗不止耳今但心煩不卧而無嘔利四逆等證是其煩為陽煩乃真隂為邪熱煎熬如日中纎雲頃刻消散安能霾蔽青天也哉故以解熱生隂為主治始克有濟少緩則無及矣九少隂病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之原文腹痛小便不利少隂熱邪也而下利不止便膿血則下焦滑脱矣滑脱即不可用寒藥故取乾薑石脂之辛澀以散邪固脱而加糯米之甘以益中虚葢治下必先中中氣不下墜則滑脱無源而自止也註家見用乾薑謂是寒邪傷胃欠清葢熱邪挾少隂之氣填塞胃中故用乾薑之辛以散之若混指熱邪為寒邪寜不貽誤後人耶十少隂病下利便膿血者桃花湯主之少隂病便膿血者可刺原文證兼下利便膿血則用桃花湯若不下利而但便膿血則可刺經穴以散其熱即上文之互意也十一少隂病下利咽痛胸滿心煩者猪膚湯主之原文下利咽痛胸滿心煩少隂熱邪充斥上下中間無所不到寒下之藥不可用矣又立猪膚湯一法以潤少隂之燥與用黒驢皮之意頗同若以為燖猪皮外毛根薄膚則薟劣無力且與熬香之説不符但用外皮去其内層之肥白為是此藥大不可忽陽㣲者用附子温經隂竭者用猪膚潤燥温經潤燥中同具散邪之義比而觀之思過半矣十二少隂病二三日咽痛者可與甘草湯不差者與桔梗湯原文邪熱客於少隂故咽痛用甘草湯者和緩其勢也用桔梗湯者開提其邪也此在二三日他證未具故可用之若五六日則少隂之下利嘔逆諸證蠭起此法又未可用矣十三少隂病咽中痛半夏散及湯主之少隂病咽中傷生瘡不能語言聲不出者苦酒湯主之原文熱邪挾痰攻咽當用半夏滌飲桂枝散邪若劇者咽傷生瘡音聲不出桂枝之熱既不可用而隂邪上結復與寒下不宜故用半夏雞子以滌飲潤咽更有藉於苦酒之消腫歛瘡以勝隂熱也十四少隂病四逆其人或欬或悸或小便不利或腹中痛或泄利下重者四逆散主之原文傳經熱邪至於手足四逆最當辨悉若見咳利種種之證其為熱證無疑矣然雖四逆而不至於厥其熱未深故主此方為和解亦如少陽經之用小柴胡湯為一定之法矣讀者詳之十五少隂病下利六七日咳而嘔渴心煩不得眠者猪苓湯主之原文下利六七日本熱去寒起之時其人尚兼欬渴心煩不眠等證則是熱邪摶結水飲以故覊留不去用猪苓湯以利水潤燥不治利而利自止也十六少隂病得之二三日口燥咽乾者急下之宜大承氣湯原文得病纔二三日即口燥咽乾則腎水之不足上供可知延至五六日始下必枯槁難回矣故宜急下以救腎水也十七少隂病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯原文熱邪傳入少隂逼迫津水注為自利質清而無渣滓相雜色青而無黄赤相間可見陽邪暴虐之極反與隂邪無異但陽邪傳自上焦其人心下必痛口必乾燥設係隂邪必心下滿而不痛口中和而不燥必無此枯槁之象故宜急下以救其隂也十八少隂病六七日腹脹不大便者急下之宜大承氣湯原文六七日腹脹不大便則胃土過實腎水不足以上供有立盡之勢又非少隂負趺陽反為順候之比此時下之已遲安得不急十九少隂負趺陽者為順也此條叔和編入厥隂今移附少隂少隂水也趺陽土也諸病惡土尅水而傷寒少隂見證惟恐土不能制水其水反得以泛溢水一泛溢則嘔吐下利無所不至究令中州上敗而真陽外越神丹莫救矣故予其權於土則平成可幾予其權於水則昬墊立至此脈法中消息病情之奥旨也按少隂水藏也水居北方原自坎止惟挾外邪而動則波翻浪湧横流逆射無所不到為嘔為欬為下利為四肢沉重仲景不顧外邪惟以真武一法坐鎮北方之水水不横溢則諸證自止而人之命根頼以攸固命根者何即父母搆精時一㸃真陽伏藏於腎水之中者是也水中火發所以其證雖隂其人反煩燥多汗而似陽仲景每用乾薑附子白通之法以收攝其陽初不慮夫外感葢陽出則腠理大開外感先出所以一回陽而了無餘義也若用寒涼以助水則真陽不返而命根斯斷矣其有腎水衰薄邪入不能横溢轉而内挾真陽藴崇為患外顯心煩舌燥咽痛不眠等證即不敢擅用汗下諸法以重傷其隂但用黄連阿膠湯苦酒湯猪苓湯猪膚湯四逆散之類以分解其熱而潤澤其枯於中雖有急下三證反無當下一證所以前方俱用重劑潤下一日三服始勝其任設熱邪不能盡解傳入厥隂則熱深者其厥亦深而咽痛者轉為喉痺嘔欬者轉吐癰膿下利者轉便膿血甚者發熱厥逆燥不得卧仍是腎氣先絶而死也必識此意然後知仲景温經散邪之法與清熱潤燥之法㣲細曲折與九轉還丹不異後人窺見一斑者遇隂邪便亟温遇陽邪便亟下其鹵莽滅裂尚不可勝言况於聾聵之輩乎兹分前後二篇暢發其義有知我者諒不以為僭也尚論篇卷四中欽定四庫全書尚論篇卷四下新建喻昌撰尚論厥隂經證治大意厥隂雖兩經交盡之名然厥者逆也腎居極下逆行而上以傳於肝故名曰厥隂也邪傳厥隂其熱深矣熱深多發厥厥證皆屬於陽以陽與隂不相承接因致厥也厥後發熱陽邪出表則易愈厥多熱少則病進熱多厥少則病退所以仲景雜用三陽經治法即讝語之當下者但用小承氣湯㣲和胃氣他證皆不用下正欲其熱多而邪從外出耳然厥證多兼下利則陽熱變為隂寒者十居其七葢木盛則胃土受剋水穀奔廹胃陽發露能食則為除中木盛則腎水暗虧汲取無休腎陽發露靣赤則為戴陽繇是陽微則厥愈甚陽絶則厥不返矣所以温之灸之以回其陽仍不出少隂之成法也但厥而下利隂陽之辨甚微不便分為二篇故發其奥於篇首俾讀者先㑹其意云厥隂經全篇法五十五一厥隂之為病消渴氣上撞心心中疼熱饑而不欲食食則吐蚘下之利不止原文消渴者飲水多而小便少也厥隂屬木厥隂邪甚則腎水為之消腎消則引水以自救故消而且渴其渴不為水止也氣上撞心心中疼熱者肝氣通於心也饑不能食者木邪横肆胃土受制也食則吐蚘者胃中饑蚘嗅食則出也下之利不止者邪屬厥隂下則徒虚陽明陽明虚木益乘其所勝也此條文義形容厥隂經之病情最著葢子盛則母虚故腎水消而生渴母盛則子實故氣撞心而疼熱然足經之邪終與手經有别雖仰闗而攻究不能入心之郛廓也至胃則受俯凌之勢無可逃避食則吐而下則利不止矣亦繇邪自陽明傳入胃氣早空故易動耳二厥隂中風􅍺微浮為欲愈不浮為未愈原文厥隂之脈微緩不浮中風病傳厥隂脈轉微浮則邪還於表而為欲愈三厥隂病欲解時從丑至夘上原文丑寅夘厥隂風木之王時故病解四厥隂病欲飲水者少少與之愈原文五諸四逆厥者不可下之虚家亦然凡厥者隂陽氣不相順接便為厥厥者手足逆冷者是也原文厥即四逆之極隂陽既不相順接下則必至於脱絶也厥隂證仲景總不欲下無非欲邪還於表而隂從陽解也此但舉最不可下之二端以嚴其戒耳手之三隂與手之三陽相接於手足之三隂與足之三陽相接於足隂主寒陽主熱故陽氣内䧟不與隂氣相順接則手足厥冷也然四肢屬脾脾為隂與胃之陽不相順接亦主逆冷所以厥證雖𫝊經熱邪復有不盡然者最難消息六傷寒脈遲六七日而反與黄芩湯徹其熱脈遲為寒今與黄芩湯復除其熱腹中應冷當不能食今反能食此名除中必死原文脈遲為寒寒則胃中之陽氣已薄不可更用寒藥矣腹中即胃中胃煖乃能納食今胃冷而反能食則是胃氣發露無餘其陽亦必漸去而不能久存故為必死除者去也與除夕之義同又除者授也與授鞶帶之義同七傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以索餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後三日脈之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日并前六日亦為九日與厥相應故期之旦日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也原文少隂經中内藏真陽最患四逆故云吐利手足不逆冷反發熱者不死厥隂經中内無真陽不患其厥但患不能發熱與夫熱少厥多耳論中恐暴熱來出而復去後三日脈之其熱尚在形容厥證重熱之意匠心滿志讀者不可草草然得熱與厥相應尤無後患若熱氣有餘病勢雖退其後必發癰膿以厥隂主血熱與血久持不散必至壅敗也八傷寒先厥後發熱而利者必自止見厥復利傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痺發熱無汗而利必自止若不止必便膿血便膿血者其喉不痺原文先厥後熱下利止其病為欲愈矣乃反汗出咽中痛是熱邪有餘上攻咽喉挾濕痰而為痺也然既發熱即無汗而邪亦外出所以利必自止若不止則無汗明係邪不外出仍在於裏必主便膿血也便膿血者其喉不痺見熱邪在裏即不復在表在下即不復在上也九傷寒一二日至四五日厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤原文前云諸四逆厥者不可下矣此云厥應下之者其辨甚微葢先四逆而後厥與先發熱而後厥者其來逈異故彼云不可下此云應下之也以其熱深厥深當用苦寒之藥清解其在裏之熱即名為下如下利讝語但用小承氣湯止耳從未聞有峻下之法也若不用苦寒反用辛甘發汗寜不引熱勢上攻乎口傷爛赤與喉痺互意十傷寒病厥五日熱亦五日設六日當復厥不厥者自愈厥終不過五日以熱五日故知自愈原文厥終不過五日即上句之註脚見熱與厥相應隂陽一勝一復恰恰相當故可勿藥自愈十一傷寒脈微而厥至七八日膚冷其人燥無暫安時者此為藏厥非蚘厥也蚘厥者其人當吐蚘今病者靜而復時煩者此為藏寒蚘上入其膈故煩湏臾復止得食而嘔又煩者蚘聞食臭出其人當自吐蚘蚘厥者烏梅圓主之又主久利原文此條微㫖千百年來全無識者昌於篇首總括大意挈出腎陽胃陽二端原有所自藏厥者正指腎而言也蚘厥者正指胃而言也曰脈微而厥則陽氣衰微可知然未定其為藏厥蚘厥也惟膚冷而燥無暫安乃為藏厥藏厥用四逆及灸法其厥不回者主死若蚘厥則時煩時止未為死候但因此而馴至胃中無陽則死也烏梅圓中酸苦辛温互用以安蚘温胃益虚久利而便膿血亦主此者能解隂陽錯雜之邪故也十二傷寒熱少厥微指頭寒黙黙不欲食煩燥數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脇煩滿者其後必便血原文熱少厥微指頭微寒其候原不重然黙黙不欲食煩燥數日胃中津液傷而坐困矣若小便利色白則胃熱暗除故欲得食若厥而嘔胸脇滿不去則邪聚中焦其後隂邪必走下竅而便血以厥隂主血也十三傷寒發熱四日厥反三日復熱四日厥少熱多其病當愈四日至七日熱不除者必便膿血傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進也原文以隂陽進退之義互舉其㫖躍然十四傷寒六七日脈微手足厥冷煩燥灸厥隂厥不還者死原文脈微而厥更加煩燥則是陽微隂盛用灸法以通其陽而陽不回則死也十五傷寒發熱下利厥逆燥不得卧者死原文十六傷寒發熱下利至甚厥不止者死原文厥證但發熱則不死以發熱則邪出於表而裏證自除下利自止也若反下利厥逆煩燥有加則其發熱又為陽氣外散之候隂陽兩絶亦主死也十七發熱而厥七日下利者為難治原文厥利與熱不兩存之勢也發熱而厥七日是熱者自熱厥利者自厥利兩造其偏漫無相恊之期故雖未現煩燥等証而已為難治葢治其熱則愈厥愈利治其厥利則愈熱不至隂陽兩絶不止矣十八傷寒六七日不利便發熱而利其人汗出不止者死有隂無陽故也原文六七日不利忽發熱而利渾是外陽内隂之象此中伏有亡陽危機所以仲景蚤為回䕶用温用灸以安其陽若俟汗出不止乃始圖之則無及矣可見邪亂厥隂其死生全闗乎少隂也不然厥隂之熱深厥深何反謂之有隂無陽哉十九病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱闗元也原文陽邪必結於陽隂邪必結於隂故手足逆冷腹滿按之痛者邪不上結於胸其非陽邪可知其為隂邪下結可知則其當用温用灸更可知矣闗元在臍下三寸為極隂之位也二十傷寒五六日不結胸腹濡脈虚復厥者不可下此為亡血下之死原文傷寒五六日邪入厥隂其熱深矣乃陽邪不上結於胸隂邪不下結於腹其脈虚而復厥則非熱深當下之比繇其隂血素虧若悞下之以重亡其隂必主死也此厥隂所以無大下之法而血虛之人尤以下為大戒矣二十一手足厥寒脈細欲絶者當歸四逆湯主之若其人内有久寒者宜當歸四逆加吳茱萸生薑湯主之原文前條之脈虚此條之脈細互見其義虚細總為無血不但不可用下并不可用温葢脈之虚細本是陽氣衰微然隂血更為不足故藥中宜用歸芍以濟其隂不宜用薑附以刼其隂也即其人素有久寒者但増吳茱萸生薑觀之是則乾薑附子寜不在所禁乎此而推之妙義天開矣二十二大汗出熱不去内拘急四肢疼又下利厥逆而惡寒者四逆湯主之原文大汗出而熱反不去正恐陽氣越出軀殻之外若内拘急四肢疼更加下利厥逆惡寒則在裏純是隂寒宜亟用四逆湯以回其陽而隂邪自散耳二十三大汗若大下利而厥冷者四逆湯主之原文此證較上條無外熱相錯其為隂寒易明然既云大汗大下利則隂津亦亡但此際不得不以救陽為急俟陽回尚可徐救其隂所以不當牽制也二十四傷寒脈促手足厥逆者可灸之原文傷寒脈促則陽氣跼蹐可知更加手足厥逆其陽必為隂所格拒而不能返故宜灸以通其陽也二十五傷寒脈滑而厥者裏有熱也白虎湯主之原文滑為陽脈其裏熱熾盛可知故宜行白虎湯以解其熱與三陽之治不殊也二十六病人手足厥冷脈乍緊者邪結在胸中心下滿而煩饑不能食者病在胸中當湏吐之宜𤓰蒂散原文手足厥冷疑似隂邪其脈有時乍緊則是陽邪而見陽脈也陽邪必結於陽所以邪結在胸中心下煩滿饑不能食也此與太陽之結胸逈殊其脈乍緊其邪亦必乍結故用𤓰蒂散湧載其邪而出斯陽邪仍從陽解耳二十七傷寒厥而心下悸者宜先治水當用茯苓甘草湯却發其厥不爾水漬入胃必作利也原文太陽篇中飲水多者心下必悸故此厥而心悸者明係飲水所致所以乘其水未漬胃先用茯苓甘草湯治水以清下利之源後乃治厥庶不致厥與利相因耳二十八傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止者為難治麻黄升麻湯主之原文此表裏錯雜之邪最為難治然非死證也大下後寸脈沉而遲手足厥逆則陽氣陷入隂中下部脈不至則隂氣亦復衰竭咽喉不利唾膿血又因大下傷其津液而成肺痿金匱曰肺痿得之被快藥下利重亡津液者是也泄利不止未是下焦虚脱但因陽氣下陷所致故必升舉藥中兼調肝肺乃克有濟此麻黄升脈所以名湯而謂汗出愈也按寸脈沉而遲明是陽去入隂之故非陽氣衰微可擬故雖手足厥逆下部脈不至泄利不止其不得為純隂無陽可知况咽喉不利唾膿血又陽邪搏隂上逆之徴騐所以仲景持於隂中提出其陽得汗出而錯雜之邪盡解也二十九傷寒四五日腹中痛若轉氣下趨少腹者此欲自利也原文腹中痛多屬虚寒與腹中實滿不同若便轉氣下趨少腹則必因腹寒而致下利明眼見此自當圖功於未著矣三十傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐乾薑黄連黄芩人參湯主之原文本自寒下是其人之平素胃寒下利也較上條之轉氣下趨少腹者更為已然之事矣所以纔病傷寒即不可妄行吐下與病人舊微溏不可服梔子湯互意舊微溏而用梔子則易湧易泄本自寒下而施吐下則吐下更逆其理甚明註家不㑹其意寒格者因誤施吐下之寒藥致成格拒也若食入口即吐格拒極矣故用乾薑人參以温補其胃用黄連黄芩之苦以下逆氣而解入裏之熱邪也三十一下利脈沉而遲其人靣少赤身有微熱下利清穀者必鬱冐汗出而解病人必微厥所以然者其靣戴陽下虚故也原文下利脈沉遲裏寒也靣少赤有微熱則仍兼外邪必從汗解但戴陽之證必見微厥汗中大伏危機其用法即逈異嘗法下條正其法也三十二下利清穀裏寒外熱汗出而厥者通脈四逆湯主之原文上條辨證此條用藥兩相互發然不但此也少隂病下利清榖靣色赤者已用其法矣要之通之正所以收之也不然豈有汗出而反加蔥之理哉三十三下利手足厥冷無脈者灸之不温若脈不還反微喘者死原文灸之不温脈不還已為死證然或根坻未絶亦未可知設陽氣隨火氣上逆胸有微喘則孤陽上脱而必死矣與少隂病六七日息高者死正同三十四下利後脈絶手足厥冷晬時脈還手足温者生脈不還者死原文厥利無脈陽去而難於返矣然在根本堅固者生機尚存一綫經一週時脈還手足復温則生否則死矣此即互上條用灸之意所以不重贅灸法也少隂下利厥逆無脈服白通湯脈暴出者死微續者生厥隂下利厥逆脈絶用灸法晬時脈還者生不還者死可見求陽氣者非泛然求之無何有之鄕也根深寜極之中必有幾微可續然後藉温灸為鸞膠耳三十五下利腹脹滿身體疼痛者先温其裏乃攻其表温裏宜四逆湯攻表宜桂枝湯原文此與太陽中篇下利身疼用先裏後表之法大同彼因誤下而致下利此因下利而致腹脹總以温裏為急者見睍曰消之義也身疼痛有裏有表必清便已調其痛仍不減方屬於表太陽條中已悉故此不贅三十六下利清榖不可攻表汗出必脹滿原文此條重舉下利清榖不可攻表以示戒正互明上條所以必先温裏然後攻表之義也見誤攻其汗則陽出而隂氣瀰塞胸腹必致脹滿而釀變耳三十七傷寒下利日十餘行脈反實者死原文實為邪盛邪盛必正脱也三十八下利有微熱而渴脈弱者令自愈下利脈數而渴者令自愈設不差必清膿血以有熱故也下利脈數有微熱汗出令自愈設復緊為未解原文微熱而渴證已轉陽然正恐陽邪未盡也若脈弱則陽邪已退可知故不治自愈脈數與微熱互意汗出與脈弱互意脈𦂳則不弱矣邪方熾盛其不能得汗又可知矣三十九下利寸脈反浮數尺中自濇者必圊膿血原文清圊同義脈見浮數若是邪還於表則尺脈自和今尺中自濇乃熱邪摶結於隂分雖寸口得陽脈究竟邪必走下竅而便膿血也四十下利脈沉弦者下重也脈大者為未止脈微弱數者為欲自止雖發熱不死原文下利而脈沉弦主裏急後重成滯下之證即所稱痢證也脈大者即沉弦中之大脈微弱數者即沉弦中之微弱數也脈微弱數雖發熱不死則脈大身熱者其死可知矣四十一熱利下重者白頭翁湯主之原文熱利下重互上文即傷寒轉痢之謂也四十二下利欲飲水者以有熱故也白頭翁湯主之原文此從上條另申一義見凡下利欲飲水者與藏寒利而不渴自殊乃熱邪内耗津液縱未顯下重之候亦當以前湯勝其熱矣四十三下利讝語以有燥屎也宜小承氣湯此與陽明經讝語胃中有燥屎正同乃不用大承氣而用小承氣者以下利腸虚兼之厥隂藏寒所以但用小承氣微攻其胃全無大下之條耳四十四下利後更煩按之心下濡者為虚煩也宜梔子豉湯原文已下利而更煩似乎邪未盡解然心下濡而不滿則為虚煩與陽明誤下胃虚膈熱之證頗同故俱用湧法也四十五嘔而發熱者小柴胡湯主之原文厥隂之邪上逆而兼發熱乃肝膽藏府相連之證也故用小柴湖湯分解其隂藏陽府之嘔熱也四十六嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之原文嘔而脈弱小便利裏虚且寒身有微熱證兼表裏其人見厥則隂陽互錯故為難治然不難於外熱而難於内寒也内寒則陽微隂盛天日易霾故當用四逆湯以回陽而微熱在所不計也况乾薑配附子補中有發微熱得之自除耶四十七乾嘔吐涎沬者吳茱萸湯主之嘔家有癰膿者不可治嘔膿盡自愈原文厥隂之邪上逆而乾嘔吐涎沬可用吳茱萸湯以下其逆氣若隂邪上逆結而為癰潰出膿血即不可復治其嘔正恐人誤以吳茱萸湯治之耳識此意者用辛涼以開提其膿亦何不可耶按厥隂篇中次第不一有純陽無隂之證有純隂無陽之證有隂陽差多差少之證有陽進欲愈隂進未愈之證復有隂居八九陽居一二之證厥而發熱熱深厥深上攻而成喉痺下攻而便膿血此純陽無隂之證也脈微細欲絶厥冷灸之不温惡寒大汗大利燥不得卧與夫冷結闗元此純隂無陽之證也厥三日熱亦三日厥五日熱亦五日手足厥冷而邪熱在胸水熱在胃此隂陽差多差少之證也渴欲飲水饑欲得食脈滑而數手足自温此陽進欲愈之證也黙黙不欲食寸脈雖浮數尺脈自濇嘔吐涎沫腹脹身疼此隂進未愈之證也下利清榖裏寒外熱嘔而脈弱小便復利本自寒下復誤吐下脈沉微厥靣反戴陽此隂居八九陽居一二之證也大率陽脈陽證當取用三陽經治法隂脈隂證當合用少隂經治法厥隂病見陽為易愈見隂為難痊其表裏雜錯不分又必先温其裏後攻其表設見咽喉不利咳唾膿血則温法不可用仍宜先解其表矣世醫遇厥隂諸證如涉大洋茫無邉際可測是以動手即錯兹不厭繁複闡其要㫖俾後學奉為指南云再按厥隂經原無下法首條即先示戒云下之利不止矣葢厥隂多至下利下利中復有死證金匱云五藏氣絶於内則下利不禁此所以致戒不可下耶中間雖有用小承氣一法因胃有燥屎微攻其胃非攻其腸也雖有厥應下之一語乃對發汗而言謂厥應内解其熱不應外發其汗耳豈可泥應下二字遂犯厥隂之大戒耶自晉迄今傷寒失傳遇陽明二三日内當下之證及少隂二三日急下之證總不能下至厥隂六七日不當下之時反行下之在熱深厥深之陽證下之已遲萬一僥倖不過為焦頭爛額之客在亡血藏虚之人下之百無一生矣幾千年來孰任殺人之辜耶過經不解法四條經後附三隂過經不解者由七八日已後至十三日已後病過一候二候猶不痊解也然邪在身中日久勢必結聚於三陽太陽為多少陽次之陽明又次之及至三隂則生死及掌不若此之久持矣辨陽症用大小柴胡兩觧一法一太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急鬱鬱微煩者為未解也與大柴胡湯下之則愈原文過經十餘日而不知太陽證有未罷反二三下之因而致變者多矣後四五日柴胡證仍在未有他變本當行大柴胡兩解表裏但其人之邪屢因悞下而深入即非大柴胡下法所能服故必先用小柴胡提其邪出半表然後乃用大柴胡始合法也辨過經不解心下欲吐微煩微滿用藥宜審一法二太陽病過經十餘日心下温温欲吐而胸中痛大便反溏腹微滿鬰鬰微煩先此時自極吐下者與調胃承氣湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡證以嘔故知極吐下也原文此條註解不得仲景叮嚀之意兹特明之太陽病過經十餘日心下温温欲吐而不吐其人胸中痛大便反溏腹微滿鬱鬱微煩者此有二辨若曽經大吐大下者邪從吐解且已入裏可用調胃承氣之法若未極吐下但欲嘔不嘔胸中痛微溏者是痛非吐所傷溏非下所致調胃之法不可用矣豈但調胃不可用即柴胡亦不可用以邪尚在太陽髙位徒治陽明少陽而邪不服耳解太腸之邪仲景言之已悉故此但示其意也若其人能嘔則是為吐下所傷而所主又不在太陽矣過經證屬可下悞用圓藥増利辨内實内虚二法三傷寒十三日胸脇滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以圓藥下之非其治也潮熱者實也先宜小柴胡以解外後以柴胡加芒硝湯主之原文胸脇滿而嘔邪在少陽表裏之間也發潮熱裏可攻也微下利便未硬也以大柴胡分解表邪蕩滌裏熱則邪去而微利亦自止矣若悞用圓藥則徒引熱邪内陷而下利表裏俱不解也故先用小柴胡分提以解外邪後加芒硝以滌胃中之熱也四傷寒十三日不解過經讝語者以有熱也當以湯下之若小便利者大便當鞕而反下利脈調和者知醫以圓藥下之非其治也若自下利者脈當微厥今反和者此為内實也調胃承氣湯下之原文二條俱見微利之證難辨其内虚内實上條胸脇滿而嘔邪凑少陽之表故欲下之必用柴胡湯為合法若以他藥下之表邪内入即是内虚此條原無表證雖圓藥悞下其脈仍和即為内實也按仲景下法屢以用圓藥為戒惟治太陽之脾約乃用麻仁圓因其人平素津枯腸結必俟邪入陽明下之恐無救於津液故雖邪在太陽即用圓藥之緩下潤其腸俾外邪不因峻攻而内䧟乃批郤𨗳游刄空虚之妙也此等處亦湏互察再按傷寒證以七日為一候其有二候三候不解者病邪多在三陽經留戀不但七日傳之不盡即十日十三日二十餘日尚有𫝊之不盡者若不辨證徒屈指數經數候汗下展轉差誤正虚邪凑愈久愈難為力與内經至七日太陽病衰頭痛少愈八日陽明病衰身熱少歇九日少陽病衰耳聾微聞十日太陽病衰腹减如故則思飲食十一日少隂病衰渴止舌潤而嚏十二日厥隂病衰囊縱少腹微下大氣皆去病人精神爽慧之恒期逈異矣所以過經不解當辨其邪在何經而取之仲景云太陽病頭痛至七日以上自愈者以行其經盡故也即内經七日太陽病衰頭痛少愈之旨也可見太陽一經有行之七日以上者矣其欲作再經者鍼足陽明使經不傳則愈以太陽既覊留多日則陽明少陽亦可覊留過經漫無解期矣所以早從陽明中土而奪之俾其不傳此㨗法也若謂六經傳盡復傳太陽必無是理後人墮落成無已阱中耳豈有厥隂兩隂交盡於裏復從皮毛外再入太陽之事耶請破此大惑差後勞復隂陽易病附三隂經後一太病差後勞復者枳實梔子豉湯主之若有宿食者加大黄如博碁子大五六枚原文勞復乃起居作勞復生餘熱之病方註作女勞復大謬女勞復者自犯傷寒後之大戒多死少生豈有反用上湧下泄之理耶太陽中篇下後身熱或汗吐下後虚煩無奈用本湯之苦以吐徹其邪此非取吐法也乃用苦以發其微汗正内經火滛所勝以苦發之之義觀方中用清漿水七升空煑至四升然後入藥同煑全是欲其水之熟而趨下不致上湧耳所以覆令微似汗精絶二傷寒差已後更發熱者小柴胡湯主之脈浮者以汗解之脈沉實者以下解之原文差已後更發熱乃餘熱在内以熱召熱也然餘熱要當辨其何在不可泛然施治以虚其虚如在半表半裏則仍用小柴胡湯和解之法如在表則仍用汗法如在裏則仍用下法然汗下之法即互上條汗用枳實梔䜴微汗下用枳實梔䜴加大黄微下也三大病差後從腰以下有水氣者牡蠣澤㵼散主之原文腰以下有水氣者水漬為腫也金匱曰腰以下腫當利小便此定法矣乃大病後脾上告困不能攝水以致水氣泛溢用牡蠣澤㵼散峻攻何反不顧其虚耶正因水勢未犯身半以上急驅其水所全甚大設用輕劑則隂水必襲入陽界驅之無及城不沒者三版亦云幸矣可見活人之事迂疎輩必不能動中機宜庸工遇大病後悉行温補自以為善孰知其為鹵莽滅裂哉四大病差後喜唾久不了了者胃上有寒當以圓藥温之宜理中圓原文身中津液因胃寒凝結而成獨唾久而不清其人必消瘦索澤故不用湯藥蕩滌而用圓藥緩圖也理中圓乃區分隂陽温補脾胃之善藥然仲景差後病外邪已盡纔用其方在太陽邪熾之日不得已合桂枝用之即更其名曰桂枝人參湯又云醫以理中與之利益甚理中者理中焦此利在下焦非其治也於此見用法之權衡矣五傷寒解後虚羸少氣氣逆欲吐者竹葉石膏湯主之原文身中津液為熱邪所耗餘熱不清必致虚羸少氣難於康復若更氣逆欲吐是餘邪復挾津液滋擾故用竹葉石膏湯以益虚清熱散逆氣也六病人脈已解而日暮微煩以病新差人强與榖脾胃氣尚弱不能消榖故令微煩損榖則愈原文脈已解者隂陽和適其無表裏之邪可知也日暮微煩者日中衛氣行陽其不煩可知也乃因脾胃氣弱不能消榖所致損穀則脾胃漸趨於旺而自愈矣註家牽扯日暮為陽明之王時故以損榖為當小下不知此論差後之證非論六經轉陽明之證也日暮即内經日西而陽氣已衰之意所以不能消榖也損榖當是减損榖食以休養脾胃不可因前條宿食例輕用大黄重傷脾胃也合六條觀之差後病凡用汗下和温之法但師其意不泥其方恐元氣精津久耗不能勝藥耳豈但不能勝藥抑且不能勝榖若損榖則病愈而用藥當思減損并可識矣其腰已下有水氣峻攻其水亦以病後體虚膀胱氣化不行若不一朝迅埽則久困之脾土必不能堤防水逆不至滔天不止所以仲景云少隂負跌陽者為順故急奪少隂之水以解跌陽之圍夫豈尋常所能測識耶一傷寒隂陽易之為病其人身體重少氣少腹裏急或引隂中拘攣熱上衝胸頭重不欲舉眼中生花膝脛拘急者燒裩散主之原文隂陽易之病註家不明言乃致後人指為女勞復大謬若然則婦人病新差與男子交為男勞復乎葢病傷寒之人熱毒藏於氣血中者漸從表裏解散惟熱毒藏於精髓之中者無繇發泄故差後與不病之體交接男病傳不病之女女病傳不病之男所以名為隂陽易即交易之義也其證眼中生花身重拘急少腹痛引隂䈥暴受隂毒又非薑桂附子辛熱所能驅故燒裩襠為散以其人平昔所出之敗濁同氣相求服之小便得利隂頭微腫隂毒仍從隂竅出耳此條叔和彚於差後勞復之前因起後人女勞復之疑今移附勞復後益見熱病之為大病差後貽毒他人其惡而可畏有如此也尚論張仲景傷寒論凡八卷前四卷詳論六經證治已盡傷寒之義矣後四卷推廣春月温病夏秋暑濕熱病以及脈法諸方聊與二三及門揚確千古稿藏笥中欲俟百年身盡名滅然後梓行以其刻意求明令天下業醫之子從前師説漫無着落必反嫉為欺世盜名耳不謂四方來學日衆手編不便抄錄姑將前四卷授梓求正大方儻坊間購刻全本人書具在寜致貽憾於續貂乎尚論篇卷四下
