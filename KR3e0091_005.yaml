body:
  text: 尚論後篇卷一新建喻昌撰尚論春三月溫症大意仲景書詳於治傷寒畧於治溫以法度俱錯出於治傷寒中耳後人未解義例故春溫一症漫無成法可師而况觸冐寒邪之病少感發溫氣之病多寒病之傷人什之三溫病之傷人什之七古今缺典莫此為大昌特會内經之旨以暢發仲景不宣之奥然僭竊無似矣厥㫖維何内經云冬傷於寒春必病溫此一大例也又云冬不藏精春必病溫此一大例也既冬傷於寒又冬不藏精至春月同時病發此一大例也舉此三例以論溫症而詳其治然後與三陽三陰之例先後同符蓋冬傷於寒邪藏肌膚即邪中三陽之謂也冬不藏精邪入陰臟即邪中三陰之謂也陽分之邪淺而易療陰分之邪深而難愈所以病溫之人有發表三五次而外症不除者攻裏三五次而内症不除者源逺流長少減復劇以為在表也又似在裏以為在裏也又似在表用溫熱則陰立亡用寒凉則陽隨絶凡傷寒之種種危候溫症皆得有之亦以正虚邪盛不能勝其任耳至於熱症尤為十中八九緣真陰為熱邪乆耗無以制亢陽而燎原不息也以故病溫之人邪退而陰氣猶存一綫者方可得生然多骨痩皮乾津枯肉爍經年善調始復未病之體實縁醫者於此一症茫然不識病之所在用藥不當邪無從解留連展轉莫必其命昌之目擊心傷者乆之兹特出手眼以印正先人之法則祈以永登斯人於夀域後有作者諒必不以為狂誕也溫症上篇謹將冬傷於寒春必病溫定為一大例冬傷於寒藏於肌膚感春月之溫氣而始發肌膚者陽明胃經之所主也陽明經中乆鬱之熱一旦發出而外達於太陽有畧惡寒而即發熱者有大熱而全不惡寒者有表未除而裏已先實者有邪乆住太陽一經者有從陽明而外達於太陽者有從太陽復傳陽明不傳他經者有自三陰傳入胃腑者有從太陽循經徧傳三陰如冬月傷寒之例者大率太陽陽明二經是邪所蟠據之地在太陽則寒傷營之症十不一見在陽明則讝語發斑衂血畜血發黄脾約等熱症每毎兼見而凡發表不逺熱之法適以增溫病之困阨耳况於治太陽經之症其法度不與冬月相同蓋春月風傷衛之症或有之而寒傷營之症則無矣且由陽明而達太陽者多不盡由太陽而陽明少陽也似此則溫症之分經用法比之傷寒大有不同而世方屈指云某日某經某日傳經已盡究竟於受病之經不能摸索以求良治所謂一盲而引衆盲相將入火坑也寃哉生命古今誠一莫控矣按溫熱病亦有先見表症而後𫝊裏者蓋溫熱自内達外熱鬱腠理不得外洩遂復還裏而成可攻之症非如傷寒從表而始也傷寒從表而始故悮攻而生變者多溫症未必從表始故攻之亦不為大變然鬱熱必從外泄為易悞攻而引邪深入終非法也按溫熱病表症間見而裏病為多故少有不渴者法當以治裏為主而解肌兼之亦有治裏而表自解者其間有悮攻裏而致害者乃春夏暴寒所中之疫症邪純在表未入於裏故也不可與溫熱病同論一太陽病發熱而渴不惡寒者為溫病仲景原文昌按溫者春令之氣也冬夏秋雖有氣溫之日不如春令之正且乆也不惡寒三字内有奥義蓋時令至春則為厥陰風木主事而與太陽之寒氷不相渉矣故經雖從太陽而症則從春令而不惡寒也冄按溫病或有新中風寒者或有表氣虚不禁風寒者衛虚則惡風營虚則惡寒又不可因是遂指為非溫病也然即有之亦必微而不甚除太陽一經則必無之矣二形作似也傷寒其脉不弦𦂳而弱非傷寒矣弱者必渴被火者必讝語弱者發熱所以渇也脉浮解之當汗出愈原文風性弱緩故脉亦弱弱者發熱即内經諸弱發熱之義也脉既浮當以汗解之使汗出而愈取解肌不取發汗之義按溫熱病原無風傷衛寒傷營之例原無取於桂枝麻黄二方也表藥中即敗毒散参蘇飲等方亦止可用於春木未熱之時若過時而發之溫病暑病尚嫌其藥性之帶溫况於桂麻之辛熱乎然仲景不言桂麻為不可用者有二説焉一者以剔出桂麻則三陰絶無表藥也一者以桂麻用之不當在冬月已屢致戒春月更可無贅也後之紛紛訾議桂麻之熱者未嘗計及於冬不藏精之治耳惟知春夏有不得不用也庶知仲景立方之神哉三脉浮熱甚反灸之此為實實以虚治因火而動必咽燥吐血原文脉浮熱甚邪氣勝也邪氣勝則實反灸之是實以虚治也血隨火炎而妄逆在所必至矣咽燥者火勢上逼枯涸之應耳若是少陰見症當不止此一端故不入冬不藏精一例四病如桂枝症似乎中風頭不痛項不强則太陽無外入之邪而非中風寸脉微浮則邪自内出而不當過表胸中痞鞕痰涎塞隔氣上衝咽㗋不得息者胸中有塞也當吐之宜瓜蒂散病人有寒復發汗胃中冷必吐蚘原文昌按仲景不曰病似中風症而曰病如桂枝症者恐後人悮以治溫一例混入太陽中風之例而滋擾故更换其名也吐法多用梔豉湯此用𤓰蒂散者取其吐頑痰而快膈湧風涎而逐水也有痰而悮發汗徒亡津液胃中空虚蚘失所養故悖逆而上出也五病人手足厥冷似涉厥陰脉乍𦂳者邪結在胸中非厥陰也心中滿而煩饑不能食者病在胸中當須吐之宜瓜蒂散原文按此症乃痰邪自内而作即四症類傷寒之瘧症也仲景云病人身大熱反欲得近衣者熱在皮膚寒在骨髓也表實裏虚身大寒反不欲近衣者寒在皮膚熱在骨髓也表虛裏實此以互令之表裏言設合臟腑而統言之則皆謂之表矣六病在陽表未罷熱未除應以汗解之反以冷水噀之其熱被却不得去彌更益煩肉上粟起意欲飲水反不渴者熱邪為水寒所制服文蛤散鹹寒利水若不瘥者與五苓散寒實結胸無熱症者兩寒相搏與三物小䧟胸湯三物白散亦可服寒結重者原文按病在陽則不兼陰可知正合第一例也七病人臟無他病裏氣和也時發熱或然或不然自汗出而不愈者此胃氣不和也先其時未發熱之時發汗則愈宜桂枝湯主之原文八病常自汗出無時不然此為營氣和營氣和者外不諧以衛氣不共營氣和諧故爾以營行脉中衛行脉外復發其汗營衛和則愈宜桂枝湯原文按臟無他病但衛氣不和亦陽病而陰不病之例也冄按春溫之症由肌肉而外逹於皮膚則太陽膀胱經之邪傳自陽明胃經與冬月外受之風寒始先便中太陽而傷其營衛者逈乎不同故此但言衛氣不與營和其無太過可知也既衛不與營和當用麻黄乃但用桂枝者可見溫症中發汗之法皆用解肌蓋久鬱之邪一解肌則自散若大汗而重傷津液反變起矣此先聖用法之大門也九病人脉數數為熱當消穀引食而反吐者此以發汗令陽氣微膈氣虚脉乃數也數為客熱不能消穀以胃中虛冷故吐也原文昌按發汗而令陽微悮之甚也陽微則胃中虚冷而脉反數者不過客熱之微溫其胃而客熱不留斯脉不數矣冄按此但言胃中之陽微與不藏精之真陽微弱者不同十病人煩熱太陽也汗出則解又如瘧狀日晡所發熱者属陽明也脉實者陽明宜下之脉浮虚者太陽宜發汗下之宜承氣湯汗之宜桂枝湯原文十一微數之脉慎不可灸因火為邪則為煩逆追虚逐實血散脉中火氣雖微内攻有力焦骨傷筋血難復也原文昌按此一條垂戒雖在溫症項下然不專為溫症而設所以不言症而但言脉也脉見微數則是陰虚而陽熾重以火力追逐其血有筋骨焦傷已耳今世之灼艾者不識亦辨脉之微數否耶其為陰虚火勝之人漫用灸法者何耶十二病人耳聾無聞者以重發汗虚故也原文此與傷寒耳聾為少陽邪盛者逈異益見溫症禁過汗也十三病人不大便五六日繞臍痛煩燥發作有時者此有燥屎故使大便鞕也原文十四病人小便不利大便乍難乍易時有微熱喘冐不能臥者有燥屎也宜大承氣湯原文十五大下後六七日不大便煩不解腹滿痛者此有燥屎也宜大承氣湯原文昌按仲景治溫症凡用表法皆用桂枝湯以示微發於不發之意也凡用下法皆用大承氣湯以示急下無所疑之意也不知者鮮不以為表在所輕而裏在所重殊大不然蓋表裏無可軒輊所以然者祗慮熱邪久據陽明胃中津液先傷故當汗而惟恐過於汗反重傷其津液當下而惟恐不急於下以亟存其津液也十六本發汗而復下之此為逆也若先發汗治不為逆本先下之而反汗之此為逆也若先下之治不為逆原文觀此則溫症比傷寒太陽經之變症為差減而汗下之次第亦為不同矣十七凡病若發汗若吐若下若亡津液陰陽和者必自愈原文觀此則病溫之人素無内傷及不藏精之類者為易愈也春溫上篇諸方傷寒論共三百九十七法前四卷已載明三百六十七法兹篇得三法解肌法桂枝湯桂枝加葛根湯升麻葛根湯葛根柴胡湯葛根葱白湯葛根黄連黄芩湯附方人参敗毒散参蘇飲海藏大羗活湯解肌後病不去反惡寒者虚也芍藥甘草附子湯脉細身倦者方可服解肌後身疼病脉沉者桂枝加芍藥人参新加湯解肌後汗出過多心下悸欲得按者桂枝甘草湯臍下悸欲作奔豚者茯苓桂枝甘草大棗湯解肌後煩渴脉洪大白虎加人参湯解肌後腹脹滿厚朴生薑人参湯解肌後不惡寒但惡熱者調胃承氣湯解肌後惡熱無下症知母石膏湯解肌後脉微數小便不利微熱煩渇五苓散解肌後胃乾煩不得眠欲飲水少少與之吐法𤓰蒂散梔豉湯傷寒内著有専論清熱諸方白虎湯白虎加人参湯白虎加蒼术湯白虎加桂枝湯𤣥参升麻湯升麻梔子湯竹葉石膏湯竹葉湯和解諸方小柴胡湯小柴胡加桂枝湯小柴胡去半夏加人参瓜蔞湯小柴胡去人参加五味子湯小柴胡加芒硝湯疎風諸方荆芥散獨活湯金匱風引湯續命湯减麻黄附子分利諸方五苓散脉浮而大是表其人發渇小便赤却當下用此猪苓湯汗多者不可與陽明脉浮發熱渴欲飲水小便不利者與之天水散辰砂天水散分利兼清鎮牡蠣澤瀉散治腰以下有水氣開結諸方三物小䧟胸湯三物白散下法大承氣湯調胃承氣湯大柴胡湯脉浮大是表其人心下痞却當下若煩渴燥熱小便赤色噦嘔不止心下微煩者俱當兩解下後脉促胸滿桂枝去芍藥湯若微寒去芍藥加附子湯悮以丸藥下之身熱不去微煩梔子乾薑湯三湯取其溫以散表下後利不止脉促表未解喘而汗出者葛根黄連黄芩湯取其凉以解表下後身熱不去心中結痛未欲解者梔豉湯下後心煩腹痛臥起不安者梔子厚朴湯取其吐以徹邪下後心中懊惱而煩有燥屎者大承氣湯取其仍從下解下後寸脉沉而遲手足厥逆下利脉不至咽㗋不利吐膿血瀉利不止為難治麻黄升麻湯取其解錯雜之邪下後傷血脉澁葶藶苦酒湯取其壯陰大汗使陽氣微又大下使陰氣弱其人亡血病惡寒後乃發熱無休止時陰陽即承氣血俱弱故其熱不可止息葶藶梔子湯二方取其酸苦湧泄以助陰解毒諸方黄連解毒湯黄連湯黄連阿膠湯黄連瀉心湯黄連龍骨湯黄連犀角湯黄連橘皮湯黒膏養血生津酸棗仁湯芍藥甘草湯阿膠散大青龍湯炙甘草湯五味子湯補中黄茋建中湯小建中湯理中湯溫中湯治中湯凉血滋陰犀角地黄湯搐鼻出水瓜蒂散刺鼻出血乾栗幹蒻葉溫症中篇謹將冬不藏精春必病溫分為一大例人身至冬月陽氣潛藏於至陰之中内經教人於此時若伏若匿若已有得重藏精也若伏者若抱雛養蟄不遑食息也若匿者若逋逃隱避不露蹤跡也若已有得者韜光匿采絶無觖望也此何如鄭重耶故謂冬不藏精春必病溫見病所由来為一定之理必然之事其辭甚决蓋以精動則關開而氣泄冬月關開氣泄則寒風得入之矣關屢開氣屢泄則寒風屢入之矣而腎主閉藏者因是認賊作子賊亦無門可出彌甚相安及至春月地氣上升肝木用事肝主疎泄木主風於是吸引腎邪勃勃内動而刼其家寳矣然邪入既深不能遽出但覺憒憒無奈其發熱也全在骨髓之間自覺極熱而捫之反不烙手任行表散汗出而邪不出徒傷津液以取危困其候比之冬傷於寒一例則倍重矣按冬不藏精之例乃内經之例非仲景之例也非仲景之例言之未免為悖然觀仲景之論溫症第一條始不勝慶幸而仲景已起發其端昌可言之無罪矣其曰發汗已身灼熱者名曰風溫風溫為病脉隂陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黄色劇如驚癎状時瘈􅂒若火熏之一逆尚引日再逆促命期此一段至理千古若明若昧未經剖晰全不思既名溫病即是時行外感何又汗之下之火之俱為逆耶蓋熱邪乆蓄少陰腎中精水既為素傷重加寒下火刼陰之法乃為逆耳其自汗出身重多眠睡鼻息鼾語言難者一一皆少陰之本症也膀胱為腎之府故少陰症具若被下則膀胱之陰亦傷而直視失溲者腎精不上榮腎氣欲外奪也若被火刼則陰愈虧而邪愈無制甚則如驚癎狀而時為瘈􅂒也一逆再逆言汗下火之悮可一不可二非汗而又下而又汗之為冄悮也由此觀之冬不藏精之溫症顯然昭著矣昌之比例以分其治而仲景之道愈明矣奚罪耶再按仲景之論悮下有結胸及痞挟熱鶩溏臟寒不禁等症從未説到小便不利直視失溲於此言之者謂腎以膀胱為府素不藏精之人悮下則膀胱益虧以故小便不利直視失溲其變亦倍重於膀胱也况於風邪内熾津液乾燥大便難通之未必通徒令膀胱受累而小便自遺試觀好色之人多成癃淋可類推矣今之醫者亦講於悮下而絶膀胱之化源立取危困之理耶再按發汗已身灼熱者名曰風溫此語將冬不藏精之溫症形容殆盡蓋凡外感之邪發汗已則身熱自退乃風溫之症發汗已身始灼熱者明明始先熱在骨髓發汗已然後透出肌表也至於風溫二字取義更微與内經勞風之義頗同勞風者勞其腎而生風也然則冬不藏精之人詎非勞其腎而風先内熾歟故纔一發汗即帶出自汗身重多眠鼻鼾語難諸多腎經之症設不發則諸症尚隱伏不盡透出也夫腎中之風邪内熾而以外感汗下及火攻之法治之寧不促其亡耶後人不知風溫為何病反謂溫症之外更有風溫濕溫溫毒溫疫四症觀其言曰重感於風變為風溫則是外受之邪與身重鼻鼾多眠少語之故絶不相渉可知是夢中説夢也尚論及此聊自慊耳客有難昌者曰内經論冬傷於寒寒毒藏於肌膚感春月之溫氣始發故名曰溫病未嘗言寒毒感藏於骨髓今謂冬不藏精者寒邪藏於骨髓或未盡然耶昌應之曰此正内經之言非余之臆説也黄帝問温瘧舍於何臟岐伯曰溫瘧得之冬中於風寒氣藏於骨髓之中至春則陽氣大發邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或有所用力邪氣與汗皆出此病藏於腎其氣先從内出之於外也如是者陰虚而陽盛則熱矣衰則邪氣復反入入則陽虚虚則寒矣故先熱而後寒名曰溫瘧由是觀之溫瘧且然而况於溫病乎客始唯唯昌按熱邪乆伏腎中其症與第一例自不相同其發熱也皆從骨内鬱蒸而出皮間未熱而耳輪上下已先熱矣始發之時多兼微寒不似第一例之全不惡寒以少陰居北方寒水之位也及至大熱灼肌多不甚渇不似第一例之大渇以熱邪初動而陰精尚足持之也其後則不惡寒而甚渇與第一例之症渾無别矣然雖無别究竟表裏不同標本互異始先用藥深入腎中領邪外出則重者輕而輕者即愈矣奈何其義隱而不彰即以叔和之明未嘗抽引其緒為後人旁通一線昌何人斯顧敢恣譚無忌然而逺囂三十餘載驅逐睡魔晝夜不敢倒身因是冥悟一斑即取仲景少陰傷寒之例推演為治溫之例未嘗以己意混入一字也引例如左一少陰病始得之反發熱脉沉者麻黄附子細辛湯主之仲景原文昌按脉沉病在裏也而表反發熱則邪雖在表而其根源實在裏在裏之邪欲其盡透於表則非専經之藥不可故取附子細辛以匡麻黄為溫經散邪千古不易之正法奈何後人全不知用明明見脉沉身重嗜卧倦語之症即知為風溫又知為冬不藏精尚且漫用三陽經之表藥屢表不應十中不能活一復諉之傷寒偏死腎虚人是則是矣但不知果行溫經散邪而人死耶抑未行溫經散邪而人死也噫業傷寒者之託専門直是操刃之凶人寧但為芄蘭之童子已矣二少陰病得之二三日麻黄附子甘草湯微發汗以二三日無裏症故微發汗也原文昌按麻黄主散邪附子主溫經二者皆大力之藥也前症發熱脉沉則表裏俱急惟恐二物不勝其任更加細辛之辛溫取其為少陰引經之藥而又有辛散之能以協贊二物共建竒功也此云無裏症非是并脉沉嗜卧等症俱無也但無吐利燥煩嘔渇之症耳似此則表裏俱不見其急而麻黄附子二物尚恐其力之太過故不用細辛以助之而反用甘草以和之也謹并製方之意嘔心相告凡治冬不藏精之溫症始發二三日間請决擇於斯二方焉三病發熱頭疼脉反沉若不瘥身體疼痛當救其裏宜四逆湯原文昌按此一叚文義可得仲景治冬不藏精之奥旨病發熱頭疼症見於表矣而脉反沉則病又在裏矣兩有可疑也既發熱頭疼勢必先治其表若不瘥則治表無益矣凡治表者皆治其陽也陰病治陽豈惟無益將見陰中之真陽因之外越而身體反加疼痛一團陰寒用事矣此所以當用四逆湯而急囘其在經之陽也再按若不瘥三字甚活蓋發熱頭疼表之原不為悮但一切三陽經表藥俱不對症惟麻黄附子細辛湯與麻黄附子甘草湯二方始為少陰經對症之表藥而又不敢必人之能用所以不説悮表而但説若不瘥正是表藥中原有瘥法也四少陰病脉沉細而數病為在裏不可發汗原文按脉細而數裏熱也發汗則虚其表且亡其津液内熱愈熾五少陰病脉㣲不可發汗亡陽故也陽已虚尺脉弱澁者復不可下之原文昌按前叚云脉沉細數則為熱此云脉㣲則為虚熱而發汗則陰易亡虚而發汗則陽易亡故兩戒之也然則脉不微數者一㮣禁汗不為懲噎廢食耶况於不藏精之症邪發之初未必即見㣲數之脉惟可用麻黄附子二方而不知用馴至脉微且數則汗下溫三法皆不可行而陰絶陽離有立而待斃耳六少陰病欬而下利讝語者被火氣劫故也小便必難以强責少陰汗也原文昌按少陰少血强責其汗是刼奪其血也小便難者源先竭也再按少陰病强汗則小便必難悮下則小便不利直視失溲可見腎以膀胱為府臟病而府未有不病臟傷則府先告絶也傷寒症中云直視讝語循衣撮空小便利者其人可治則是少陰之臟氣絶與不絶全於小便之利與不利窺其中藏孰謂冽彼之下泉非囘枯澤槁之善物哉七少陰病脉𦂳至七八日自下利脉暴微手足反溫脉𦂳反去者為欲解也雖煩下利必自愈原文昌按邪在陰者多自利自利則邪氣湧正氣而脫者多矣其候必脉𦂳數而四肢逆冷今脉𦂳去而但微則陰邪已散手足溫則真陽未傷雖有心煩下利之危急而可直决為必愈蓋陰陽不相乖亂則别無死法也然非腎氣素旺受邪原輕者不易得之數矣再按此與邪在陽脉數而熱得汗而脉和身凉數去為欲愈之意同然陽病輕而從汗解則易陰病重而從利解則難所以仲景於陽邪内䧟下利不止之症惟用逆流挽舟之法挈裡邪還之於表則利不治而自止也此叚見陰邪從陰分解散原属順便但少陰臟氣堪為主人送出客邪尚恢乎有餘地則善也而不藏精者日為床褥作主人安望重關設險以待暴客乎八少陰病八九日一身手足盡熱者以熱在膀胱必便血也原文按膀胱為腎之府腎邪傳膀胱則裏熱逹表故一身手足盡熱也太陽多血為熱所亂則血出於二便然比之少陰少血悮動其血而從口鼻耳目出者則天淵矣再按熱邪雖從便血而解經年調理陰氣難復况既開血一竇漫無止期何如一身手足方熱之頃預識勢所必至而亟圖之於早耶奪膀胱熱用桂枝大黄入四苓散九少隂病欲吐不吐心煩但欲寐五六日自利而渴者虚故引水自救口燥舌乾症具小便色反白者下焦虚有寒也勿認為熱以致悮原文此一叚因仲景原文難解昌會其意而言之也按冬不藏精之症此一叚最肖仲景蚤已欲人辨識之矣十病人脉陰陽俱𦂳反汗出者亡無也陽也無陽以為之外䕶也此属少陰法當咽痛而復吐利原文按冬不藏精之症此一叚更肖少陰為水臟吐利者陰盛而水無制也春溫中篇諸方兹篇得十二法溫經散邪一法麻黄附子細辛湯麻黄附子甘草湯二方之意前已論明溫經一法附子湯治得病一二日口中和背惡寒者治身體痛手足寒骨節痛脉沉者附子溫經散寒人参補氣囘陽芍藥收陰茯苓及术制水燠土急溫一法四逆湯治寒邪深入於裏者治膈上有寒飲乾嘔者陰邪深入則微陽必遭埋没陰邪上干則微陽必致飛騰故宜急溫恐少遲則不及也急溫則無取於囘䕶矣然以甘草為君以乾姜附子為臣正長駕逺馭俾不至於犯上無等無囘䕶中之囘䕶也通陽一法白虎湯治陰寒下利蔥白為君乾姜附子為臣以在經之陰極盛格拒其陽於外而不納故取用於蔥白以通陽氣而使陰氣自斂見睍曰消之義也白通加猪胆汁湯治下利脉微及厥逆無脉乾嘔煩者呼吸存亡之際恐陽藥不能直逹故加人尿猪胆法之陰以為向導服湯脉暴出者死微續者生通脉四逆湯治下利清榖裏虚外熱手足厥逆脉微欲絶身反不惡寒其人靣赤色或腹痛或乾嘔咽痛或利止脉不出者即前四逆湯而倍乾薑加蔥白也不惡寒靣色赤而外熱者加蔥白以通陽氣腹中痛者真陰不足去蔥白加芍藥嘔者加生姜咽痛者去芍藥少加桔梗利止脉不出者陽氣未復去桔梗加人参溫胃一法吳茱茰湯治吐利手足厥冷煩燥欲死者桃花湯治二三日至四五日腹痛小便不利下利不止便膿血者胃虚土寒不能制水而下焦滑脫故用乾姜粳米之辛甘以佐赤石脂也灼艾助陽一法一二日口中和背惡寒者即宜服附子湯并用灸法以助陽吐利手足不逆冷者不死脉不至者灸少陰七壯下利脉微澁嘔而汗出數更衣反少者陽虚而氣下墜血少而勤努責也宜灸頂門之百會穴以升舉其陽也溫經鎮水一法真武湯治腹痛小便不利四肢沉重疼痛自下利者或欬或小便利或嘔者真武北方司水之神也陰邪熾盛水泉泛溢得真武則可以鎮攝而安其位也和陰一法黄連阿膠湯治心煩不寐者少陰本欲寐反心煩不寐熱甚而裏不和也芩連除熱雞子黄阿膠少佐芍藥以和血而生不足之真隂也急下一法大承氣湯治二三日口燥咽乾者二三日病始發便有腎水枯竭之象不急下將何救耶治自利清水色純青心下痛口乾燥者腎中之邪摶水而變青熱之極也心下痛者水氣上逆也水氣上逆而口反乾燥則枯涸有立至矣故當急下治六七日腹脹不大便者腹脹不大便胃實可知水臟受病加以土實則水必竭故當急下消解一法四逆散治四肢微逆或欬或悸或小便不利或腹中痛或泄利下重者四肢微冷則熱未深故用柴胡解之枳實泄之甘草和之而最要加芍藥以收其陰也咳者加五味子乾姜并主下利悸者加桂枝小便不利者加茯苓腹中痛者加附子泄利下重者加薤白煮汁煎散分利一法猪苓散治下利不止咳而嘔渇心煩不得眠者取其水榖分則利自止利止則嘔渴心煩不待治而自愈然不藏精而膀胱之氣不化者又在所禁清咽一法甘草湯桔梗湯半夏湯治風挾痰熱者苦酒湯治咽中生瘡語聲不出者溫症下篇謹將冬傷於寒又兼冬不藏精春月同時病發定為一大例昌按冬既傷於寒冬又不藏精至春月兩邪同發則冬傷於寒者陽分受邪太陽膀胱經主之冬不藏精者陰分受邪少陰腎經主之與両感傷寒症中一日太陽受之即與少陰俱病則頭痛口乾煩滿而渇之例纎毫不差但傷寒症自外入内轉入轉深故三日傳徧六經溫症自内達外既從太陽之户牖而出勢不能傳徧他經表裏只在此二經者為恒也若更挾外邪從太陽少陰經中二日傳陽明太陰三日傳少陽厥陰則臟腑之邪交熾不俟六日即死矣蓋太陽少陰邪發之日正已先傷外邪復入正氣又傷即與再傳無異臟腑之氣幾何决無可供三傳之理也但既是溫症表裏横發重復感受外邪者十中無一所以溫症兩感之例原有可生之理昌治金鑑一則先以麻黄附子細辛湯汗之次以附子㵼心湯下之兩劑而愈可見仲景法度森森具列在人之善用也今人見熱煩枯燥之症而不敢用附子者惡其以熱助熱也孰知不藏精之人腎中陽氣不鼓精液不得上升故枯燥外見纔用附子助陽則陰氣上交於陽位如釜底加火則釜中之氣水上騰而澗澤有立至者仲景方中輒用附子一枚今人一錢亦不敢用總由其識之未充耳昌亦非偏重溫也以少陰經之汗下與他經不同如治金鑑先以溫法及汗法一藥同用次以溫法及下法一藥同用而收功反掌蓋舍二法别無他法也設汗藥中可不用溫下藥中可不用溫是與治傷寒陽邪之法全無差等矣昌之分溫症為三例者道本自然其不以牽强穿鑿取後世之訿議也明矣再按冬傷於寒又不藏精春月病發全是半表半裏之症乃以半表半裏藥用之病不除而反増所以者何此症乃太陽少陰互為標本與少陽之半表半裏絶不相渉也然隨經用藥箇中之妙難以言傳蓋兩經俱病從太陽汗之則動少陰之血從少陰溫之則助太陽之邪仲景且謂其兩感於寒者必不免於死况經粗工之手尚有活命之理耶所云治有先後發表攻裏本自不同此十二字秘訣乃兩感𫝊心之要即治溫萬全之規聖言煌煌學者苟能叅透此關其治兩感之溫症十全八九矣表熱裏寒者脉雖沉而遲手足微厥下利清榖此裏寒也所以陰症亦有發熱者此表解也表寒裏熱者脉必滑身厥舌乾所以少陰惡寒而踡此表寒也時時自煩不欲厚衣此裏熱也仲景原文按此叚文義論溫症全以少陰腎與太陽膀胱分表裏昌所謂太陽與少陰互為標本者得此而為有據矣其云所以陰症亦有發熱者此表解也言當先從表解也即麻黄附子細辛湯之例也脉滑表寒也身厥舌乾裏熱也惡寒而踡宜行溫散時時自煩不欲厚衣又宜凉解用藥如此繁難正與兩感症中治有先後發表攻裏本自不同之義互見正欲學者之以三隅反也又云少陰病惡寒而踡時自煩欲去衣被者可治又云手足溫者可治雖不出方大段見陰陽不甚乖離尚可調其偏以協於和之意設惡寒而踡更加下利手足逆冷則無陽而偏於陰矣更加脉不至不煩而燥則陽去而陰亦不存矣所以用藥全在臨時較量果其陰盛陽微即以溫為主果其陽盛陰微即以下為主果其陰陽錯襍溫下兩有所礙則参伍以調其偏勝為主也當從表解之義前已申明然亦必邪勢正熾陰陽尚未全虧方可溫經散邪若夫滋蔓難圖任行背水之陣必無僥倖矣此等處皆是危疑關頭雖仲景之聖不敢輕出一方以膠治法之圓機所貴明理之彦師其意而自為深造耳少陰中風脉陽微陰浮者為欲愈原文觀此一條而認脉辨症之機亦甚昭著矣陽微陰浮為欲愈則病發之時陽盛陰𦂳可知也陽盛則治先腑陰𦂳則治先臟又可知也既盛且𦂳則恭之外症以分緩急又可知也倘陽已微而陰不浮者更當治其陰亦可知也倘陰已浮而陽不微者更當治其陽亦可知也此昌之尚論毎於仲景言外透出神髓以自慊也仲景用桂枝以和營衛而解肌此定例也不但為太陽經中風之本藥即少陰經之宜汗者亦取用之其最妙處在用芍藥以益陰而和陽太陽經之營衛得芍藥之酸收則不為甘溫之發散所逼而安其位也至若少陰則更為陰臟而少血所以强逼少陰汗者重則血從耳目口鼻出而厥竭可虞輕亦小便不利而枯涸可待用藥自當比芍藥之例而倍加陰以益陽昌毎用桂枝必加生地以佐芍藥之不逮三十年來功效厯厯可紀蓋得比例之法也仲景於冬月太陽中風之症而用桂枝為例不為春月之病溫者設也春月病溫用桂枝勢必佐之以辛凉而不藏精之溫属在少陰不得不用桂枝之溫解之以少陰本陰標寒邪入其界非溫不散也豈惟桂枝甚則麻黄附子在所必用所貴倍加陰藥以輔之如芍藥地黄猪胆汁之類是也今人未達此理但知惡藥性之溫㮣以羗活柴葛為表則治太陽而遺少陰屢表而病不除究竟莫可奈何而病者無幸矣紛紛為仲景解嘲之説然乎否耶謹定擬冬傷於寒冬不藏精之症名曰兩感溫症按傷寒少陰症乃從三陽經傳入者此症乃少陰與膀胱經一臟一腑自受之邪故三陽傳入之例多不合惟兩感之例一日太陽受之即與少陰俱病其例脗合然仲景又不立治法但曰治有先後發表攻裏本自不同是則一藥之中决無兼治兩經籠統不清之法矣而治有先後於義何居昌嘗思之傳經之邪先表後裏直中之邪但先其裏溫症之邪裏重於表兩感之邪表裏不可預擬惟先其偏重處假如其人陰水將竭真陽發露外見種種燥擾之症加以再治太陽之邪頃刻亡陽而死矣是必先溫其在經之陽兼益其陰以培陽之基然後乃治其太陽之邪猶為庶幾也此則與少陰宜溫之例合也又如其人平素消瘦兼以内鬱之邪灼其腎水外現鼻煤舌黑種種枯槁之象加以再治太陽頃刻亡陰而死矣是必急下以救將絶之水水液既囘然後乃治太陽之邪猶為庶幾也此則與少陰宜下之例合也又如其人邪發於太陽經者極其勢迫大熱惡寒頭疼如劈腰脊頸項强痛莫移胸高氣喘種種危急溫之則發斑發狂下之則結胸讝語計惟有先從太陽經桂枝之法解之解已然後或溫或下以去其在陰之邪也此則當用太陽經之表例而與少陰可汗之例畧同也詎非先後攻發之可預擬者耶但兩感傷寒之攻裏單取攻下原不兼溫而兩感溫症之裏亡陽之候頗多不得不兼溫與下而並擬之也此又變例而從病情者也按太陽少陰兩感之溫症其例雖與兩感傷寒一日太陽與少陰俱病相合其實比傳經之邪大有不同蓋傷寒之邪三日傳徧六經故為必死之症而溫病乃内鬱之邪始終只在太陽少陰二經不傳他經者為多是則非必死之症也惟治之不善乃必死耳倘用汗下溫法先後不紊則邪去而正未傷其生固可必也又有邪未去而正先亡惟藉他經供其絶乏久之本臟復榮亦以得生者總宜分别視也按亡陽一症在傷寒則悮發太陽經汗與悮發少陰經汗者多見之他經汗悮則不然可見兩感之溫症為太陽少陰雙受之邪設舍溫經散邪而單用汗藥者其亡陽直在頃刻間耳蓋陽根於陰深藏北方腎水之底素不藏精之人真陰既耗則真陽之根淺而易露若不以溫經之法嘿䕶其根而但用甘溫發散之藥是以陽召陽隨感即赴不待蓋覆而淋漓不止矣可不懼哉按亡陰一症在傷寒則邪傅陽明當下而不下致津液暗枯邪傅少陰當下而又不下致腎水暗枯其亡也以漸尚有急下一法可救若在不藏精之溫症則腎水已竭之於先而邪發之日陰邪必從下走勢自下利奔迫是下多尤足亡陰而又絶無補法可以生陰金匱云六腑氣絶於外者其人惡寒五臟氣絶於内者則下利不禁臟者陰也陰氣欲絶詎非亡陰之别名乎神哉仲景之書既詳不藏精之症又出不藏精之治特未顯然挈示後人不維其義耳即如桂枝一湯本為太陽中風設也而汗下和溫已具於一方之内至於溫法尤為獨詳如加附子加人参白术乾薑甘草加桂心茯苓蜀漆紅花等類豈太陽表症中所宜有乎惟病有不得不先溫經又不得不兼散邪者故以諸多溫經之法𨽻於桂枝項下一方而兩擅其用與麻黄附子細辛湯同意凡遇冬不藏精之症表裏之邪交熾陰陽之氣素虧者按法用之裕如也春溫下篇諸方兹篇得十五法連前共三十法合前四卷共足三百九十七法桂枝領邪一法桂枝加生地湯清表溫中一法桂枝加人参湯清陽㵼火一法桂枝加大黄湯脉浮先表一法桂枝湯先溫後表一法治下利清榖不止身疼痛者先用四逆湯急救其裏救後清便自調但身痛者隨用桂枝湯急救其表此見下多則陰邪亦從陰解故溫後但解其陽邪不必兼陰為治溫經止汗一法桂枝加附子湯汗後惡寒一法芍藥甘草附子湯收陰固陽表虚下後惡寒一法桂枝湯去芍藥加附子陽虚汗後惡熱一法調胃承氣湯胃中乾實汗後裏虚一法桂枝新加湯汗後身疼痛脉沉遲汗後發悸二法桂枝甘草湯治心下悸欲得人按茯苓桂枝甘草大棗湯治臍下悸汗後腹脹一法厚朴生薑甘草半夏人参湯晝夜静躁一法汗下後表虚惡寒裏虚脉微細日輕夜重者以救陰為主宜桂枝加紅花湯日重夜輕身無大熱者以救陽為主宜乾薑附子湯悮汗變逆一法本脉浮而症見汗出心煩微寒脚攣之候纔服桂枝湯即便厥冷咽乾煩燥吐逆者乃陽虚而陰獨盛也先與甘草乾薑湯以復其陽俟厥愈足溫更與芍藥甘草湯行陰寒凝滯之血以伸其脚若陽虚陰盛其變愈大者但用四逆湯以溫經囘陽而不兼陰為治也附辨溫症合偶感之客邪以明理而闢謬諸家方書謂溫症之外復有四症一曰脉陰陽俱盛重感於寒者變為溫瘧一曰陽脉浮滑陰脉濡弱者更遇於風變為風溫一曰陽脉濡弱陰脉實大者更遇溫熱變為溫毒一曰陽脉濡弱陰脉弦𦂳者更遇溫氣變為溫疫據其援脉以辨症而為治溫者推廣其端似乎新竒可喜詎知辭不達意徒足炫人所以後人一得之長逈不及於古人此等處關係病機最鉅昌不得不并明其理焉蓋春溫夏熱秋凉冬寒各主一氣者其常也然天氣不可以長拘所以夏氣亦有清凉之時冬氣亦有燠熱之時凡此皆謂之客氣也本溫症而重感於寒其病即兼冬氣而為溫瘧本溫症而重感於熱其病即兼夏氣而為溫毒本溫症而重感於時行不正之氣其病即兼不正之氣而為溫疫原無所變也乃謂某病忽變某病不令人炫而且駭乎又且長夏之濕氣春分後早已先動最能與溫氣相合而為濕溫之症何以四症内反不並舉又且溫瘧一症内經明説是冬月邪入骨髓至春夏始發何得妄説春月重感於寒又且更遇於風變為風溫一症頭上安頭夢中説夢尤為無識蓋春月厥陰風木主事與時令之溫不得分之為兩凡感而病者皆為風溫之病也即如初春之時地氣未上升無濕之可言也天氣尚微寒無毒之可言也時令正清和無疫之可言也而所以主病者全係於風倘除風溫另為一症則所以病溫之故為何故耶試觀仲景於冬月之病悉以傷寒之名統之其觱發之風寒栗烈之寒氣總為一寒則春月之風寒風熱風濕總為一風并可知也夫風無定體者也在八方則從八方在四時則從四時春之風溫夏之風熱秋之風凉冬之風寒此自然之事也仲景於溫症篇首即特掲風溫之名以綱衆目其晰義之精為何如耶顯明道理一經後人之手便將風與溫分之為二况與精微之奥乎兹特辨之以見治溫之法原為切近平易而非有奇特也溫瘧主治溫瘧病脉尺寸俱盛先熱後寒者宜小柴胡湯先寒後熱者宜小柴胡加桂湯但寒不熱者宜柴胡加桂薑湯但熱不寒者宜白虎加桂湯有汗多煩渇小便赤澁素有瘴氣及不服水土嘔吐甚者宜五苓散溫毒主治溫毒為病最重溫毒必發斑宜人参白虎湯竹葉石膏湯𤣥参升麻湯黒膏清氣凉血溫疫主治人參敗毒散温疫病陽脉濡弱正虚也隂脉弦𦂳邪實也正虚邪實則一團外邪内熾莫能觧散病固纒身為累而目前不藏精之人觸其氣者染之尢易所以發表藥中宜用人參以領出其邪寓意草中論之已悉兹不復贅尚論後篇卷一
