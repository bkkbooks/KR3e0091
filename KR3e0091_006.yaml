body:
  text: 尚論後篇卷二新建喻昌撰尚論四時冬天干始於甲地支始於子故尚論四時以冬為首凡春夏秋三時之病皆始於冬故也先王以至日閉關商旅不行后不省方者法天之閉藏與民休息俾無夭札也然而髙人趟雪空山而內藏愈固漁父垂釣寒江而外邪不侵以藏精為禦寒乃稱真禦寒矣內經謂冬不藏精春必病溫諄諄垂誡後世紅爐暖閣醉而入房反使孔竅盡開內藏發露以致外寒乘間竊入所以傷寒一症最凶最多仲景於春夏秋三時之溫熱病悉以傷寒統之者蓋以此也吾人一日之勞設不得夜寢則來日必加困頓農夫一歲之勞設不為冬藏則來年必至缺乏况乎萬物以春夏秋為晝以冬為夜至冬而歸根伏氣莫不皆然豈以人為萬物之靈顧可貿貿耶特首揭之且以動良士之瞿瞿也趟音厰春天地之太德曰生德流化溥而人物生焉者也春秋首揭春王正月雖重王道而天德人理統括無餘春於時為仁仁者人之心也故生而勿殺豫而勿奪賞而勿罰心上先有一假太和之意然後與和風甘雨麗日芳時百昌庶類同其欣賞一切乖戾之氣不軀自逺更何病之有哉乃縱肆輩日飲食於天地之陽和而不禁其暴戾恣睢之習此其心先與凶惡為伍凡八風之邪四時之毒咸得中之及至病極無奈乃始忍性以冀全生終屬勉強而非自然如石厭草逢春即芽如木藏火逢鑽即出惟廓然委順嗒然喪我者病魔潛消而精氣漸長猶為近之故法天地之生以養生者為知道也風者善行易入之物為百病之長大率風之傷人先從皮毛而入以次傳入筋骨臟腑內虛之人與外風相召如空谷之應響大塊之噫風未動而已先覺若星搖燈閃可預徵者故體虛之人避風如避箭者偶不及避當睜努以捍其外熱湯以溉其內使皮毛間津津潤透則風邪隨感即出不為害矣然外雖避風而內食引風之物而招致尤為不淺善治風者必權衡於風入之淺深逐節推引而出然亦須兼治痰痰不堵塞竅隧則風易出也至于痰熱積盛有自內生風之候則與外感之風逈隔天淵若以外感法治之如羌防之屬則內愈虛風愈熾每至不起與內傷病以外感藥治其誤同也夏熱者天時之氣也暑者日之毒也濕者地之氣也夏月天時本熱加以地濕上騰是以庶類莫不繁茂然而三氣相合感病之人為獨多百計避之不免亦惟有藏精一法可恃耳昌謂夏月藏精則熱邪不能侵與冬月之藏精而寒邪不能入者無異也故春夏秋三時之病皆起於冬而秋冬二時之病皆起於夏夏月獨宿兢兢隄防金水二臟允為攝身儀式矣每見貴介髫齡之子夏月出帷納涼暗中多開欲竇以致熱邪乘之傷風咳嗽漸成虛祛尫瘦等病者甚多有賢父兄者自宜防之於早矣人之居卑隩觸山嵐冒雨暘著汗衣卧氷簟飲涼水食瓜果受內鬱皆能使濕土受傷若以秋瘧但為受暑遺却太隂濕土受傷一半至冬月咳嗽反以為受於濕而以燥治之不為千古一大誤耶夏月汗多真陽易徹津少真隂易消為內傷諸病之始秋金繼長夏濕土而生其氣清肅天香遍野地寶垂成月華露湛星潤淵澄酷熱之後得此髙秋薦賞與嚴寒之後而得陽春敷和同為一歲不可多得之日蓋金性剛金令嚴繁茂轉而為蕭疏矣燠熱轉而為清冷矣以故為時未幾而木萎草枯水落石出時愈冷則愈燥以火令退氣已久金無所畏而得以自為也故燥金之令不可傷傷之則水竭液乾筋急瓜枯肝木暗摧去生滋逺故凡肝病之人宜無擾無伐以應木氣之歸藏木氣歸藏燥金即能萎其枝葉而不能傷其根本及秋金才生冬水早已庇木之根以故木至春而復榮者榮於冬月之胎養也夫生中有殺殺中有生亦自然而然之理人在氣交之中能隨天地自然之運而為節宣則不但無病而且難老豈舍此而更有延年之術哉若夫燥金自受之邪為病最大以夏火之尅秋金為賊邪故暑熱濕之令金獨傷之暑熱濕之病金獨受之古人於夏月早已淡泊滋味惡其濕熱傷肺且不欲以濁滯礙清道也然形寒飲冷尤為傷肺雖夏月之乘涼亦不可過况入伏已深尚啖生冷冒風露而無忌寧不致肺之病耶故夏三月所受之熱至秋欲其散不欲其收若以時令之收兼收其熱則金不生水而轉增燥安得不為筋脈短徑濁渴枯損之導為冬月咳嗽之根耶論治病必本於四時餐泄病既謂春傷於風夏生餐泄矣又曰長夏兼病洞泄寒中又曰逆秋氣者冬必餐泄其言錯出無定人不易會不知病名雖同而其因濕因寒則各不相同故治病不本於四時無能治也春傷於風夏生餐泄解春傷於風夏生餐泄從來解説不明昌謂風邪傷人必入空竅惟腸胃為最所餐之食由胃入腸胃空而風居之少頃糟傳去腸空而風亦居之風既居於腸胃則其導引之機如順風揚帆不俟脾之運化食入即出以故餐已即泄也不知者以為脾虛完穀不化用長夏洞泄寒中及冬月餐泄之法反以補脾剛燥之藥助風性之徑有泄無已每至束手無策倘知從春令治之仍以桂枝領風從解肌而出一二劑可愈也識此意者雖三時之傷於風者亦可會而通之夏傷於暑長夏傷於濕秋必痎瘧解自二月以至七月地氣動則濕用事自八月以至正月地氣靜則燥用事所以春夏多病瘧者可知傷熱傷暑未有不傷濕者也所以秋冬多有咳嗽者傷風傷寒未有不兼傷燥者也秋傷於燥冬生咳嗽解秋月之金生冬月之水然金必寒始能生水水必冷始不為痰故冬月之咳嗽必由於秋令之燥也然而夏月化土之氣不先傷於肺則秋月何燥之有昌故謂秋冬二時之病皆始於夏夏月藏精則熱邪不能侵也夫池沼之間暑且不到豈有內藏之泓然真水而暑熱之邪得傷其肺者哉故火邪不能爍金而金始冷也金寒則氣清而不上逆水冷則質清而不成痰更何咳嗽之有哉論內經四時主病之脫誤內經云春傷於風夏生餐泄夏傷於暑秋必痎瘧秋傷於濕冬生咳嗽冬傷於寒春必病溫春冬二季風寒之病可無疑矣其夏傷於暑秋必痎瘧一語釋云暑汗不出至秋涼氣相薄而為寒熱往來之瘧蓋以經文原有當暑汗不出者秋風成瘧之説故引之而為注不知於理欠通也夫夏月之暑合於長夏之濕始為秋時之瘧所以瘧症名曰脾寒由傷於長夏之濕土為多若謂専屬傷暑則人之深居靜攝未嘗傷暑秋亦病瘧者又謂何所傷耶至秋傷於濕冬生咳嗽一語釋云秋傷於濕濕蒸為熱熱者火也至冬寒與熱搏當為咳嗽之症則牽強不通之極矣夫濕無定體者也春夏曰風熱之濕秋冬曰涼寒之濕惟夏月之暑熱濕三氣相合始可名之為熱豈有至秋之涼而反蒸為熱之理况乎濕者水類所以水流濕也燥者火類所以火就燥也指燥為濕是指火為水矣顛倒不已甚乎今為正經文之脫簡增入一語曰春傷於風夏生餐泄夏傷於暑長夏傷於濕秋必痎瘧秋傷於燥冬生咳嗽則六氣配四時之旨燦然中天矣加長夏之濕而秋病之源始清易秋月為燥而諸家指為熱火之訓亦不謬請冉以素問之旨明之素問云天有春夏秋冬之四時金木氷火土之五行於生長化收藏而寒暑燥濕風火之六氣從兹而生焉蓋春屬風木主生夏屬熱火主長長夏屬濕土主化秋屬燥金主收冬屬寒水主藏可見造物全賴濕土生化之一氣而木火金水始得相生於不息雖土無正位四季之中各分旺一十八日然無長夏十八日之土則相生之機息矣故長夏之土為生秋金之正土春秋冬之分𨽻者不得與之較量也此義既明則秋月燥金主收之義始明而冬月之咳嗽為傷秋金之燥不為傷秋之濕也亦自明矣再觀素問云逆春氣則傷肝木肝木不能生夏時之心火至夏有寒變之病逆夏氣則傷心火心火不能生長夏之脾土脾土不能生秋時之肺金至秋有痎瘧之病逆秋氣則傷肺金肺金不能生冬時之腎水至冬有餐泄之病逆冬氣則傷腎水腎水不能生春時之肝木至春有痿厥之病是則三時之病當更互言之而秋之病瘧未嘗更也其必以心火脾土並言則長夏之傷於濕誠為經文當日必有之言而非昌之臆説也明矣論春秋冬各主一氣夏月兼主三氣之理原為天時自然之運內經云彼春之溫為夏之暑彼秋之忿為冬之怒明乎溫熱寒涼循序漸進自然而然者乃天運之常也後之俗子輒以風寒暑濕分𨽻四時此緣經文脫悮秋傷於燥一假傳習至今不察耳曷不曰風寒暑燥猶為近耶蓋濕土無定位寄旺於四季各一十八日風寒暑燥之內不言濕而濕自在也然亦但倣洛書五數居中縱橫各得之理以立言若論天時自然之運如環無端豈有甫終一運重轉土運十八日五運而為八轉者乎此其道惟以六氣之配而始明蓋三百六十日五分之各得七十二日則為五運六分之各得六十日則為六氣自小雪至大寒六十日屬太陽寒水之氣自大寒至春分六十日屬厥隂風木之氣自春分至小滿六十日屬少隂君火之氣自小滿至大暑六十日屬少陽相火之氣自大暑至秋分六十日屬太隂濕土之氣自秋分至小雪六十日屬陽明燥金之氣此則水木火土金相生不息之義也可見冬季大寒後十八日之土即從太陽寒水之氣為用故能生厥隂之風木而春季榖雨後十八日之土早已屬少隂君火之所生而不從木風為同類又加仲夏少陽相火重生其土至長夏大暑後其土之盛為始極而為生金之正土矣未立夏之前氣已從火既立秋之後氣上從土火土之氣共管一百八十日分歲之半昌所謂夏月三氣相合與冬春秋之各主一氣逈乎不同者正以天時自然之運而知之也豈故為牽強其説以欺人哉但君相二火之分即與濕土合司其化所以夏月暑熱中有濕濕中有暑熱自春分至秋分有極濕之時有極熱之時又有濕熱交蒸之時雖云長夏建未之月濕土主事其實已行半年之久矣夫春分後土膏地溽濕行半年不謂之濕直至秋後土乾地燥反謂之濕昔賢以訛傳訛其因仍苟簡為不少矣可無論歟熱濕暑三氣同於夏月見之直所謂同氣相求也蓋熱而益之以暑則熱為甚酷爍石流金亦云僅矣然但為乾熱已也得隂涼尚可避之若加以濕而與炎威相會盡大地為蒸籠礎磉流膏蟣虱悉出衣表無可避也必俟金風動而暑始退惟風動勝濕故也三氣相兼之義益可見夏日較他時獨永而南方正明之位天皇獨密造化活潑之妙非圓機之聖人曷足以知之論逆四時之病為自取其殃四序之中當溫而溫當熱而熱當涼而涼當寒而寒以生以長以化以收以藏四時極正之氣民物原無疴疹乃有違天而召戾不可救藥者甚多內經云逆冬氣則傷腎奉生者少逆春氣則傷肝奉長者少逆夏氣則傷心奉收者少逆秋氣則傷肺奉藏者少其逆四季土旺之氣則傷脾奉化者少言外自寓造物不與人忤而人自逆之也逆之之情久而彌錮如暴戾忿恨之人始焉但覺肝氣有餘終歲擾亂一旦不足則尫贏無似更有何氣可奉他藏耶所謂違天者不祥人不可以不知也四序之中有與病相鄰者善保生者宜默杜其機如春氣在頭頭間之氣倍旺於他部氣旺則血充血充則易至於溢出故春病善􅍠衄其所損也多矣內經云上者下之誠知春氣之在頭也每日引而歸諸丹田氣海之內且氣機雖發揚而吾心不可無蕭瑟之應不則微用苦降之藥以通其氣凡此皆所謂默杜其機者也若俟􅍠衄淋漓尚不知其所來則無具甚矣􅍠音求鼻間窒塞也衄音忸鼻間出血也論四時制勝之道素問云風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡瀉可見凡人感受四時偏勝之氣而成病者原各不同感風氣勝者則體從之而動焉如振掉搖動之類是也感熱氣勝者則體從之而腫焉凡癰腫之類是也此與寒傷形形傷腫之腫不同與熱傷氣氣傷痛之意直互見感燥氣勝者則體從之而乾焉如津液枯涸皮毛燥濕之類是也感寒氣勝者則體從之而浮焉即所謂寒傷形形傷腫者是焉感濕氣勝者則體從之而濡瀉焉脾惡濕喜燥濕氣大過則土不勝水而濡瀉之病作也六元正經又謂甚則水閉跗腫亦見土不勝水則不能外輸膀胱而內則為水閉及水氣泛溢四肢而外則為跗腫所以較之濡瀉尤為甚也然而風與燥相鄰風燥又未有不熱者也濕不與燥為鄰其或為寒濕或為熱濕則各隨其體之積纍所造焉但春夏秋三時俱屬風燥熱惟冬時方屬寒則受病者之熱濕多而寒濕少又屬可推矣春屬東方木木太過以西方金制之始得其平故怒多則傷肝惟悲始能勝怒以肺金主悲也風多則傷筋惟燥始能勝風以肺金惟燥也酸多則傷筋惟辛始能勝酸以肺金味辛也夏屬南方火火太過以北方水制之始得其平故喜多則傷心惟恐始能勝喜以腎水主恐也熱多則傷氣惟寒始能勝熱以腎水性寒也苦多則傷氣惟鹹始能勝苦以腎水惟鹹也長夏屬中央土土太過以東方木制之則得其平故思傷脾惟怒勝思肝主怒也濕傷肉惟風勝濕木主風也甘傷肉惟酸勝甘木味酸也秋屬西方金金太過以南方火制之則得其平故憂傷肺惟喜勝憂心主喜也燥傷皮毛惟熱勝燥心主熱也辛傷皮毛惟苦勝辛火味苦也冬屬北方水水太過以中央土制之則得其平故恐傷腎惟思勝恐脾主思也寒傷血惟燥勝寒火勝水也鹹傷血惟甘勝鹹土味甘也夫四時一有太過即以所勝制之內而七情外而六氣五味皆可用之調其偏以協於和可見道本自然而然推之無窮無極總不出其範圍雖有智者莫加毫末也後世識不及古反舍正路不由者何耶問形不足者溫之以氣精不足者補之以味此何解也曰二語者藥之權衡也形充於血隂之屬也隂不足者本當益隂然益隂而隂未能生必溫以氣之陽而隂始生以陽為隂之主也精麗於氣陽之屬也精不足者本當益陽而陽未能生必補以隂之味而陽始生以隂為陽之基也二者皆藥石之權宜亦隂陽互根之妙理也真中合小兒論傷寒真中隂經人之陽氣素弱加以房室過損腠理久疏胃氣久薄瀉利無度者一旦感受風寒之邪正如怯懦之夫盜至全不爭鬭開門任其深入拱手以聽命而已所以其候全不發熱者為多蓋發熱則尚有爭鬬之象邪不得直入無忌也然豈是從天而下大都從胃口而入胃為五藏六府之源邪入其中可以徑奔三隂而從其類以故吐嘔四逆唇青等候亦從胃而先見也失此不治勢必腹痛下利不止漸至卷舌囊縮而死矣有魄汗淋漓而死者孤陽從外脫亦風邪為多也有全不透汗渾身青紫而死者微陽為隂所滅亦寒邪深重也此症隂霾已極以故一切猛烈之藥在所急用不可一毫回護設用藥而加躊躇轉盻天崩地裂矣論真中風傷寒症太陽經之中風者乃風寒暑熱之風自外而入者也真中風之風乃人身自有之風平素藴蓄而一旦內出者也素問云陽之氣以天地之疾風名之可見真中風之病乃人之數擾其陽所致數擾其陽惟房室一事為最房室過勤縱隂不走而陽氣則已動動而不已必漸積於空隙之所而手微麻足或微痺舌或微蹇風信已至而擾其陽者方未已一旦乘虛橫發與大塊噫氣林木振嚮黃沙蔽天白浪翻海者初無少異矣其人安得不卒倒乎逮至卒倒而世醫方引風寒暑濕之風為治一誤再誤外風入而與內風交煽任憑軀偉體堅經年不能少減而成廢人者比比甚有不旬日而告斃者矣可勝嘆哉論真中風大法風既自內而生還須自內而熄欲自內而熄何物是熄風之藥養血乎風亦與之俱養補氣乎風亦與之俱補實腠理乎風亦與俱實將何所取耶養血補氣自不可少而實腠理之藥斷不可用進而求之於法然後不患於無藥也蓋天地間之風得雨則熄所以素問又曰陽之汗以天地之雨名之以雨治風不言治而治在其中以故內風之人腠理斷不可實實則汗不能出也氣血不可不補虛則不足供汗之用也要使元氣足以拒風於腠理之間務如大病退後之人飲湯則汗食粥則汗如此旬日以聽風之自熄然後為當其妙全在助陽而通血脈不取驅風散邪為義與荆防柴葛之輕藥絶不相干世傳以羌防等藥發散一食頃者此但可治偶感之風耳以治內風不去百分之一豈有經年積纍之風而取辦一藥且僅攻皮膚之理哉中風病多見於富貴之人而貧賤少少貧賤之人非無房室也以其勞苦奔走身中之氣時為蒸動才有微無便從汗解而富貴之人身既安逸內風已熾尚圖乘風納涼沐泉飲水以解其熱致陽氣愈遏不舒加以濃酒厚味之熱挾鬱陽而為頑痰阻塞經絡一旦卒然而中漫不知病所由來古今成方雖多辨症全不清切盍觀平人飲醇食煿積至無算全不見其熱者陽氣有權默為運出耳陽氣逼鬱無權勢必轉蒸飲食之物為痰與風相結逮發之時其體盛之人病反加重蓋體盛則陽多陽多則風與痰俱多也孰知其風為本而痰為標耶孰知其陽氣為本而風痰為標耶風痰為標可汗可吐而或者見其昏迷舌蹇以為邪入心臟用牛黃清心之類驅風散痰致陽氣愈遏而成不治甚多夫陽遏在內之人臟腑有如火烙平素喜生冷臨病又投金石覆轍相尋明哲罔悟亦獨何耶陽氣為本勢必絶欲而不更擾其陽病根始拔然而陽氣素動習慣漸近自然多不樂於安養風痰才得少息往往思及欲事略一舉動復從本及末蔓而難圖矣古今無人深論及此惟善保生者見體中痰多風熾無俟病發預為絶欲可矣甚哉人於天地自然之氣機日用不知也天時蒸動之時欲求涼風而不可得風氣乾燥之時欲求微雨而不可得是以多濕之人惡蒸動多風之人惡乾燥者內邪感之而益動也故濕病喜燥藥而忌汗藥風病喜汗藥而忌燥藥充其義以為調攝則居四達之衢而披襟向風起呼吸即通帝座之想者即治濕之良方也處奧隩之室而整冠振衣凛天威不違咫尺之懼者即治風之良方也人苟知此不誠可以却痰而延年耶闢小兒驚風論小兒初生以及童幼肌肉筋骨臟腑血脈俱未充長隂則不足陽實有餘不比七尺之軀隂陽交盛惟隂不足陽有餘也故身內易於生熱熱盛則生痰生風生驚亦所時有彼當日若以四字立名曰熱痰風驚則後人不眩乃以四字難呼節去二字曰驚風遂貽後人以多論以其頭搖手徑也而曰抽掣以其卒口禁腳攣急目邪心亂也而曰搐搦以其脊強背反也而曰角弓反張不知小兒之腠理未密易於感冒風寒凡寒中人必先入太陽經太陽經之脈起於目內眥上額交巔入腦還出别下項夾脊抵腰中是以病則筋脈牽強乃生出抽掣等不通各名而用金石重藥鎮墜以致外邪深入難痊間有體堅症輕而愈者遂以為竒方可傳誤矣又方書有云小兒八歲以前無傷寒以助驚風之説不思小兒不耐傷寒初傳太陽經早已身強多汗筋脈牽動人事昏沉勢已極於本經藥又亂投不能待於傳經解散耳豈為無傷寒乎况小兒易於外感易於發熱傷寒為更多耶是即世所云驚風也所以小兒傷寒要在三日內即愈為貴若待其經盡而解必不能矣又剛痙無汗柔痙有汗小兒剛痙少柔痙多人見其汗出不止神昏不醒遂名之曰慢驚風症而以參耆朮附藥閉其腠理以致邪熱不得外越以為大害所以凡治小兒之熱但當攻其出表不當固其入內仲景原有桂枝法若舍而不用從事東垣內傷為治又誤矣又新産婦人去血過多隂虛陽盛故感冒與小兒無别乃遂相傳為産後驚風尤可笑也然小兒亦實有驚以小兒氣怯神弱凡卒遇怪異形聲及驟然跌仆皆生驚怖其候面青糞青多煩多哭其神識昏迷對面撞鐘放鏡全然不聞不比熱邪塞竅也附論小兒治法大綱小兒冬月深居房幃犯寒邪者恆少而知識未開天癸未動又無不藏精之事然亦有溫症例可互推者經云水穀之氣感則害人六府小兒或因啖乳而傳母熱或亦飲食而中外邪皆從陽明胃經先受繇陽明而外達太陽即與溫症之第一例頗同而平素脾氣受傷者邪氣入胃復乘其脾虛而客之即與溫症之第二例頗同既陽明胃與太隂脾相連之一臟一腑交合為病正傷寒兩感症中二日陽明與太隂受之則有腹滿身熱不欲食讝語之症與溫症之第三例分經雖不同而兩感則頗同也後人造為小兒八歲已前無傷寒之説不思小兒冬月登山入水者尚有之豈遂謂無寒可傷耶即冬月不令受寒豈遂謂無寒可傷耶即冬月不令受寒豈春月并不受時行外襲之氣耶其後又因無傷寒之説凡一切外感俱妄立驚風之名擅用金石重墜反領外邪深入以成不痊之症昌寓意草中已略辨其端但未詳其治也試觀中風卒倒之人邪中脾之大絡則昏迷不醒然則邪熾太隂脾經勢必傳於大絡其讝妄而不知人者夫豈驚風之謂耶祇有慢脾風一説似乎近理然不以外感之名統之則用藥茫無措手兹特比入春溫之例庶推之以及四時而治悉無忒後之赤子可登春臺昌所以乞靈於越人而大暢仲景之旨乎小兒溫症第一例由陽明而太陽自內逹外皆表症但表法原取解肌而不取發汗况於小兒肌膚嫩薄腠理空虛斷無發汗之理仲景於太陽之項背強几几反汗出惡風者用桂枝加葛根湯極得分經之妙桂枝湯主太陽葛根湯主陽明以類推之太陽症多陽明症少則用桂枝湯加葛根陽明症多太陽症少則用葛根湯加桂枝圓機在乎臨症然頸項肩背正二陽所轄之地不明經絡者見其几几然牽強不舒加以目晴上竄手足反張諸多太陽見症而驚風之名自此始矣詎知仲景曰身熱足寒頭項強急惡寒時頭熱面亦目脈赤濁頭面搖卒口禁背反張者痙病也發熱無汗反惡寒者名剛痙發熱汗出不惡寒者名柔痙又曰太陽病發汗過多因致痙可見不解肌而誤發汗者必有此變當解肌而不當發汗之説又顯矣然則小兒之解肌不更當從乎輕劑耶小兒服桂枝不必啜熱稀粥并不可急灌逼其大汗也凡小兒發熱嘔吐者倘未布痘須審諦不可誤用溫胃之藥里中一宗侯髙年一子恣啖不禁每服香砂平胃散極效一夕痘發作嘔誤服前藥滿頭紅筋錯出斑點密攢筋路所謂瓜藤斑也上饒某公一侄病發作嘔乃父投以藿香正氣散一夕舌上生三黑疔如尖栗形舌下四黃疔如牛奶形蓋痘邪正出阻截其路故生變若此因述以垂戒解肌清熱三法桂枝加葛根湯葛根湯桂枝加括蔞湯攻裏救胃一法調胃承氣湯大承氣湯治痙胸滿卧不著席腳攣急齗齒者昌變調胃誤攻邪陷一法桂枝加芍藥湯小兒溫症第二例由陽明而太隂自表入裏仲景云太隂之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸中結鞕可見脾氣虛衰不能為胃行津液必致吐利兼見此俗子藉口慢驚之源也詎知外感之邪入乘其虛上吐下利者即霍亂之意正氣既虛兒因畏怯則有之豈是心虛發驚肝木生風之候耶此等認症一差用藥不合萬無生理蓋脾經之症自有脾經之専藥况於屬在外感仍以散邪為先所以誤下則心下結鞕正謂邪雖已入太隂而陽明未盡除者恐有表症相礙也解肌之法桂枝湯脈浮者用之太隂之脈尺寸俱沉細今見浮則邪還於表仍用解肌之法送出其邪為當也四逆湯自利不渴者用之燠土燥濕理中湯濁氣上干於胃腹脹滿者用之桂枝加大黃湯大實痛者用之然芍藥大黃亦當倍減以小兒胃薄易動也小兒兩感溫症第三例胃脾一腑一臟表裏雙受則在表者為陽邪然既已入於胃即當愛惜津液即不得已而解肌清熱不可輕動其汗所最難者要在急溫急下審諦不差蓋胃實兼以脾實則二火交熾水穀之隂立盡其口燥咽乾鼻煤此後原稿遺失俟查接刋會講刺熱篇溫論述上古經文一假上堂師嘉言老人第一會語録上古醫旨其時首春其證首溫先師祖僦貸季所傳先師岐伯述之者也首引太陽之脈色榮顴骨榮未交曰今且得汗待時而已與厥隂脈爭見者死期不過三日其熱病內連腎少陽之脈色榮頰前熱病也榮未交曰今且得汗待時而已與少隂脈爭見者死凡十五句七十字岐黃之庭宗旨曉然至後世則內經且闕况上古乎所以釋者極悖理吾徒會講首析其義焉凡人有病其色必徵於面而熱病尤彰內經本傳謂肝熱病者左頰先赤心熱病者顔先赤脾熱病者鼻先赤肺熱病者右頰先赤腎熱病者頥先赤是五藏熱病色且先徵矣然五藏隱深其色不宜外見才見微色隨刺俞穴蚤瀉其熱名曰治未病待病治之遲矣靈樞謂赤黑色忽見天庭大如拇指者不病而卒死劇則刺非能挽矣惟夫陽經脈色顯而易見初起熱徵於面此時漫無凶咎太陽脈色榮飾於顴乃久邪內伏其春發溫必始太陽經脈紅色熱色先見兩顴如以采飾熱之先徵也榮飾之色止顴骨一處不交他處病之淺者也古經榮未交曰今且得汗待時而已少需聽其自解此真訣也大凡溫病熱自內出經氣先虛雖汗之多未汗解故云今且得汗待時而已太陽經氣虛者必待午未正陽杲日當空羣隂見晛太陽經邪不留而盡出也少陽經氣虛者必待寅卯初旭出震繼離煥然一新少陽經邪不留而盡出也注謂肝病待甲乙解心病待丙丁解此五藏經文與三陽經全不相涉至於與厥隂脈爭見者死咸謂外見太陽赤色內應厥隂弦脈此則如隔千山矣秦漢以後始分二十四脈弦謂少陽可也厥隂亦可也大浮滑數入陽弦可沉澀弱微入隂弦亦可也弦脈隂陽兩屬安得指為死脈且三日之促耶古義斷不其然上古理脈色而通神明謂上帝之所貴也先師之所傳也色以應日脈以應月常求其要則其要也色以應日者舉頭見日隨處長安晶光萬道人身之色無幽不燭同也脈以應月者千江有水千江月地脈潛通人身之脈環會貫通同也脈榮顴骨即色榮顴骨才一見之表裏兩符豈非日月合璧耶如太陽顴骨色脈同時解散并不成溫熱病矣病則色脈同時俱見矣太陽榮顴骨少陽榮頰前厥陰榮頰後少隂榮兩頥乃至十二經脈色大絡小絡隨病彰灼一瘡一痤色脈不相離也道在下合五行休王上副四時往來何吾人自小之耶所以太陽厥隂隂陽同時並交榮飾此才名為爭見若只面呈一部豈爭見乎爭見赤紫滯晦傳經熱重已為主死爭見青黑尅賊十死不救矣蓋太陽水而生厥隂木則發榮滋長光華畢達固有善無惡也厥隂木而孕太陽水則子藏母腹勾萌盡斂亦默庇其根也今外邪入而真藏逼見於面夫是以死耳其熱病內連腎身內百司庶職惟腎獨為政府安則宅神根本危則顛覆濁亂生死出入莫不繇之太隂厥隂祇稟其成難干之矣然不曰少隂而曰腎者少隂傳走經脈腎則専主內藏經謂過在少隂甚則入腎同一義也太陽厥隂爭見主死牽連腎氣在內以少隂為厥隂母木勢垂危求救腎水腎水足供尚可母子兩全腎水源流並竭不母子俱斃乎可見神去則藏敗藏敗則爭見黧黑豈脈色不出根心也哉釋謂本之生數三故死期不過三日以生數定死期謬甚果爾水數一土數五其死主一日五日耶內經明謂死隂之屬不過三日而死胡以生數妄解乎下文無期不滿三日反誤古脫增入五字駭觀總因死隂之屬不審其義故擅復之耳少陽之脈色也六字亦擅增入少陽之脈色榮頰前熱病也榮未交曰今且得汗待時而已與少隂脈爭見者死謂右頰前見赤色未交他處待汗自已若兩頥黑色與少陽赤色爭見則死也少隂經敗甚必入腎腎藏發露泉之竭矣無隂以守之矣少陽相火少隂真火上下交焚頃刻俱為灰燼誠劫災也傳經勢重間有回天之手至於腎內枯稿無救頰頥紫黑已見惡痕縷縷不散此獨陽無隂如大火聚安得紫府丹臺授以太隂神水乎吾徒同志濬洌彼之泉自固慶古經之法傳心無負此番提命可矣會講素問評熱論病溫經文一假上堂師嘉言老人第二會語録岐伯先師論溫勝義微妙今始深解之也黃帝問曰有病溫者汗出輒復熱而脈躁疾不為汗衰狂言不能食病名為何岐伯對曰病名隂陽交交者死也帝曰願聞其説岐伯曰人所以汗出者皆生於穀穀生於精今邪氣交爭於骨肉而得汗者是邪却而精勝也精勝則當能食而不復熱復熱者邪氣也汗者精氣也今汗出而輒復熱者是邪勝也不能食者精無俾也病而留者其壽可立而傾也且夫熱論曰汗出而脈尚躁盛者死今脈不與汗相應此不勝其病也其死明矣狂言者是失志失志者死今見三死不見一生雖愈必死也此假論溫獨創穀氣之旨穀氣化為精精氣勝乃為汗身中之至寶至寶者也穀氣為疾病之總途生死之分界萃萬理為一言誰能外之內經謂精者身之本也故藏於精者春不病溫是則藏精之人外邪不入身如藥樹百病不生矣即不然者冬藏已敵春溫積貯為命主張蚤計在是胡乃泥沙擲之耶泥沙擲之兹後則腎虛甚而溫死矣尺熱甚而溫死矣穀氣既餒轉輸不給關門閉而水穀難通大事去矣况腎虛尺熱外感傳經而入三隂熱上加熱一呼脈三動一吸脈三動而躁凖平人十二時脈更增四時三日促為二朝再促則脫而不續矣所以狂言失志脫精則死以此故也上古中古兩大聖神如出一手倒説豎説變化生心萬理淵源爛然生色千代以後乃至傳為土苴不論不議奈之何哉吾徒七十有五始知理障稍盡矩則昭然兹時不言更待何年耶岐伯先師問隂陽交交者死黃帝願聞其説岐伯但發穀氣之妙至隂陽交一言而終不更再舉向者胸為疑府今乃知穀氣之旨既明即隂陽交與不交了然定矣吾徒嚼舌多年今轉饒舌而且細舉之矣上古榮未交證之輕者榮交隂重且死者中古冬傷於寒春必病溫證半輕者冬不藏精腎虛尺熱重且死者聖神心印妙義天開變化錯縱愈出愈竒上古太陽與厥隂為偶少陽與少隂為偶而陽明太隂雖不言之而其相偶更定位也中古太陽與少隂一府一臟獨主其重蓋太陽主外少隂主內太陽司陽經之溫少隂司隂經之溫太陽交少隂少隂交太陽隂陽交而死矣然掌上意珠不敘其文若隱若顯俟之後人何乃竟成絶學耶岐伯先師妙翻千古變證若相忤而實相成賢智不識其旨况庸人乎謂二陽摶其病溫死不治不過十日死乃陽經榮未交之輕證而舉為死不治必有其説言二陽摶雖未入隂病溫至極必死不治稍延不過十日死較三日死隂之屬少饒其期耳二陽者手大腸足胃手經足經並主陽明金土燥剛亢熯隂絶胃穀腸津水穀將絶乃至腸胃如焚矣縱延多日究竟不得不死矣至上古足陽明胃足太隂脾一陽一隂雖不相錯而相偶然吾徒榮未交待時汗已經氣虛者辰巳經旺汗乃盡解必然之理也門人有蓄疑義脾胃以膜相連耳脾胃榮交相連直是易易所以上古故不言之也豫不然傷寒傳經如膽藏肝葉豈不直入相合然必少陽膽乃傳太隂再傳少隂乃傳厥隂繞經而走不能直截合膽也今陽明胃乃傳少陽膽少陽始傳太隂繞經傳次亦然固知陽明太隂交與不交各分疆界矣兩顴頰後榮交相爭部位不逺頰前與頥榮交相爭部位不逺額中鼻凖榮交相爭部位不逺必至榮交不分乃為死也至於太陽少隂隂陽正交吾徒更深言之內經兩感證一日太陽少隂二日陽明太隂三日少陽厥隂三日死由是論之溫證微不相同矣溫證一日太陽而交少隂有十分交者有五分交者有一二分交者所以溫證太陽少隂本經與病相持即十日半月總為一日之期不傳二日三日之促而驟死者蓋以穀氣平時覺不相同榮衛平時覺不相等病之精津不枯穀氣不盡熱勢少衰肌膚漸積微汗兩交忽為兩解病醫相成者多有之矣半月一月待斃無醫穀氣不得不盡者非天也人也然醫之手眼審幾決擇一日見前圖而又圖邀非幸邀生機可待此為超醫至一日已後二日陽明太隂三日少陽厥隂穀氣精血傳經立盡盡則死矣岐伯先師曰病而留者其壽可立而傾也又曰今見三死不見一生雖愈必死也然則隂陽交交者死豫向以為一言而終隨病隨死之候幾悮一生牆面惶汗常栗然之矣立志竒男子冬至閉關儲蓄內富豈非第一義乎會講傷寒論中論溫證一假上堂師嘉言老人第三會語録上古中古首重溫證民生最賴之矣周秦以降如扁鵲越人起家數輩各樹偉義經緯裁成後代宗匠至於溫證絶不言之由是論溫駸傳駸失乃至人去書存幾千百年黯然無色矣漢末張仲景前聖後聖同符一揆其著傷寒論雖述實為創也三百九十七法一百一十三方其功逺紹軒岐於中溫證一法劃然天開步步著實繹傷寒家成朱十餘輩義例多獲獨溫證從不知為何事豫步趨仲景先師至老不輟諸公會講大舉溫證以建當世赤幟俾仲景寒灰火傳蓋太陽病發熱而渴不惡寒者為溫病玩內經冬傷於寒春必病溫之説知冬寒久鬱太陽經受肌表榮衛主之與冬月驟病發熱惡寒且不渴者證則不同故春月寒鬱既久發熱而渴不惡寒自內出外矣與上古榮未交待汗自解同義其證不過十之一二耳若發汗已身灼熱者名曰風溫風溫證少隂冬不藏精與太陽病隨時忽至勢則病之八九分矣風溫與風傷衛又不同中風其脈浮弱獨主太陽風溫其脈尺寸俱浮兼主太陽少隂腎水木當沉也風溫載之從太陽上入根本撥而枝葉繁矣春月木長勢強吸汲腎水已為母虛加以風溫之病俄頃少陽相火厥隂風木風火熾然能無殆乎故若發汗已四字包括錯悮見醫未病之先及得病之傾須診足太陽足少隂一腑一臟此千古獨傳妙訣也診之辨其有無伏氣有伏氣者冬寒太少二經久伏身中時當二月其脈先見露矣發則表熱太陽與裏熱少隂將同用事恣汗無忌灼熱反倍是為風溫風溫表裏俱見浮脈其證自汗身重腎本病也多眠睡鼻息鼾語言難腎本病也腎中之候同時薦至危且殆矣古律垂戒云風溫治在少隂不可發汗發汗死者醫殺之也詎意發熱之初不及脈理輕易發汗蚤已犯此大戒生命可輕試手乎既腎中風邪外出以陽從陽熱無休止矣被下者小便不利傷其膀胱氣化直視失溲太陽藏府同時絶矣被火微發黃色劇如驚癎時瘈瘲火熱亂其神明擾其筋脈也傷寒燔針灼艾仲景屢戒至溫證尤當戒之被火微發黃色一假亂其神明擾其筋脈重證莫重於此稍輕悮火少隂脈緊咽喉乾痛乃至唾血亦多死者如之何一逆發汗已是引日待斃再促聖神莫挽矣故治溫病喫緊在未發汗前辨其脈證補救備至防危可也發汗已後凶咎卒至又何所措其手足哉上古論溫榮交已後其病內連腎中古論溫專論穀氣腎中精勝乃汗則生腎中虛甚更熱則死其旨至矣盡矣仲景先師出其不盡之藏論腎更視膀胱以緯之小便傷膀胱氣化甚則直視失溲謂太陽入絡膀胱命門穴中者藏精光照兩目直視則光絶矣瞳子髙者太陽不足戴眼者太陽已絶太陽氣絶者其足不可屈伸是則太陽之脈其終也有五大證戴眼反折瘈瘲色自絶汗太陽關係豈不最操其重哉所以中風暴證多絶膀胱人不識者故風溫扼要膀胱若腎藏將絶寧不膀胱先絶乎因是吾徒敢論太陽春溫受證雖不類夫風溫然陽熱勢極腎吸真隂上逆地道不通亦成太陽死證蓋由悮發其汗致少隂隨之上入大類內經風厥同也內經巨陽主氣故先受邪少隂與其為表裏也得熱則從之從之則厥也㵼陽補隂是則能治風厥多不死者然而中風風溫風厥太陽才涉三風見證總當回護隂之根底勿使隂不內守勿使陽不上厥百凡封蟄不露乃可需其正汗風始熄也必能若此乃為㵼陽補隂之妙若陽邪狂逞少水不能勝火虛風洞然果何為哉諦思一方其方苟非設誠通神孰能定此吾徒尚論溫證於後四卷之一內取裁其方然未刻也又十餘年諸公大舉會講溫證當為之刻之矣閲末語則老人之欲刻此書以仁天下也久矣其同心者其能已耶會講溫證自晉至今千年絶學一段上堂師嘉言老人第四會語録仲景先師叔季天生聖人其道如日月之明無斁之矣叔和何如人也以為得統而學聖人之徒今且談從前英賢過信叔和之弊叔和為晉太醫令一時醫流既以淺陋更甚荒唐如西晉崔文行所傳解散溫法用桔梗細辛白术烏頭四味後世奉為靈寶更增附子名老君神明散更增熒火名務成子熒火丸托老君務成子售欺妖妄極矣後代朱肱活人書具載其方確信以為有見時疫為寒疫故用隂毒傷寒所以久宗之耳及以毒攻毒受劫必死朱肱復改聖散子仍用附子而表裏香燥同之東坡學士在黃州見其隨施輒效載之集中後世又以過信坡公殺人多悮詎知坡公集中朱肱已三改其方始用敗毒散不用熱藥厥功少減前罪然雖改易其方不識聖神心法竟無益矣朱肱論傷寒注釋頗合聖矩但其論溫傳派不清違悖聖言未可枚舉如仲景謂太陽病發熱不惡寒而渴者為溫病朱肱謂夏至以前發熱惡寒頭疼身體痛其脈浮緊者溫病也仲景所言者冬月感寒至春始發之溫病朱肱所言者春月病溫重感於寒之變病苟朱肱立百法以治正病外立一法以治變病於理甚融乃千百年從未論溫正病所以其法其方或入室操戈也叔和云更遇溫熱變為溫毒朱肱即云初春發斑咳嗽為溫毒吳綬謂傷寒壞證更遇溫熱變為溫毒乃以溫毒為壞證亦宗叔和序例依舊壞證而治之也朱肱吳綬塤箎迭奏於叔和之庭正乎邪乎潔古傷寒名家惑叔和變法則亦不為正矣趙嗣真謂仲景所云重感異病變為他病者即索矩所謂二氣三氣雜合為病也朱肱謂仲景云冬溫之毒與傷寒大異汪機謂仲景云遇溫氣為溫病遇溫熱為溫毒不知仲景幾曾有是言哉巢氏病源宗序例四變用崔文行解散法龎安常亦然治法初用摩膏火灸二日法針解散取汗不解三日復汗之更不解四日用藜蘆丸微吐愈不愈改用瓜蒂散吐之解尚未了了者復一法針之七日熱已入胃乃以雞子湯下之巢龎比匪極矣後安常自撰微言有和解因時法於春分夏至前後一以和解為主增一味減一味即名一方豈始崔文行蜂螫蟄手耶然只定不移移則蹶矣李思訓亦用和解海藏謂二公當宋全盛其法明哲莫踰然欲汗不敢欲下不敢遷延渺法無可奈何矣大率委置聖言傳會多日幾千年來祖孫父子一派相承盈庭聚訟各逞其端而未已也丹溪究心雜症不事仲景遇外感宗東垣補中益氣兼行解散終非正法况惑異氣之説決擇不精然既外感不習獨主雜症何用登峰造極耶東垣不解傷寒正治蓋一生精神在內傷也乃從內經深入至理發出冬溫春溫二義真千百年之一人也云冬傷於寒者冬行秋令也當寒而溫火盛而水虧矣水既已虧則所勝妄行土有餘也所生受病金不足也所不勝者侮之火太過也火土合德濕熱相助故為溫病又云春月木當發生陽以外泄孰為鼓舞腎水內竭孰為滋養生化之源既竭尚何賴以生乎身之所存者熱也時強木長故為溫病此二則溫症從內經立説入理深談不闢叔和叔和自妄蓋時強木長腎水不足供其吸取故為溫病較叔和三月四月不為寒折病熱猶輕五月六月為寒所折病熱則重盛夏寒折倒見不成事理東垣一則冬溫妙義一則春溫妙義幾千年來獨步悟入偉哉偉哉賢關首肯此老矣會講溫症正名辨脈之要一段上堂師嘉言老人第五會語録論濕溫仲景先師祖素問熱病作傷寒論以傷寒皆為熱病也然於冬月正病獨詳之矣而春溫夏熱則但述大意比類一二惟風溫濕溫二症春司風溫夏司濕溫獨主其重千古不易也前第三會已論風溫之戒矣今舉濕溫言之傷寒濕溫其人常傷於濕因而中暍濕熱相薄則發濕溫若兩脛逆冷腹滿義胸頭目痛若妄言治在足太隂不可發汗汗出必不能言耳聾不知痛所在身青面色變名曰重暍如此者醫殺之也然風溫二律指為醫殺叔和當時凜斧鉞不敢干也何乃插入重感異氣變出四症誑惑後人謂脈隂陽俱盛重感於寒者變為溫瘧陽脈浮滑隂脈濡弱更遇於風變為風溫陽脈洪數隂脈實大更遇溫熱變為溫毒陽脈濡弱隂脈弦緊更遇溫氣變為溫疫豫既自任仲景之徒當再折其妄蓋溫瘧風溫溫毒溫疫四變總由不識仲景風溫濕溫二大症耳風溫為少隂症微分太陽厥隂即溫瘧亦該少隂統屬素問謂冬感於寒藏之骨髓遇大暑內灼髓空而發溫瘧此正理也若重感於寒而變瘧無是事也至於濕溫一大證從不言及是則夏月竟無著落矣詎知濕溫包疫證在內濕溫至盛長幼相似則疫矣疫亦暑濕之正法也其外感發瘧症之輕者也今脈反加重而症變輕何以得此耶至溫毒則症之重者三隂更重砌出脈狀洪數實大有之其人元氣實盛可堪大汗大下外邪立解何至發為溫毒乎且陽毒若此其隂毒又何脈耶謂陽脈濡弱隂脈弦緊變為溫疫濡弱本名濕溫而弦緊乃傷寒定脈一濕一寒何從主之叔和至夏暑為病最重內經原無其説楊上善云輕者夏至前溫病甚者夏至後暑病不知何見豫謂初春寒芽或謂柔折可也至盛夏時強木長謂之疫寒斷其不然第四會東垣老人片言而折矣蓋春月風溫多死在三日夏月濕溫多有可愈者安得反重之耶至於脈法微妙顯然易徵傷寒之脈浮大而緊中風之脈浮緩而弱春溫浮而且弱風溫弗舉風溫尺寸俱浮風火洞然中暍弦細芤遲暑傷其氣濕溫沉弱濡緩濕流其經至於痎瘧仍是脈合火土主之脈之應病步步著實自然之理也叔和左更遇右更遇左變為右變為饐喉結舌面厚三寸韓氏微旨本欲懲艾而見齷齪和解因時聽病自愈政如用小柴胡湯誠亦一法第守此將三百九十六法盡為贅龎其可乎哉風溫濕溫天大二證乃風溫之治朱肱用五方葳蕤湯知母乾葛湯防巳湯括蔞根湯葛根龍膽湯其風火相熾頃刻危亡全不知矣至於濕溫君火心太隂脾從不識正法若何但施邪術而已真見則安在哉吾徒品隲溫症列眉如炬諸公目擊勝義千里同風是所望矣會講論溫古今粹美同堂悅樂一條上堂師嘉言老人第六會語録人無古今性有完缺吾生所賦一隙微明而已然靜裡索照覺無極太極以來雖未生人先具人理人理者天地之心也向著隂病論少摹開闢一斑而劫初上帝以為之君其臣以為之教創著上經中經下經三卷中古遼邈全書未覩而岐伯先師私淑先師祖祖時舉黃帝相授一堂內經以後十不徹一况古經論溫哉然上古榮未交前及榮交後生死燎然但溫旨莫能幾及絶世知識明明見莫問問莫究豈不世界空擲人理乎吾徒神酣上古志觀王京繪為空中樓閣之想步虛陟降遊焉息焉自覺目光心朗溫症開先即使拱璧以先駟馬不若晤言一室求志千古矣此吾徒一大暢也岐伯先師論運氣曰尺寸交者死隂陽交者死各有其義惟論溫曰隂陽交交者死也一言而終更不再舉吾徒何從得之然遡上古前聖徐覺榮交未交兩端而生死定之也仲景後聖徐覺溫與風溫兩端而生死定之也今始隂陽交交者死論溫比類列眉岐伯先師從前大呼疾聲向不悟則不聞耳悟則豈論岐伯先師即吾徒交與未交自炯兩目胃為腎關同一機軸溫症才一見之而意中已先覺矣此吾徒一大暢也先師仲景宫牆吾徒步趨垂老彌在忽發未刋之旨意謂冬寒春溫夏熱分之三時覺三大綱建鼎足焉冬月太陽寒水繼以厥隂風木則統傷寒中風兩症為一大綱以傷寒該中風天然不易也春月厥隂風木繼以少陽相火則出溫症風溫兩症為一大綱以溫病該風溫天然不易也夏月少隂君火繼以太隂濕土則出暍濕兩症為一大綱以暍病該濕溫天然不易也精微之藴聲臭盡泯叔和以後岐路羊腸蓁披鳥道多少沉淪天意未喪乃至吾世履視昭然此吾徒一大暢也仲景先師以前無方以後其方充棟大率禁方失傳寢成邪僻所以有晉溫疫疑鬼疑神相沿未已亦以後人莫得仲景之方耳吾徒傷寒論方取裁溫症諸方尚論篇末刻後四卷之一載之逐一發明其義無方乃有定方此吾徒一大暢也晉唐宋元以後賢者和解因時銖銖兩兩無可奈何猶可言也不肖者蕩檢踰間妄行汗下生命試手不可言也幾千年來東垣老人二則談言微中域外偉觀異時同調此吾徒一大暢也嗣後諸君精參各出一則二則竪義警切藴理新硎應接不暇吾徒一大暢大暢矣答杭州程雲來書十六問一問凡隂病見陽脈者生陽病見隂脈者死而有曰病人若發熱身體疼病人自卧其脈沉而遲者知其差也曰沉曰遲非隂脈乎豈亦有陽病見隂脈而愈耶答凡隂病見陽脈者生陽病見隂脈者死此二語乃傷寒脈法喫緊大綱至其比例詳情自非一端可盡如厥隂中風脈微浮為欲愈不浮為未愈是隂病貴得陽脈也如讝言妄語脈沉細者死脈短者死脈澀者死是陽病惡見隂脈也又如太陽畜血病六七日表症仍在脈微而沉反不結胸其人發狂者下血乃愈此亦陽病見隂脈仲景復推出可生之路見六七日太陽之表證仍在自當現大浮數動滑之脈設其人脈微而沉自當比動數變遲之條而證成結胸今乃反不結胸者明是陽邪不結於太陽之經而結於太陽之府也膀胱之府果真畜血勢必發狂而成死症計惟急下其血庶結邪解而乃可愈耳今人但疑抵當湯為殺人之藥而孰知亟奪其血正所以再生其人乎又如厥隂下利寸脈反浮數此隂病得陽脈本當愈者設其人尺中自澀則是陽邪陷入隂中其浮散之脈為血所持而不露也然陽邪既陷入隂寸脈不加浮數則陽邪亦屬有限今寸脈反浮數其在裏之熱熾盛難除更可類推故知其必圊膿血而成半死半生之症也合兩條論之上條可愈之故全在隂脈見脈既轉隂陽邪原有限也下條難愈之故全在陽脈見陽邪既從血下出陽邪不盡血必不止萬一血盡而陽邪未盡能免脫隂而死乎可見隂病陽病二語特舉其大綱至微細聽人自會耳大綱云者謂症屬於隂其脈反陽必能鼓勇以却敵症屬於陽其脈反隂必難嬰城以固守故得澀弱弦微之脈者其人氣血精津未病先虧小病且難勝况能勝傳經之熱病哉尊問疑陽病見隂脈亦有愈者兹正大徹之關但所引病人若發熱一段此不過驗病之法耳謂病人若發熱身體疼到診脈時其人安卧則不見有發熱身疼之苦矣加以脈沉而遲表邪又未入裏其從外解無疑所以知其差耳二問從霜降以後至春分以前凡有觸冒者名曰傷寒餘時則非傷寒也其有曰立夏得洪大脈是其本位其人身體若疼重者須發其汗非傷寒如何答冬月傷時令之寒春月傷時令之溫夏秋傷時令之暑濕熱此四時之正病也然夏秋亦有傷寒冬春亦有傷暑傷濕乃四時之客病所謂異氣也此段叮嚀仲景特於濕家不可發汗之外另竪一義蓋以夏月得洪大脈是心火之本脈其人身體苦疼重又似濕土之本病恐後學悮遵濕家不可發汗之條故以此辨柝之耳見濕病雖夏月脈必濡弱不能洪大且額上有汗非如傷寒病腠理閉密即在夏月亦必無汗之比也又見洪大既為夏月本脈斷無當暑汗不出而身體疼重之理也兩相比照則其疼重仍係太陽經傷寒無疑但在夏月受邪原微見證亦稍輕令人難辨故於脈法中柝此大疑以昭成法可見不但冬春正病有汗為傷風無汗為傷寒即夏秋正病有汗為傷暑傷濕無汗仍為傷寒參脈辨證了然明矣三問陽病從寅而解於戍隂病從亥而解於寅是陽得陽解隂得隂解而有曰陽病解於夜半隂病解於日中何也答陽得陽解隂得隂解者此從其經氣之王也如少陽王於寅卯辰太陽王於己午未陽明王於申酉戌太隂王於亥子丑少隂王於子丑寅厥隂王於丑寅卯是也各經皆從其王少隂獨從其生者少隂腎中內藏真陽子時一陽生葮管灰飛蚤已春回暘谷丑時二陽寅時三陽陽進隂必退陽長隂必消也且天一生水子水生地即是王地故少隂欲解獨從之也然三陽之解從寅卯而始三隂之解從寅卯而終寅為生人之首卯為天地之門戶亦隂陽如環之理也但三陽之王時九各不相襲三隂之王時五逐位相連可見陽行健其道長故不相及隂行鈍其道促故皆相躡也於此見仲景柝義之精以述為作矣至陽病解於夜半隂病解於日中者內經之旨取陽見隂隂見陽兩相和協之義也然而隂陽之和協與否惡從知之故陽病必於陽王之時先現欲解之機然後夜半而輕安也隂病必於隂王之時先現欲解之機然後日中而輕安也先聖後聖寧非一揆也哉四問汗多則熱愈凡桂枝麻黃二湯俱取微似有汗不令汗多汗少則便難少則津液未竭何為便難也答太陽病非汗不解然汗法中每伏亡陽漏風種種危候所以服桂枝麻黃湯但取微似汗慮夫陽氣素薄之人得藥而汗出不止也至於陽明胃經為津液之府邪熱內入津液隨即外越者最多不但陽氣虛不可過汗即陽氣素實亦不可過汗所以陽明致戒云陽明實因發其汗出多者亦為太過太過為陽絶於裡亡津液大便因鞕也從前不解陽絶為何事不知正指津液內竭而言即無陽之互文也所云汗多則熱愈汗少則便難乃脈法後段推原所以當下之故謂服藥得汗腠理既開兩三日內仍覺漐漐微汗則邪服而熱除不傳裏矣若汗才得而腠理隨閉則熱邪不服而傳裏熱既傳裏津液必耗而便難故宜攻下以存津液觀下文復云脈遲尚未可攻又戒其勿悮攻以重傷津液也要知此三語總頂屬府者不令溲數而為陽明病下注腳耳五問太陽病發熱惡寒熱多寒少一節內云脈微弱者此無陽也不可發汗宜桂枝二越婢一湯既曰無陽不可發汗方中桂枝麻黃石膏生薑能不發汗耶答太陽病風傷衛則用桂枝湯解肌寒傷榮則用麻黃湯發汗風寒兩傷榮衛而加煩燥則用大青龍湯峻發其汗此定法也於中復有最難用法一症如太陽病發熱惡寒熱多寒少謂風多寒少也風多則麻黃湯為不可用寒少則桂枝湯必不能去寒加以脈見微弱其人胃中復無津液是汗之固萬萬不可欲不汗其微寒終不外散雖有桂枝二麻黃一之法施於此症尚不中竅何者桂枝二麻黃一但可治熱多寒少而不可治脈微弱故耳於是更改麻黃一為越婢一示微發於不發之中越婢者不過麻黃石膏二物形容其發散之柔緩較女婢尤為過之正可勝微寒之任耳所以然者以石膏能解陽明之熱熱解則津液復生而不名無陽適得天然妙合之法也此仲景之精義乎六問傷寒心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也小青龍湯主之既寒去欲解不用藥可矣必用小青龍湯何也答傷寒心下有水氣咳而微喘此水寒相搏而傷其肺也傷寒故發熱水停心下故不渴內水與外寒相得益彰矣今服湯已而渴明是表藥之甘溫克勝其外襲之寒所以知其證為欲解然尚未解也何以故外寒為內水所持開解最難故必更用小靑龍湯逐其寒從外出水從下出斯一舉兩得而開解無餘耳倘不其然縱外寒漸散其水氣之射肺中者無由得出異日寧不為喘暍之人乎七問太陽病脈浮緊無汗發熱身疼痛云云劇者必衄衄乃解所以然者陽氣重故也麻黃湯主之衄家不可發汗衄而已解不用麻黃可也何復用耶答衄家不可發汗者乃不病傷寒之人平素慣衄及病傷寒不可發汗所謂奪血者無汗強發其汗徒動其血如下厥上竭之類也傷寒之人寒氣深重其熱亦重熱追血行因而致衄衄乃解者不過少解其煩瞑未能鮮深重之寒也故必再用麻黃湯以發其未盡之沉滯一以盡徹其邪一以免其再衄此定法也仲景復出二法其一云太陽病脈浮緊發熱身無汗自衄者愈此則不用麻黃湯也曰身無汗必係已用麻黃湯而未得汗然亦足以推發其勢而致自衄也以其人既無發煩目瞑之症則一衄而邪從外解矣何苦復用麻黃湯耶其一云傷寒脈浮緊不發汗因致衄者麻黃湯主之此因全不發其汗因而致衄是一衄不能盡徹其邪仍當用麻黃湯以發之邪始徹也參二條以會用法之意了無疑惑矣至於審邪勢之微甚以分用劑之大小更不待言已八問發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯發汗後桂枝既不可行麻黃可行耶無大熱石膏可行耶義不可知也答治傷寒先分榮衛受邪桂枝湯與麻黃湯一彼一此劃然中分果真為麻黃湯症斷無混用桂枝之理故發汗以後得汗而熱少除但喘尚未除者更與麻杏甘石湯治之則愈此中頗有奧義蓋太陽之邪雖從汗解其熱邪襲入肺中者無由得解所以熱雖少止喘仍不止故用麻黃發肺邪杏仁下肺氣甘草緩肺急石膏清肺熱即以治足太陽膀胱經藥通治手太隂肺經亦為天造地設之良法也倘更誤行桂枝寧不壅塞肺氣而吐壅膿乎必識此意然後不可更行桂枝之戒愈覺深切著明耳九問血弱氣盡一節有藏府相連其痛必下邪髙痛下故使嘔也髙指表耶下指脅耶答髙不指表下不指脅要知此乃為婦人經水適來適斷之詞經水適斷之後寧非血弱氣盡乎因少陽熱邪盡入血室逼其經血妄行致成此症蓋少陽膽藏於厥隂肝葉之內臟腑相連與太陽陽明兩陽各為一區不與少隂太隂相連者逈殊所以太陽陽明之府邪不能襲入於臟而少陽之腑邪與臟相連漫無界限其熱邪之在脅者迫血妄行必痛連腹中見經血雖止而腹痛猶不止耳髙指脅也下止腹也邪在兩脅已摶欲上逆痛在腹中又濁氣上干所以其症嘔逆特甚但不可因其痛在腹中遂指為厥隂見症悮用吳茱萸等湯治嘔桂枝大黃等湯治痛仍用小柴胡湯治其腑不治其臟乃為不悮此是吃緊叮嚀言外見臟腑同治必領腑邪入臟而成兩感水漿不入形體不仁有必至矣仲景不能盡所欲言但以小柴胡湯主之一語砥柱狂瀾也十問小柴胡湯法去滓復煎必有其義答用小柴胡湯必去滓復煎此仲景法中之法原有奧義蓋少陽經用藥有汗吐下三禁故但取小柴胡湯以和之然一藥之中柴胡欲出表黃芩欲入裏半夏欲驅痰紛紜而動不和甚矣故去滓復煎使其藥性合而為一漫無異同俾其不至僨事耳又和非和於表亦非和於裏乃和於中也是必煎至最熱令藥氣併停胃中少頃隨胃氣以敷布表裏而表裏之邪不覺潛消默奪所以方中既用人參甘草復加生薑大棗不厭其復全藉胃中天真之氣為幹旋所謂大力者負之而走耳試即以仲景印仲景三黃附子湯中以其人陽邪入隂而熱熾非三黃不能除熱其人復真陽內微而隂盛非附子不能回陽然必各煎後乃得以各行其事而復煎以共行其事之義不亦彰彰乎十一問太陽病外症未解而復下之協熱而利利下不止心下痞鞕表裏不解者桂枝人參湯主之此理中加桂枝也設遇此症解表用桂枝可也協熱利而用理中人所不敢仲景神明必有妙義歟答太陽經表邪未解而悮下以致協熱而利心下痞鞕設腹中利止則裏邪可從裏解乃利下不止是裏邪漫無解期也設胸中結開則表邪可從表解乃心下痞鞕是表邪漫無解期也此際欲解表裏之邪全藉中氣為敷布夫既上下交征不已中氣且有立斷之勢其能解邪開結乎故舍桂枝人參湯一法更無他法可用者若以協熱之故更清其熱斯殆矣愚每用此法病者得藥腹中即響若雷奔頃之痞鞕開下利止捷於反掌可見握樞而運真無為之上理矣按㵼心湯中治痞鞕下利用甘草乾薑人參各有其義從未有用朮之法也此因下利不止恐其人五臟氣絶於內不得已而用朮故不曰桂枝理中湯而更其名曰桂枝人參湯豈非謂表邪未盡不可以用朮立法耶後來陶節菴製疏邪實表湯以代桂枝湯竟推重白术為君主坐令外感內傷混同用藥此等微細關頭不可不辨十二問傷寒脈浮滑此表有熱裏有寒白虎湯主之寒字悮耶浮滑之脈不應有寒也答脈滑為裏熱脈浮則表亦熱所以仲景白虎湯症又云熱結在裏表裏俱熱可為互症矣寒字勿泥即謂外感之寒入裏而生其在裏之熱亦可十三問陽明病心下鞕滿者不可攻之陽明病不吐不下心煩者與調胃承氣湯鞕滿似重於心煩何心煩可下而鞕滿不可下也答心下正胸膈之間而兼太陽故鞕滿為太陽陽明之候不可攻之攻之利遂不止者死至於心煩一症乃津液內耗大率當調其胃然尚有重傷津液之慮若不由吐下所致是津液未虧反見心煩者其為邪熱灼胃審矣當用調胃承氣夫復何疑然曰與亦是少少和胃以安津液之法非下法也十四問少隂病得之二三日口燥咽乾者急下之宜大承氣湯觀急字似不宜緩其症不過口乾燥而且病屬少隂少隂又不過二三日非十餘日之大滿大實有此神見而便用承氣耶答少隂病得之才二三日即口燥咽乾其人腎水素竭可知故宜急下以救腎水少緩須臾甕乾杯罄救無及矣所以陽明有急下三法以救津液少隂有急下三法以救腎水皆動關性命所謂如救頭燃何商量等待之有耶此與大滿大實之條天淵懸絶所當辨之於蚤矣十五問脈濡而弱弱反在關濡反在巔此一節有闕文否答叔和以濡弱微澀之脈見為陽氣與隂血兩虛分類於不可發汗不可下二篇之首推其所以不可汗下之故豈非以陽症隂脈乎而陽症隂脈大率歸重在陽微一邊觀下文云陽微發汗燥不得眠又云陽微不可下下之則心下痞鞕差可覩矣其中風汗出而反燥煩一語最為扼要見無汗之燥煩用大青龍湯不對且有亡陽之變况於有汗之燥煩其亡陽直在轉盻間此即用真武湯倘恐不及奈何可更汗更下乎本非闕文但叔和未會仲景之意類此不一而足反覺重復纒擾而令讀者茫然耳十六問脈雙弦而遲者必心下鞕脈大而緊者陽中有隂可下之宜大承氣湯設遇此症果可下否答脈雙弦而遲謂左右皆然乃隂寒內凝所以心下必鞕其脈其症必因誤下邪未盡退而反致其虛寒也仲景金匱方論云脈雙弦者寒也皆大下後虛脈所以於結胸條論脈謂太陽病脈浮而動數醫反下之動數變遲一以誤下而脈變雙弦一以誤下而脈變遲可互證也結胸條以其人邪結在胸不得已用大陷胸湯滌去胸間之邪則與用大承氣湯峻攻腸中之結者懸矣然且謂脈浮大者不可下下之則死是并陷胸湯亦可不用也垂戒甚明也雙弦脈即欲用下當倣用溫藥下之之例今反謂宜大承氣湯下之者何耶至於脈大而緊者陽中有隂明謂傷風有寒屬大青龍湯症其不可下更明矣兩段之文回不相蒙叔和彚湊一處指為可下之症貽悮千載誠斯道之厄也尊問不行其所疑具過人之識矣敬服尚論後篇卷二
