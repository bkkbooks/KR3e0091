body:
  text: 尚論後篇卷三新建喻昌撰尚論諸方大意仲景一百一十三方用本草九十一種耳仲景上遡神農本經藥三百六十五種効法周天三百六十五度之數應三才而合四時妙義天開也仲景取述神農本經藥品總九十一種入傷寒論中輔相裁成有合六經之大綱者有合六經之一目者葢神農百病兼收而仲景則由六經以例百病所以於上古本經取裁九十一種用之不盡萬世而後星日炳然聖之又聖者矣梁陶隱君别録倍之為七百三十種迨唐本圖經證類宋嘉佑政和旁搜編録於是旁門㨗徑各自成名者多矣而仲景宮墻生色間出英賢數十軰尤為不孤識大識小總計二千七百四十六種病雖百疢藥無纎漏天下後世永頼焉然一千七百四十六種顯現億兆如同一日昭式乃至漸推漸廣觀察盡矣何獨仲景九十一種賢哲挺生莫識厥旨昌也晚進無識手集神農本經竊以傷寒論中藥品為主其晉唐以後諸賢發揮傷寒論全方有得者亦一一録出而昌亦少歩尚論諸方之後總欲門下好學隨證問藥一目瞭然無檢書之苦難是慰耳太陽經風傷衛方辨中風證用桂枝湯解肌大綱總法桂枝湯方桂枝三兩去皮味辛熱芍藥三兩味苦酸微寒甘草二兩味甘生薑三兩切味辛温大棗十二枚味甘温右五味咬咀以水七升微火煮取三升去滓適寒温服一升服已須臾歠熱稀粥一升餘以助藥力温覆令一時許遍身漐漐微似有汗者益佳不可令如水流漓病必不除若一服汗出病差停後服不必盡劑若不汗更服依前法又不汗後服小促役其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病證猶在者更作服若汗不出者乃服至二三劑禁生冷粘滑肉麵五辛酒酪臭惡等物太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱宜桂枝湯仲景原文風之傷人也頭先受之故令頭痛風在表則表實故令發熱風為陽氣亦為陽同類相從則傷衛外之氣衛傷則無以固衛津液故令汗出其惡風者衛氣不能衛也其脉緩者衛氣不能鼓也上件皆太陽症故曰太陽中風桂枝辛甘辛則能解肌甘則能實表内經曰辛甘發散為陽故用之以治風然恐其走泄陰氣故用芍藥之酸以收之佐以生薑甘草大棗此發散而兼和裏之意是方也惟表邪乃可用之若陽邪去表入裏裏作燥渴二便秘結此宜承氣之時也而悞用之則反矣昌按承氣之悞庸者固然而工者悞在㣲細仲景諄切不似此項逐條本文詳玩始獲凡桂枝湯病症者常自汗出小便不數手足温和或手足指稍露之則微冷覆之則温渾身熱微煩而又憎寒始可行之若病者無汗小便不數手足温和或手足逆身冷不惡寒反惡熱或飲酒後慎不可行桂枝湯也脉𦂳必無汗有汗不可悞作桂枝症此脉與症仲景說得甚明後人看不透所以不敢用此方假令寸口脉微名曰陽不足陰氣上入陽中則洒淅惡寒也尺脉弱名曰陰不足陽氣下䧟入陰中則發熱也此謂元氣受病而然也又曰陽微則惡寒陰微則發熱醫既汗之使陽氣微又大下之令陰氣弱此謂醫所使也大抵陰不足陽徃從之故陽内䧟而發熱陽不足陰徃乘之故陰上入陽中則惡寒舉此二端明白易曉何憚而不用桂枝湯哉仲景治表虛製此湯桂枝味辛熱發散助陽體輕本乎天者親上故桂枝為君芍藥甘草佐之如陽脉濇陰脉弦腹中急痛乃製小建中湯以芍藥為君桂枝甘草佐之一則治其表虛一則治其裏虛故各有主用也以桂枝易肉桂治傷寒腹痛神品藥也如夏中熱腹疼少加黄芩去桂痛立止桂於春夏二時為禁藥按經云桂枝入咽陽盛則斃春夏發者為禁藥也桂能動血血熱者為禁藥也木得桂而死肝不足者為禁藥也桂枝湯有禁用三法仲景本文并昌論汗後水氣且逆有禁更汗増滿一法本文并昌論中風病主用桂枝湯解肌和營衛七法本文并昌論或問桂枝湯發字之義曰一桂枝耳或云發汗或云當得汗解或云當發汗更發汗宜桂枝湯者數方是用桂枝發汗也復云無汗不得用桂枝又曰汗家不得重發汗又曰發汗過多者都用桂枝甘草湯是閉汗也一藥二用如何說得仲景發汗與本草出汗之義相通為一答曰本草云桂味辛甘熱無毒能為百藥之長通血脉止煩出汗者是調血而汗自出也仲景云藏無他病發熱自汗者此衞氣不和也又曰自汗者為營氣和營氣和則外不諧以衛氣不與營氣和諧也營氣和則愈故皆用桂枝湯調和營衛營衛既和則汗自出矣風邪由此而解非桂枝能於腠理發出汗也以其固閉營血衛氣自和邪無容地而出矣其實則閉汗孔也昧者不解閉汗之意凡是病者俱用桂枝湯發汗若與中風自汗者合效如桴鼓因見其取效而病愈則曰此桂枝發出汗也遂不問傷寒無汗者亦與桂枝湯悮之甚矣故仲景言無汗不得服桂枝是閉汗孔也又曰發汗多叉手冒心心悸欲得按者用桂枝甘草湯是以閉汗孔也又曰汗家不得重發汗若桂枝湯發汗是重發汗也凡曰桂條下言發字當認作出字是汗自然出也非若麻黄能開腠理而發出汗也本草出汗二字上文有通血脉一句是非三焦衛氣皮毛中藥是為營血中藥也如是則出汗二字當認作營衛和自然汗出非桂開腠理而發出汗也故後人用桂治虛汗讀者當逆察其意則可矣噫神農作於前仲景述於後前聖後聖其揆一矣不解肌或悮汗病邪入裏用五苓兩解表裏二法一法水逆用之多服煖水汗出愈一法脉浮小便不利微熱消渴者用之五苓散方猪苓十八銖去皮茯苓十八銖澤瀉一兩六銖白术十八銖桂半兩右五味為散以白飲和服方寸七日三多服煖水汗出愈不解肌而悮發大汗其變逆有救亡陽漏風二法一法真武一法桂枝加附子湯真武湯方此本少陰經之神方并加減法而太陽上篇先録之至太陽下篇尤宜𦂳要先同録此茯苓三兩芍藥三兩生薑三兩切白术二兩附子一枚泡去皮破八片右五味以水八升煮取三升去滓温服七合日三服桂枝加附子湯於桂湯内加附子一枚餘依桂枝湯法不解肌而用燒鍼取汗寒入核起灸核止變一法桂枝加桂湯更加桂於桂枝湯方内更加桂枝二兩中風肌未解不可下宜用桂枝湯解外一法桂枝湯方見前不解肌反悮下邪不服者於前下藥内更加桂枝湯一法即桂枝大黄湯之互詞因上衝陽位故兩解之也不上衝者不用此方不解肌反悮下心痞用温補藥兩解表裏一法桂枝人參湯即理中加桂枝而易其名也桂枝四兩去皮甘草四兩炙白术三兩人參三兩乾薑三兩右五味以水九升先煎四味取五升内桂枝更煮取三升去滓温服一升日再服夜一服或問大柴胡瀉也桂枝人參湯補也何為皆治下利心下痞鞕曰此非裏熱乃下之早因作痞裏虛協熱而利表又不解故與桂枝人參湯和裏解表若夫傷寒發熱汗出不解心下痞鞕嘔吐而下利者表和而裏病也以心下痞鞕故為實當以大柴胡下之二者心下痞鞕雖同而虛實之症有别故用藥有攻補之異不解肌反悮下邪入陽明變用太陽兩解一法葛根黄連黄芩湯方葛根半斤黄連二兩黄芩三兩柴胡一兩甘草二兩炙右四味以水八升先煮葛根减二升内諸藥煮取二升去滓分温再服不解肌反悮下宜辨陽實陽虛加减桂枝湯一法桂枝去芍藥湯下之後脉促胸滿於桂枝湯内去芍藥一味餘依桂枝湯法去芍藥方中加附子湯下之微惡寒於桂枝湯内去芍藥加附子一枚不解肌反悮下陽邪作喘有用桂枝加行氣藥一法桂枝加厚朴杏仁湯於桂枝湯方内加厚朴二兩杏仁五十箇餘依桂枝湯法中風病不解熱結膀胱下血有宜先表後裏一法桃核承氣湯外不解者尚未可攻宜桂枝湯外解已少腹急結可用此攻桃仁五十箇去皮尖桂枝二兩大黄四兩芒硝二兩甘草二兩炙右五味以水五升煮取二升半去滓内芒硝更上火微沸下火方食温服五合日三服當微利中風病不解熱瘀蓄血明辨脉症用抵當湯二法一法發狂蓄血重症一法再辨脉證法中之法抵當湯方水蛭三十箇熬蝱三十箇去趐足熬大黄三兩桃仁三十箇去皮尖右四味為散以水五升煮取三升去滓温服一升不下再服中風病下後復汗因虛致冒先汗解後議下一法遵内經虛者責之之義汗法下法並不出方若論用藥表無過桂枝裏無過大柴五苓矣中風病表裏已虛餘邪未解辨脉用治逈異初病一法桂枝湯陽脉微者用此方見前調胃承氣湯陰脉微者宜此方見後中風病嘔利痞滿表解可攻與攻胃實逈異一法十棗湯方芫花熬甘遂大㦸大棗十枚劈右上三味等分各别㨶為散以水一升半先煮大棗肥者十枚取八合去滓内藥末强人服一錢七羸人服半錢温服之平旦服若服少病不除者明日更服加半錢得快下利後糜粥自養大陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞鞕滿引脇下痛亁嘔短氣汗出不惡寒此表解裏未和也十棗湯主之漐音蟄按大棗純得土之中氣兼感天之微陽以生故味甘氣平又温氣味俱厚陽也入足太陰陽明經經曰裏不足者以甘補之又曰形不足者温之以氣甘能補中温能益氣甘温能補脾胃故主治安中補脾補中益氣此方三藥皆峻利故用肥棗十枚葢戎衣一着大發鉅橋之意所以題之曰十棗湯表其用之重也按神農本經云蕘花味芒寒主傷寒温瘧下十二經水破積聚大堅癥瘕蕩滌腸中留癖飲食寒熱邪氣利水道仲景本方取用正取此義後人乃遂改芫花何也即曰芫花别録亦云能消胸中痰水五藏五水然本經云味辛温全與蕘花不同且亦并不云主傷寒温瘧等症也權移通用殊非仲景立方本旨不可不辨仲景傷寒論以蕘花治利者取其行水也水去則利止用當斟酌不可過使須有是症乃用或問亁嘔脇痛小柴胡十棗湯皆有之一和一解攻伐可也葢小柴胡症邪在半表半裏間外有寒熱徃來内有亁嘔諸病所以不可攻下宜和解以散表裏之邪十棗湯症外無寒熱其人漐漐汗出此表已解也但頭痛心下痞鞕滿引脇下痛亁嘔短氣者邪熱内蓄而有伏飲是裏未和也與十棗湯以下熱逐飲有表症而亁嘔脇痛者乃柴胡湯症無表症而亁嘔脇痛者即十棗湯症也上文所言頭痛者乃飲家有此症不可以常法拘仲景所以述此者恐後學見其頭痛以為表不解不敢用也或問同是心下有水氣亁嘔欬喘一用小青龍湯主之一用十棗湯主之何也葢小青龍治未發散表邪使水氣自毛竅而出乃内經所謂開鬼門法也十棗湯驅逐裏邪使水氣自大小便而泄乃内經所謂潔浄府去陳莝法也夫飲有五皆内啜水漿外受濕氣欝蓄而為留飲流於膈則為支飲令人欬喘寒吐沫背寒流於肺則為懸飲令人咳唾痛引缺盆流於心下則為伏飲令人胸滿嘔吐寒熱胘暈流於腸胃則為痰飲令人腹鳴吐水胸脇支滿或作泄瀉或肥或瘦流於經絡則為溢飲令人沉重注痛或作水氣跗腫芫花大㦸甘遂之性逐水洩濕能直達水飲窠囊隱僻之處但可徐徐用之取效甚㨗不可過劑洩人真元也陳言三因方以十棗湯藥為末用棗肉和丸以治水氣喘急浮腫之症葢善變通者也昔杜任問孫兆曰十棗湯究竟治甚病孫曰治太陽中風表解裏未和也杜曰何以知裏未和孫曰頭痛心下痞滿脇下痛亁嘔汗出此知裏未和也杜曰公但言病證而所以裏未和之故要𦂳處總未言也孫曰某嘗於此未决願聽開諭杜曰裏未和者葢痰與燥氣壅於中焦故頭痛亁嘔短氣汗出是痰膈也非十棗不治但此湯不宜輕用恐損人於倐忽用者慎之大抵痰亦水濕之病耳葢痰涎之為物隨氣升降無處不到入於心則迷竅而成癲癎妄言妄見入於肺則塞竅而成咳唾稠粘喘急背冷入於肝則留伏蓄聚而成脇痛亁嘔寒熱往來入於經絡麻木頭痛入於筋骨則頭項胸背脇腰手足牽引隱痛然治痰須治其本痰之本水也濕也得氣與火則凝滯而為痰為飲為涎為涕為癖故十棗湯逐水去濕正所以治痰膈也中風病悮下熱邪内䧟而成結胸諸法大䧟胸湯方大黄六兩去皮芒硝一升甘遂一錢為末右三味以水六升先煎大黄取二升去滓内芒硝一兩沸内甘遂末温服一升得快利止後服結胸兼涉陽明仍用本湯大䧟胸丸結胸似涉柔痙丸成煮湯連滓服大䧟胸丸方大黄半斤去皮葶藶半斤熬芒硝半斤杏仁半斤去皮尖熬黒右四味搗篩二味内杏仁芒硝合研如脂和散取如彈丸一枚别搗甘遂末一錢七白蜜二合水二升煮取一升温頓服之一宿乃下如不下更服取下為效禁如藥法結胸項强者胸滿鞕痛能仰而不能俛也有汗項强為柔痙此雖有汗其項强乃胸中滿實而不能俛非是中風痙急故曰如柔痙不用湯液而用丸劑何湯主蕩滌用大䧟胸湯以其從心下至少腹皆鞕痛三焦皆實故用湯以盪之此惟上焦滿實用湯液恐傷中下二焦之陰故用丸以攻之按痓音痴惡也當作痙音徑風强病也太陽經傷營方辨傷寒證用麻黄發汗大綱總法麻黄湯方麻黄三兩去節桂枝三兩去皮甘草一兩炙杏仁七十箇湯浸去皮尖右四味以水九升先煮麻黄减二升去上沫内諸藥煮取二升半去滓温服八合覆取微似汗不須啜粥餘如桂枝法將息太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘麻黄湯主之按太陰少陰有身熱而無頭痛葢二經皆不上頭故也厥陰有頭痛而無身熱若身熱又頭痛屬太陽經也傷寒頭痛屬三陽乃邪氣上攻也太陽專主頭痛陽明少陽亦有之三陰無頭痛葢太陰少陰二經至胸而還惟厥陰循喉嚨上入頏顙出額㑹於巔故亦有頭痛傷寒頭痛太陽經居多頭角痛屬少陽經頭額痛及鼻屬陽明經頭頂痛屬厥陰經足太陽經起目内眥循頭背腰膕故所過疼痛不利寒邪外束人身之陽不得宣越故令發熱寒邪在表不能任寒故令惡寒寒主閉藏故令無汗人身之陽既能得宣越於外則必壅塞於内故令作喘寒氣剛勁故令脉𦂳仲景治傷寒無汗用麻黄有汗用桂枝厯代名醫未有究其精微嘗繹思之似有一得云津液為汗汗即血也在營則為血在衞則為汗夫寒傷營營血内濇不能外通於衞衞氣閉固津液不行故無汗發熱而憎寒夫風傷衞衞氣外泄不能内䕶於營營氣虛弱津液不固故有汗發熱而惡風然風寒之邪由於皮毛而入皮毛者肺之合也肺主衞氣包羅一身天之象也是證雖屬乎太陽而肺實受邪氣其證時兼靣赤怫欝欬𠻳以及痰喘而胸滿者非肺病乎葢皮毛外閉則邪熱内攻而肺氣膹欝故用麻黄甘草同桂枝引出營氣之邪達之肌表佐以杏仁泄肺而利氣是則麻黄湯雖太陽發汗重劑實為發散肺經火欝之藥也辨脉浮宜用麻黄湯發汗一法辨脉浮數宜用麻黄湯發汗一法即脉不𦂳但浮及浮數俱必用此辨傷寒欲𫝊不𫝊心悸而煩宜用建中一法太陽中篇連大綱止此三法變法用桂枝湯加减七法小建中湯桂枝三兩去皮芍藥六兩甘草二兩炙生薑三兩切膠飴一升大棗十二枚劈右六味以水七升煮取三升去滓内膠飴更上微火消解温服一升日三服嘔者不可用建中湯以甜故也按山僻絶無醫藥之區毎遇頭痛發熱用蠻法山椒炒雞炊飯一飽津津發汗豈非得建中意乎服麻黄湯得汗後察脉辨證有次第不同三法一法傷寒發汗解半日許復煩脉浮者可更發汗宜桂枝湯方見上篇再按發汗已解因表疎外邪内襲可更發汗宜桂枝湯仲景意中蚤已慮其正虛桂枝解肌誠正法也昌欲表虛之體少和人參助正驅邪免致再襲三襲留連而至殆耳略加人參托出其邪豈不善乎粗醫不行微汗輙至表疎邪入汗而又汗展轉增變卒至莫救可為寒心一法發汗已脉浮數煩渴者宜表裏兩解五苓湯方見上篇一法汗出而渴五苓散不渴者茯苓甘草湯茯苓甘草湯方茯苓三兩桂枝二兩去皮生薑三兩切甘草一兩右四味以水四升煮取二升分温三服辨脉浮𦂳浮數尺脉反遲反微不可發汗二法再按二條但論其法然無藥也宜用建中湯生其津液津液充則糓氣傳腎而生精血所以自致表裏俱實便自出汗而愈可見津液精血人身之至寶也服麻黄湯汗後病不解有惡寒惡熱不同治一法芍藥甘草附子湯方惡寒者虛也芍藥三兩甘草二兩炙附子一枚泡去皮切八片已上二味以水五升煮取一升五合去滓分温服調胃承氣湯方不惡寒但熱者實也當和胃氣與此方大黄四兩去皮清酒浸芒硝半斤甘草二兩炙右二味咬咀以水三升煮取一升去滓内芒硝更上微火煮令沸少少温服服麻黄湯後身痛脉沉遲者宜行補散一法桂枝三兩去皮芍藥四兩甘草二兩炙人參三兩生薑四兩切大棗十二枚劈右六味以水一斗一升微火煮取三升去滓分温服如桂枝法或問經言表邪盛脉浮而𦂳法當身疼痛宜以汗解之况身疼皆係表邪未盡此又加人參芍藥生薑以益血何也曰表邪盛則身疼血虛則身亦疼其脉浮𦂳者邪盛也其脉沉微者血虛也盛者損之則安虛者益之則愈仲景凡言發汗後以外無表症内無熱證止餘身疼而已若脉稍浮盛則為表邪未盡解今言脉沉遲此血虛而致然也故加人參生薑芍藥以養血服麻黄湯後不可悞用桂枝及飲水灌水過多一法麻杏石甘湯方治喘飲水灌水麻黄四兩去節杏仁五十箇去皮尖甘草二兩炙石膏半斤碎綿裹右四味以水七升先煮麻黄减一升去上沫内諸藥煮取二升去滓温服一升本麻黄湯證悮下表邪未盡氣逆變喘一法麻黄杏仁甘草石膏湯悮下變喘方同前服麻黄湯後有陽氣暴虛又手自冐心悸及耳聾無聞二法桂枝甘草湯方桂枝四兩去皮甘草二兩炙右二味以水三升煮取一升去滓頓服按心下悸及耳聾無聞皆陽氣暴虚仲景止用桂枝甘草二味補虛之義顯明易見如二證大虚又多用人參矣服麻黄湯後有陽氣暴虛陰邪上逆臍下悸腹脹滿二法茯苓桂枝甘草大棗湯方欲作奔豚預伐其邪茯苓半斤桂枝四兩去皮甘草二兩炙大棗十二枚劈右四味以甘瀾一斗先煮茯苓减二升内諸藥煮取三升去滓温服一升日三服作甘瀾法取水三斗置大盆内以杓揚之水上有珠子五六千顆相逐取用之厚朴生薑甘草半夏人參湯方汗後腹脹滿厚朴半斤去皮炙生薑半斤切半夏半斤洗人參一兩甘草二兩炙右五味以水一斗煮取三升去滓温服一升日三服服麻黄湯後不繇悮下津亁飲結胃困變痞一法生薑瀉心湯方生薑四兩切甘草三兩炙人參二兩亁薑一兩黄芩三兩半夏半斤洗黄連一兩大棗十二枚劈右八味以水一斗煮取六升去滓再煎取三升温服一升日三服悮下成痞用瀉心湯方次第不同四法一法悮下後再悮下客熱虛痞用甘草瀉心湯一法悮下後復發汗惡寒先解表用大黄黄連瀉心湯一法上用陰氣協熱邪作痞用大黄黄連瀉心湯矣而陰氣乘陽虛作痞用附子瀉心湯一法心下滿而不痛者用半夏瀉心湯甘草瀉心湯方甘草四兩黄芩三兩半夏半斤洗大棗十二枚劈亁薑一兩黄連一兩右六味以水一斗煮取六升去滓再煎取三升温服一升日三服病在表而反下之則逆矣下而虛其中氣則表邪乘之而入虛不任邪今人謂之挾熱利也火性急速榖雖入而未及化故榖不化虛陽上迫故令腹中雷鳴中虛不能化氣故令痞鞕而滿胃虛客氣上逆故令亁嘔心煩不得安人參甘草大棗胃虛之聖藥也半夏亁薑嘔逆之聖藥也黄連黄芩痞熱之聖藥也相傳伊尹湯液原有甘草瀉心湯治證同上仲景本此方而但去人參可見先哲皆有祖述不似後人一味臆騁此云去人參未是海云伊尹湯液此湯七味今監本無人參脫之也此為定衡大黄黄連瀉心湯方大黄二兩黄連一兩右二味以麻沸湯二升漬之須臾絞去滓分温再服按結胸之脉沉實其病謂之實邪故下之也急痞氣之脉闗脉必浮其病謂之虛邪故下之也緩彼用大黄則煎之乃取其氣味厚此用大黄則漬之取其氣味薄也大黄乃足太陰手足陽明手足厥陰五經血分之藥凡病在五經之血分者宜用之若在氣分用之是謂誅伐無過矣故仲景言治心下痞滿按之軟者用大黄黄連瀉心湯主之此正瀉脾胃之濕熱非瀉心也病發於陰而反下之則作痞滿乃寒傷營血邪氣乘虛結於上焦胃之上脘在於心故曰瀉心實瀉脾也素問云太陰所至為痞滿又云濁氣在上則生䐜脹是矣病發於陽而反下之則成結胸乃熱邪䧟入血分亦在上脘分野大䧟胸湯丸皆用大黄亦瀉脾胃血分之邪而降其濁氣也若結胸在氣分則只用小䧟胸湯痞滿在氣分則用瀉心湯矣䐜音嗔肉脹起也麻沸湯即熱湯一名百沸湯一名太和湯味甘平無毒主治助陽氣通經絡附子瀉心湯方大黄二兩黄連一兩黄芩一兩附子一枚泡去皮别煮取汁右四味初三味以麻沸湯二升漬之絞去滓内附子汁分温再服按心下滿鞕而痛者為實為結胸鞕滿不痛者為虛為痞氣不滿不痛但煩悶者為支結保命集云脾不能行氣於四藏結而不散則為痞大抵諸痞皆熱也故攻痞之藥皆寒劑其一加附子是以辛熱佐其寒凉欲令開發痞之拂欝結滯非攻寒也先發汗或下後陽氣虛故惡寒汗出太陽證云發汗後惡寒者虛也此加附子恐大黄黄連損其陽也非補虛也半夏瀉心湯方半夏半斤洗黄芩三兩亁薑三兩甘草三兩人參三兩黄連一兩大棗十二枚劈右七味以水一斗煮取六升去滓再煎取三升温服一升日三服按至下下後邪氣傳裏亦有陰陽之異若下後陽邪傳裏者則結於胸中為結胸以胸中為陽受氣之分與大䧟胸湯以下其結陰邪傳裏者則留於心下為痞以心下為陰受氣之分與半夏瀉心湯以通其痞服瀉心湯痞不解煩渴小便不利用五苓兩解表裏一法前第九條五苓湯方兩解表裏於此更治痞滿服瀉心湯復悮下利不止宜治下焦一法赤石脂禹餘糧方赤石脂一斤碎禹餘糧一斤碎已上二味以水六升煮取二升去滓分三服下之利不止者下之虛其裏邪熱乘其虛故利虛而不能禁固故不止更無中焦之症故曰病在下焦澁可以固脫故用赤石脂重可以鎮固故用禹餘糧然惟病在下焦者可以用若病在中焦而悮以為虛者則二物之氣益壞於中氣實者固而濇之則邪無自而泄必增腹脹且痛矣慎之慎之再按難經曰中焦者在胃中脘主腐熟水榖下焦者當膀胱上口主分别清濁主出而不内以傳道也靈樞曰水榖者常居於胃中成糟粕而俱下於小腸而成下焦渗而居下濟泌别汁循下焦而渗入膀胱焉然則利在下焦者膀胱不渗而大腸滑脫也禹餘糧甘平消痞鞕而鎮定其臟腑赤石脂甘温固腸虛而收其滑脫也膀胱不渗水榖不分更當𨗳利小便令分清之使府司各行其事始無餘治而愈也汗吐下解後餘邪挾飲作痞用旋復代赭石湯一法旋復代赭石湯方赭音者赤色旋復花三兩人參二兩生薑五兩切代赭石一兩半夏半斤洗甘草三兩炙大棗十二枚劈右七味以水一斗煮取六升去滓再煎取二升温服一升日三服汗吐下而解則中氣必虛虛則濁氣不降而上逆故作痞鞕逆氣上干於心心不受邪故噫氣不除内經宣明五氣篇曰五氣所病心為噫是也旋復之鹹能軟痞鞕而下氣代赭之重能鎮心君而止噫薑夏之辛所以散逆參甘大棗之甘所以補虛或曰汗吐中虛肺金失令肝氣乘脾而作上逆逆氣干心心病為噫此方用代赭石所以鎮心亦所以平肝也亦為究理之論噫音隘昌用此方治反胃多痰氣逆并噦者愈千人矣傷寒下早亦成結胸之證四法一法辨大結胸用大䧟胸湯熱實脉沉𦂳心下痛按之不鞕水飲結在胸脇主大䧟胸湯原文一法辨小結胸用小䧟胸湯正在心下按之則痛脉浮微滑發熱微惡寒煩疼微嘔心下支結用柴胡桂枝湯原文一法熱結在裏與結胸異治一法辨邪熱在表心下支結但治其表小䧟胸湯方黄連一兩半夏半升洗括蔞實一枚天者右三味以水六升先煮括蔞去滓内諸藥煮取二升去滓分温三服大䧟胸湯方水飲結在胸脇仍用此方方見前柴胡桂枝湯方不宜大小䧟胸之法用此方柴胡四兩黄芩一兩半人參一兩半桂枝一兩半甘草一兩半夏二合半生薑一兩半切芍藥一兩半大棗六枚劈右九味以水七升煮取三升去滓分温服辨傷寒太陽兼少陽連上共五法小柴胡湯方柴胡半斤黄芩三兩半夏半斤洗人參三兩甘草三兩生薑三兩切大棗十二枚劈右七味以水一斗二升煮取六升去滓再煎取三升温服一升日三服傷寒四五日身熱惡風頭頂强脇下滿手足温而渴者小柴胡湯主之原文傷寒五六日中風徃來胸脇苦滿黙黙不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脇下痞鞕或心下悸小便不利或不渴身有微熱或咳者小柴胡湯主之原文後加减法若胸中煩滿而不嘔去半夏人參加括蔞實一枚若渴者去半夏加人參合前成四兩半括蔞根四兩若腹中痛去黄芩加茯苓四兩若不渴外有微熱者去人參加桂枝三兩温覆取微汗愈若欬者去人參大棗生薑加五味子半升亁薑二兩經曰傷寒中風有柴胡證但見一證便是不必悉具邪在表則寒邪在裏則熱今邪在半表半裏之間未有定處是以寒熱徃來也邪在表則心腹不滿邪在裏則心腹脹滿今止言胸脇苦滿知邪氣在表裏也經曰陽入之陰則静黙黙者邪方自表之裏在表裏之間也能食不能食煩不煩嘔不嘔皆然邪初入裏未有定處則所處不一故有或為之證柴胡證但見一證便是不必悉具正指此或為之證也傷寒陽脉澁陰脉弦法當腹中急痛者先與小建中湯不瘥者與小柴胡湯主之原文小建中湯方方見前服小建中湯不瘥者葢少陽屬木其脉弦木盛則土受尅故澁而急痛也故伐木以救土也柴胡桂枝亁薑湯方柴胡半斤桂枝三兩去皮亁薑三兩黄芩三兩括蔞根四兩牡蠣三兩熬甘草二兩炙右七味以水一斗二升煮取六升去滓再煎取三升温服一升日三服初服微煩後服汗出便愈按已發汗而復下之雖不失先發後攻之序及當汗而反下之宜然既汗之邪當自散若不待其全解後内實而復下之是猶傷於早也烏得不結然已發汗則邪勢已衰雖或失之下早故結亦當微也傷寒五六日已發汗而復下之胸脇滿微結小便不利渴而不嘔但頭汗出徃來寒熱心煩者此為未解也柴胡桂枝亁薑湯主之原文太陽病十日以去脉浮細而嗜卧者外解已也設胸滿脇痛者與小柴胡湯脉浮者用麻黄湯原文脉微細而嗜卧者大邪已退血氣乍虛而肢體倦怠也胸滿脇痛則少陽未除故與小柴胡以和之脉但浮則邪還表故與麻黄以發之柴胡加龍骨牡蠣湯方柴胡四兩半夏二合洗龍骨一兩半人參一兩半茯苓一兩半鉛丹一兩半桂枝一兩半去皮生薑一兩半大黄二兩牡蠣一兩半大棗六枚劈右十一味以水八升煮取四升内大黄切如碁子更煮一二沸去滓温服一升辨下後胸滿煩驚身重困篤用此湯原文自明病久脉代結心動悸宜補胃生津兼散邪用炙甘草湯一法炙甘草湯方甘草四兩炙生薑三兩切桂枝三兩去皮麥門冬半斤麻子仁半斤大棗十二枚劈人參二兩生地一斤阿膠二兩右九味以清酒七升水八升先煮前藥八味取三升去滓内膠烊消盡温服一升日三服一名復脉湯悮下下利不止身疼痛宜先救裏一法先救裏用四逆湯四逆湯方甘草二兩炙亁薑一兩半附子一枚右三味咬咀以水三升煮取一升二合去滓分温再服强人可大附子一枚亁薑三兩服後身疼痛便清自調者急救表用桂枝方見上篇辨悮下引邪内入用梔子湯取吐三法病人舊微溏者不可服一法下後煩滿不安用梔子厚朴湯梔子厚朴湯方梔子十四枚劈厚朴四兩薑炙枳實四兩湯浸去穰炒已上三味以水三升半煮取一升半去滓分三服温進一服得吐止後服一法悮用丸藥大下身熱微煩用梔子亁薑湯梔子亁薑湯方梔子十四枚劈亁薑二兩右二味以水三升半煮取一升半去滓分二服温進一服得吐止後服一法大下後身熱心中結痛用梔子豉湯梔子豉湯方梔子十四枚劈香豉四合綿裹右二味以水四升先煮梔子得二升半内豉煮取一升半去滓分為二服温進二服得吐止後服又本方二法發汗若下煩熱胸中窒者用此方發汗吐下後虛煩不眠反覆顛倒懊憹者用此方又加味二法若少氣者梔子甘草豉湯於前方内加倍甘草若嘔者梔子生薑豉湯於前方内加倍生薑甘草辨下後復發汗之脉證晝夜静躁一法亁薑附子湯方晝日煩躁夜而安静脉沉微身無大熱者亁薑一兩附子一枚生用破八斤右二味以水三升煮取一升去滓頓服按用薑附二味偏於辛熱者恢復重虛之陽而求以協和於偏勝之陰也辨吐下後復汗身為振摇動惕久成痿廢二法茯苓桂枝白术甘草湯方茯苓四兩桂枝三兩去皮白术二兩甘草二兩炙右四味以水六升煮取三升去滓分温三服辨傷寒熱瘀小便反利為蓄血用抵當丸一法抵當丸方上篇用抵當湯水蛭二十箇熬蝱蟲二十五箇熬去翅桃仁二十箇去皮尖大黄二兩右四味杵分為四丸以水一升煮一丸取七合服晬時當自下血若不下更服辨傷寒風濕相搏身體煩疼脉證二法桂枝附子湯方桂枝四兩去皮附子三枚泡去皮破八片生薑三兩切甘草三兩炙大棗十二枚劈右五味以水六升煮取三升去滓分温三服去桂枝加白术湯方大便鞕小便利者用此於桂枝附子湯方内去桂枝加术三兩餘依前法甘草附子湯甘草二兩炙附子九枚泡去皮臍白术二兩桂枝四兩去皮右四味以水六升煮取三升去滓温服一升日三服初服得微汗則解能食汗出服煩者服五合恐一升多者宜服六七合為妙按上條頂傷寒此條頂中風無疑本文痛不可近汗出短氣小便不利惡風不欲去衣或身微腫語皆是中風可見風寒與温相搏冬月若此而風與温濕熱濕相搏夏月又若彼王叔和云傷寒所致太陽痙濕暍三種宜應别論以為與傷寒相似由此觀之果何說耶太陽經證痙濕暍居先傷寒證居後駭眩無定乃後代咸為取宗焉傷寒書誠疑而難讀之矣辨傷寒發黄有寒濕相傳三法麻黄連翹赤小豆方麻黄二兩赤小豆一升杏仁四十枚去皮尖連軺二兩連翹根也大棗十二枚劈生薑二兩切甘草一兩炙生梓白皮已上八味以潦水一斗先煮麻黄再沸去上沫内諸藥煮取三升分温三服半日則盡瘀血在裏身必發黄用前方原文茵陳蒿湯方茵陳蒿六兩梔子十四枚劈大黄三兩右三味以水一斗先煮茵陳减六升内二味煮取三升去滓分温三服小便當利尿如皂角汁狀色正赤一宿腹减黄從小便去也身黄如橘子色小便不利腹微滿者用前方原文梔子蘖皮湯方梔子十五枚劈甘草一兩炙黄蘖一兩右三味以水四升煮取一升半分温再服身黄發熱者用前方按熱已發出於外則與瘀熱不同正當隨熱勢而亟散其黄俾不留於肌表也前條熱瘀故用麻黄此條發熱反不用麻黄正所謂寒濕中求之不盡泥傷寒之定法矣此𨽻太陽中篇惟仲景乃識其㫖所謂者何葢四條已發於痙濕暍三種瘀熱蒸黄之先凡近豈能窺乎至於總入陽明發黄尤為膚淺矣附越脾湯方麻黄六兩石膏八兩生薑二兩甘草二兩大棗十二枚太陽經風傷衞寒傷營方大青龍湯風寒兩傷大剛總法大青龍湯方麻黄六兩去節桂枝二兩去皮甘草二兩炙杏仁四十枚去皮尖生薑三兩切石膏如雞子大線裹碎大棗十二枚劈右七味以水九升先煮麻黄减二升去上沫内諸藥煮取三升去滓温服一升取微似汗汗出多者温粉撲之一服汗者停後服汗多亡陽遂虛惡寒煩燥不得眠也服青龍湯厥逆筋惕肉瞤此為逆也用真武湯救之仲景原文真武湯方茯苓三兩芍藥三兩生薑二兩切白术二兩附子一枚炮去皮破八片右五味以水八升煮取三升去滓温服七合日三服此乃少陰經之方先録於此按成註謂不久厥吐利無少陰裏證大謬無少陰證者但欲寐尚不止少陰疑似况敢言不久厥吐利等耶麻黄味甘温桂枝味辛熱寒則傷營必以甘緩之風則傷衞必以辛散之此風寒兩傷營衞俱病故以甘辛相合而為發散之劑甘草味甘平杏仁味甘苦苦甘為助佐麻黄以發表大棗味甘温生薑味辛温辛甘相合佐桂枝以解肌石膏味甘微寒而使石膏為重劑而又專達肌表者也大青龍湯發汗之重劑非桂枝所同用之稍逆則又有亡陽之失若脉微弱汗出惡風者不可服服之則厥逆筋陽肉瞤此為逆也傷寒發熱惡寒煩燥身心無柰者發汗則愈譬若亢熱已極一雨而凉其理可見也若見其燥熱投以寒凉其害豈勝言哉中風脉浮𦂳傷寒脉浮緩仲景以青龍對之證候與脉相對無不應手而愈風傷衞衞氣也寒傷營營血也營行脉中衞行脉外寒邪居脉中非特營受病邪自内作則併與衞氣犯之久則浸滛入骨亦自有淺深也太陽中風脉浮𦂳發熱惡寒身疼痛不出汗而煩燥者大青龍湯主之原文傷寒脉浮緩身不疼但重乍有輕時無少陰證者前湯發之原文大青龍湯仲景治傷寒發熱惡寒煩燥者則用之夫傷寒邪氣在表不得汗出其人煩燥不安身心無如之柰何如脉浮𦂳或浮數者急用此湯發汗則愈若不浮𦂳而數無惡寒身疼者亦不可用所以脉證不明者多不敢用也仲景治傷寒一則桂枝二則麻黄三則青龍桂枝治中風麻黄治傷寒青龍治中風見寒脉傷寒見風脉三者如鼎立人皆能言之而不曉前人處方用藥之意故醫遂多不用昌謂脉緩而浮者中風也故嗇嗇惡風浙浙惡寒翕翕發熱仲景以桂枝對之脉浮𦂳而嗇者傷寒也故頭痛發熱身疼腰痛骨節疼痛惡寒無汗而喘仲景以麻黄對之至於中風脉浮𦂳傷寒脉浮緩仲景皆以青龍對之昌為究之風傷衞則風邪干陽陽氣不固發越而為汗是以自汗是表虛故仲景用桂枝以發其邪芍藥以和其血葢中風則病在脉之外其病稍輕雖曰同發汗實解肌之藥耳所以仲景於桂枝症云令半身漐漐微似有汗不可如水淋漓病必不除可知中風不可大發汗汗過則反動營血邪氣乘虛襲之故病不除也寒傷營則寒邪入陰血而營行脉中者也寒邪居脉中非特營受病邪自内作則併與衞氣犯之久則浸淫入骨是以汗不出而熱齒齕而煩寃仲景以麻黄發其汗又以桂枝助其發散欲滌除内外之邪營衞之病耳大坻二藥皆發汗以桂枝發其衞之邪麻黄開營衞之病治自有淺深也何以驗之觀仲景第十九症云病當自汗出者此為營氣和營氣和者外不諧以衞氣不共營氣和諧故也以營行脉中衞行脉外復發其汗營衞和則愈宜桂枝湯又四十七症云發熱汗出此為營弱衞强故使汗出欲救邪風者宜桂枝湯是知中風汗出者營和而衞不和又第一卷云脉浮而𦂳浮則為風𦂳則為寒風則傷衞寒則傷營俱病者即煩疼當發其汗是知傷寒浮𦂳者營衛俱病也此麻黄湯中并用桂枝此仲景之言也至於青龍雖治傷風見寒脉傷寒見風脉之病然仲景又云陽微惡風者不可服服之厥逆便有筋愓肉瞤之症故青龍一症尤難用藥須是形症諦當然後可行熱盛而煩手足自温脉浮而𦂳此傷風見寒脉也不煩少熱四肢微厥脉浮而緩此傷寒見風脉也二者為營衛俱病法宜大青龍湯小青龍湯方麻黄去節桂枝芍藥酒炒細辛甘草炙亁薑各三兩半夏五味半升傷寒表不解心下有水氣亁嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之原文傷寒心下有水氣咳而微喘發熱不渴服已渴者此寒去欲解也小青龍湯主之噎音謁食質氣不通也原文或問小青龍與小柴胡證皆嘔而發汗表裏之證大㮣彷彿何故二方用藥之不同曰夫傷寒表不解裏熱未甚而渴欲飲水不能多不當與之以腹中熱尚少而不能消水飲停蓄故作消症然水寒作病非温熱之劑不能解故用小青龍發汗散水原其理初無裏症因水寒以致然也若小柴胡症則係傷寒發熱之邪傳裏在於半表半裏之間熱氣内攻故生諸症是二症雖曰表裏俱病至其中之寒熱則全不同故用藥有薑桂柴苓之異耳亁薑附子湯亁薑附子下之後復發汗煩燥不得眠者亁薑附子湯主之原文此當與梔子豉湯症㕘看葢下後煩不得眠一也而用藥有寒熱不同乃爾服薑附湯有二法一法當熱服手少陰心也水包火熱服以接心火身表寒盛外火少也寒從外生熱從内消譬如凍死寒在外也一法當寒服足少陰腎也寒邪入水令冷服以類腎水身發微熱内水多也熱從外生寒從内消譬如飲冷寒在内也麻黄杏仁甘草石膏湯方方見前發汗後汗出而喘無大熱者麻黄杏仁甘草石膏湯主之原文予觀仲景常言發汗後乃表邪悉解止餘一症而已故言不可更行桂枝湯今汗出而喘無大熱乃上焦餘邪未解當用此方以散之夫桂枝加厚朴杏仁湯乃桂枝症悉俱而加喘者用之註言汗出而喘以為邪氣壅甚非桂枝所能發散此誤也况身無大熱更無證何故復言表邪必盛其後章下後不可更行桂枝湯條下註曰汗下雖殊其不當損正氣則一其言有至理有焉可見汗後所註之誤矣大抵當時因事發機前後失於照應故有此等之弊也桂枝甘草湯方桂枝甘草大棗發汗過多其人又手自冐心心下悸欲得按者桂枝甘草湯主之原文悸心動也怔怔忪忪不能自安也有氣虛而悸氣内弱心下空虛也有停水飲而悸心為火而惡水水既内停心不自安也有汗下後而悸汗為心液汗去心虛如魚離水也故悸與驚不同茯苓甘草大棗湯方茯苓桂枝甘草大棗發汗後其人臍下悸者欲作奔豚茯苓甘草大棗湯主之原文自明厚朴生薑半夏甘草人參湯方厚朴生薑半夏甘草人參汗後腹脹滿者前湯主之原文自明或問太陽篇中發汗後諸症不言太陽病固所當然亦合列於傷寒之右何故止言發汗後腹脹者厚朴半夏甘草人參湯主之曰凡言發汗後者以外無表症裏無别邪止有腹痛一事而已除此之外即䕶全安夫傷寒二字豈可易言哉其傳變吉㐫猶反掌耳可與所餘一症而並例哉其諸汗後不殊此意芍藥甘草附子湯方芍藥甘草附子發汗病不解反惡寒者虛故也芍藥甘草附子湯主之原文自明四逆湯方方見前發汗若下之病仍不解煩燥者茯苓四逆湯主之原文五苓散方方見前太陽病發汗後大汗出胃中亁煩燥不得眠欲得飲水者少少與飲之令胃氣和則愈若脉浮小便不利微熱消渴者與五苓散主之原文下同水道為熱所蔽故令小便不利小便不利則不能運化津液故令渴水無當於五味故用淡以治水茯苓猪苓澤瀉白术雖有或潤或燥之殊然其為淡則一也故功足以利水桂性辛熱辛熱則能化氣内經曰膀胱者州都之官津液藏焉氣化則能出矣此用桂之意也濁陰既出下竅則清陽自出上竅又熱隨溺而泄則渴不治可以自除雖然小便不利亦有因汗下之後内亡津液而致者不可强以五苓散利之强利之則重亡津液益虧其陰故曰大下之後復發汗小便不利者亡津液故也勿治之得小便利必自愈師又曰太陽隨經之邪直達膀胱小便不利其人如狂者此太陽之邪不傳他經自入其府也五苓散主之是使陽邪由溺而泄耳發汗見脉浮數煩渴者五苓散主之按太陽標病傳入標之本發渴溺不利以此散𨗳之邪自膀胱而出也若未渴妄用五苓散反引邪氣入裏而不能解也故易老云即太陽經之下藥也若傷寒太陽脉𦂳而渴者不宜用此中風發熱六七日不解而煩有表裏症欲飲水水入則吐者名曰水逆五苓散主之本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之太陽病寸緩闗浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如其不下者病人不惡寒而渴者此轉屬陽明也小便數者大便必鞕不更衣十日無所苦也渴欲飲水少少與之但以法救之宜五苓散或問上條云小便數者大便必鞕不更衣十日無所苦也嘗有四五日六七日不大便者即為攻之今言十日不更衣而不用攻伐何也曰此非結熱乃津液不足雖十日不更衣亦無所苦也經曰陽明病本自汗出醫更重發汗病已瘥尚微煩不了了者此大便必鞕故也以亡津液胃中亁燥故令大便鞕當問其小便日幾行本小便日三四行今日再行即知大便不久出為小便數少以津液足胃中故知不久大便也夫不便者若有潮熱讝語可下之症者然後可以攻之其人大便鞕而無諸下症者此津液不足當須自審慎勿以日數久而輒為攻下也五苓散為太陽裏之下藥也太陽高則汗發之下則引而竭之渴者邪入太陽裏也當下之使從膀胱出也腎燥膀胱熱小便不利此藥主之小便利者不宜用然太陽病熱而渴小便雖利亦宜五苓散下之當服不服則生何症答曰當服不服則榖消水去必致陽明燥火欝胃發黄故有調胃湯症此太陽入本失下也由不曾服五苓散故也不當服服之則生何症答曰不當服而服之是為犯本小便强利津液重亡侵陽之極則侵陰而成血症也輕則桃仁承氣湯重則抵當湯故五苓散調和陰陽者也乃太陽陽明之間故為調和之劑酒毒小便赤澁宜五苓散但熱在中焦未入太陽之本小便自利而清乃津液已行者若與五苓散利之則重涸腎水不惟重涸腎水而酒毒之熱亦不能去以故上下不通而溺濇則為發黄症也若入血室則為蓄血用五苓散以瀉濕熱太陽症傷寒自外入其標本有二說以主言之膀胱為本經絡為標以邪言之先得者為本後得者為標此乃客邪之標本也治當從客之標本又小腸火為本膀胱水為本乃寒毒之氣從標入本邪與手經相合而下至膀胱五苓散主之以方内桂枝陽中之陽茯苓陽中之陰相引而下於本𨗳出邪氣手經自上之下足經丙火壬水小腸上之下自膀胱火邪之氣從下之上以内為本水中有火火為客氣當再責其本兩腎相通又在下部責在下焦下焦如凟相火明也生地黄黄蘖主之邪從本受下焦火邪遺於小腸是熱在下焦填塞不便自内而之外也葢生地黄柏黄連乃陰中之陽為裏之表藥若五苓之桂术澤瀉猪苓茯苓乃陽中之陰為表之裏藥也治酒病宜發汗若止以五苓利小便炎熖不肯下行故曰火欝則發之辛温則散之是從其火體也乃知利小便濕去熱不去動大便尤為疎逺大便者有形質之物酒者無形水也從發而汗之最為之近以使濕熱俱去葢治以辛温發其火也佐以苦寒除其濕也茯苓甘草湯方茯苓桂枝二兩甘草兩生薑一兩傷寒汗出而渴者五苓散主之不渴者茯苓甘草湯主之原文下同傷寒厥而心下悸者宜先治水當服茯苓甘草湯却治其厥不爾水漬入胃必作利也金匱要畧曰水停心下甚者則悸厥雖寒勝然以心下悸為水飲内甚先與此湯治其水而後治其厥若先治厥則先飲浸漬入胃必作下利凡治悸其法或鎮固之或化散之惟飲之為悸甚於他邪雖有餘邪必先治悸何者以水停心下無所不入侵於肺為喘𠻳傳於胃為噦噎溢於皮膚為腫漬於腸間為利其厥之病甚重猶先治水况病之淺者乎白虎湯方石膏一斤知母六兩甘草二兩粳米六升傷寒脉浮滑此表有實裏有寒白虎湯主之原文按前篇云熱諸在裏表裏俱熱者白虎湯主之又曰其表不解不可與白虎湯此云脉浮滑表有實裏有寒者必表裏字訛耳又陽明一症云脉浮遲表虛裏寒四逆湯主之又少陰一症云裏寒外熱通脉四逆湯主之以此相㕘其訛益明矣又陽明篇曰脉浮而疾者小承氣湯既用承氣湯是裏熱也又厥陰篇曰脉滑而厥者裏有熱白虎湯主之是謂滑為裏熱也明矣况知母石膏豈應以水濟水成氏隨文釋之謬也海云此表有熱裏有寒非寒冷之寒寒邪之寒亦自有理可思傷寒脉浮而厥者裏有熱也白虎湯主之厥陰原文粳米本草諸家共言益脾胃如何白虎湯用之入肺以其陽明為胃之經色為西方之白故入肺也然治陽明之經即在胃也色白味甘寒入手太陽又少陰症桃花湯用此甘以補正氣竹葉石膏用此甘以補不足垣云身以前胃之經也胸胃肺之室也邪在陽明肺受火制故用辛寒以清肺所以號為白虎湯也活人云謂白虎湯治中暍汗後一解表藥耳非正傷寒藥也而夏日陰氣在内白虎尤宜戒之夫白虎湯具載仲景之書症治昭然明白何為非正傷寒之藥也况傷寒論言無表症者可與白虎湯今云汗後一解藥耳於法既無表症何解之有又曰夏月陰氣在内白虎尤宜戒之而明理論又云立秋後不可服秋則陰氣半矣白虎大寒若不能禁服之而為噦逆不能食或虛羸者有矣夫傷寒之法有是症則投是藥安可拘於時而為治哉假如秋冬之間患傷寒身無表症而大煩渴於法合用白虎湯苟拘其時何以措手若以白虎為大寒其承氣又何有於冬月耶既以夏宜戒秋不可行然則宜乎何時也雖然經云必先歲氣無伐天和此言常也假如賊邪變出陰陽寒暑亦當捨時而從症豈可以時令拘哉三陽合病腹滿身重難以轉側口不仁而靣詬讝語遺尿發汗則讝語下之則額上生汗手足逆冷自汗出者白虎湯主之原文垣云入足陽明手太陽味苦寒潤治有汗骨蒸腎經氣勞瀉心仲景用此治不得眠者煩燥也煩者肺也燥者腎也以石膏為君主佐以知母之苦寒以清腎之源緩以甘草粳米之甘而使不速下也經云胸中有寒者𤓰蒂散吐之又云表熱裏寒者白虎湯主之𤓰蒂知母味皆苦寒而治胸中寒及裏寒何也答曰成無已註云即傷寒寒邪之毒為熱病也讀者要逆識之如論語言亂臣十人書曰惟以亂民其能而亂四方亂皆治也乃治寒者也故云亂民亂四方也仲景所言寒之一字舉其初而言之熱病在其中矣若以寒為寒冷之寒無復苦寒之劑兼言白虎症脉尺寸俱長則熱可知矣白虎加人參湯五法藥即湯見許云有人初病嘔吐俄為醫者下之已七八日而内外發熱予診之曰當用白虎加人參湯或曰既吐復下且重虛矣白虎何用乎予曰仲景云若吐下後七八日不解熱結在裏表裏俱熱者白虎加人參湯正相當也葢嘔吐者熱留胃脘而致令虛火上逆三投湯而愈仲景既云傷寒若吐若下後七八日不解表裏俱熱者白虎加人參湯主之又云傷寒脉浮發熱無汗其表不解不可與白虎又云脉浮滑此以表有熱裏有寒白虎加人參湯主之嘗見林億校正謂仲景於此表裏自差矣余謂不然大抵白虎能除傷寒中渴表裏發熱故前後二症或云表裏俱熱或云表熱裏寒皆可服之一種脉浮無汗其表不解全是麻黄與葛根症安可行白虎也林億見所稱表裏不同便謂之差是亦不思之過也張云用藥有遲速之弊故設法以闗防法有闗防不盡者則著方以拯治也便如上二條前條乃仲景設法以闗防也後條及傷寒病若吐若下後七八日不解熱結在裏表裏俱熱時時惡風大渴口舌亁燥而煩飲水數升者以白虎加人參湯主之此二條乃著方以拯治也夫白虎湯專治大煩大渴古人設法之意惟恐表症未罷而輒用之治有太速之弊若背微惡寒及時時惡風二症其中煩渴已甚非白虎不能遏也必候表邪俱盡未免有太遲之愆也此乃法之闗防不盡者故著方以拯治也苟不著方必然違法此方法之妙所以不可偏廢也或問白虎湯仲景以表不解者不可與又時時惡風背上惡寒者此有表也以白虎主之何也葢石膏辛凉解足陽明本經熱蒸蒸發熱潮熱表裏皆熱舌燥煩渴之聖藥也且時時者時或惡風而不常也背上惡者但覺微惡而不甚也所以於盛熱燥渴而用則無疑矣若夫表症惡寒常在背上惡寒而加燥渴者切不可用也又太陽經發熱而渴無汗者不可與之但汗後脉洪大而渴者則可與之如陰傷寒靣赤煩燥身熱與夫胃虛惡心大便不實脉弱食少無大熱者切不可用也如悮用之則傾危可立而待矣尚論後篇卷三
