body:
  text: 尚論後篇卷四新建喻昌撰太陽合陽明方桂枝加葛根湯桂枝湯加葛根一一太陽病項背強几几反汗出惡風者主之仲景原文几几項拘強之狀按後症葛根湯乃桂枝湯中加麻黄葛根也其症無汗故以麻黄發之此症有汗故去麻黄而曰桂枝加葛根湯也若有麻黄則亦葛根湯矣葛根湯桂枝湯加麻黄葛根太陽病項背強几几無汗惡風葛根湯主之原文風寒傷經絡之經則所過但痛而己未至於強風寒傷筋骨之筋則所過筋急強直而成剛痓痓痙字之訛也曰剛痓無汗之名也本草云輕可去實葛根麻黄形氣之輕者也此以風寒表實故加二物於桂枝湯中太陽與陽明合病者必自下利葛根湯主之原文太陽與陽明合病不下利但嘔者葛根加半夏湯主之愈原文葛根加半夏湯方見本湯凡合病必自下利下利裏症也今之庸醫皆曰漏底傷寒不治仲景則以前方主之葢以邪氣併於陽則陽實而陰虛陰虛故下利也以此湯散經中表邪則陽不實而陰氣平利不治而自止也惟明者知之其脉必弦而長張云凡合病皆下利各從外症以别焉夫太陽病頭項痛腰脊強陽明病目疼鼻亁不得臥少陽病胸脇痛耳聾凡遇兩經病症齊見而下利者合病也然但見一症便是不必悉具也仲景不言脉症止言太陽與陽明合病者以前章所論包含以上之症即此理也况各經之症所見不一難為定論乎按合病者三陽合病也謂二陽經或三陽經同俱受邪相合而病故曰合病此病之不傳者也併病者亦指三陽而言併者催併督併之謂前病未解後病已至有逼相併之義此病之傳者也且如太陽陽明併病一症若併而未盡是傳未過尚有表症仲景所謂太陽病不罷靣色赤陽氣怫鬱在表不得越煩燥氣短是也猶當汗之以各半湯若併之已盡是謂傳過仲景所謂太陽症罷潮熱手足汗出大便鞕而讝語者是也法當下之以承氣湯是知傳則入府不傳則不入府也所以仲景論太陽陽明合病止出三症加前太陽陽明併病則言其有傳變如此也然此皆三陽病耳與三陰無干若與三陰合病即是兩感矣所以三陰無合病例也梔豉湯方見太陽中篇發汗吐下後虚煩不得眠者主之原文下六條同懊者懊惱憹者欎悶貌心中懊懊惱惱煩煩憹憹欝欝不舒憤憤無奈此又煩悶而甚者也由下後表之陽邪乘虚内陷欝而不發結㐲於心胸之間故如是按梔子色赤味苦入心而治煩香豉色黒味鹹入腎而治燥發汗若下之而煩熱胸中窒者主之傷寒五六日大下之後身熱不去心中結痛者未欲解也宜主陽明病脉浮而𦂳咽燥口苦腹滿而喘發熱汗出不惡寒少惡熱身重若發汗則燥心憤憤反讝語者主之煩者氣也燥者血也氣主肺血主腎煩燥俱在上者腎子通於肺母也故用梔子以治肺煩用香䜴以治腎燥煩燥者懊惱不得眠也或曰煩者心為之煩燥者心為之燥何煩為肺燥為腎耶夫心者君火也與邪熱相接上下通熱金以之而燥水以之而虧獨存火耳故肺腎與之合而煩燥焉此煩雖肺燥雖腎其實心火為之也陽明病下之其外有熱手足温不結胸心中懊惱饑不能食但煩汗出者主之下利後更煩按之心下濡者為虛煩也宜此湯下利後不煩為欲解若更煩而心下堅者為穀煩此煩是心下濡者是邪熱乘裏客於胸中為煩也與此湯吐之則愈按此湯惟吐無形之虚煩則可若用之以去實則非䜴子所能宣矣宣實者湏𤓰蒂散主之凡服梔子湯病人舊微溏者不可與服之仲景用梔子湯治煩胸為髙之分也故易老云輕飄而象肺色赤而象火故能瀉肺之火也本草不言吐仲景用此為吐者梔子本非吐藥為邪氣在上拒而不納故令人上吐邪因得以出經曰髙者因而越之此之謂也或用梔子利小便實非利小便清肺也肺氣清而化膀胱為津液之府小便得以出也木經云治大小腸熱辛與庚合又與丙合又能泄戊其先入中州故也去皮泄心火連皮泄肺火入手太陰少陰經麻仁丸大黄枳實厚朴芍藥麻仁杏仁趺陽脉浮而濇浮則胃氣強濇則小便數浮濇相摶大便則難其脾為約麻仁丸主之原文成無已曰約者結約之約胃強脾弱約束津液不得四布但輸膀胱故小便數而大便鞕故曰脾約與此丸以下脾之結燥腸潤結化津液入胃大便利小便少而愈矣愚切有疑焉既曰約脾弱不能運也脾弱則土虧矣必脾氣之散脾血之耗也原其所由必久病大汗大下之後陰血枯槁内火燔灼熱傷元氣必傷於脾而成此症傷元氣者肺金受火氣無所攝傷脾者肺為脾之子肺耗則液竭必竊母氣以自救金耗則木寡於畏土欲不傷不可得也脾失轉輸之令肺失傳送之官宜大便秘而難下小便數而無藏蓄也理宜滋陰血使孤陽之火不熾而金行清化木邪有制脾土清健而運行精液乃能入腎則腸潤而通矣今以大黄為君枳實厚朴為臣雖有芍藥之養血麻仁杏仁之温潤為之佐使用之熱盛而氣實者無有不安若與熱雖盛而氣不實者雖得暫通保無有脾愈弱而腸愈燥者乎後之用此方者慎勿膠柱而調瑟茵陳蒿湯茵陳六兩大黄二兩梔子十四枚陽明病發熱汗出此為熱越不能發黄也但頭汗出身無汗劑頭而還小便不利渇飲水漿者此為瘀熱在裏身必發黄茵陳蒿湯主之原文下三條同傷寒八九日身黄如橘子色小便不利腹微滿者茵陳蒿湯主之梔子蘖皮湯梔子蘗皮傷寒身黄發熱者梔子蘗皮湯主之茵陳蒿湯治熱濕也梔子蘗皮湯治燥熱也如苖澇則濕黄旱則燥黄濕則泄之燥則潤之也此二藥治陽黄也麻黄連軺赤小豆湯方見三卷傷寒瘀熱在裏身必發黄麻黄連翹赤小豆湯主之連軺用連翹根也氣寒味苦主下熱氣梓白皮氣寒味苦主熱毒去三蟲時氣瘀熱之劑必以苦為主又曰大熱之氣寒以取之是也潦水即霖雨後行潦之水亦取其發縱之極流而不滯不助濕也右三湯其茵陳湯是欲泄滌其熱也梔子與麻黄二湯是欲解散其實也為治不同總之皆折火徹熱之劑耳色如烟熏黄乃濕病也一身盡痛色如橘子黄乃黄病也一身不痛間發黄活人云病人寒濕在裏不散熱蓄於脾胃腠理不開瘀熱與宿穀相薄欝蒸不消化故發黄與瘀血外症及脉俱相似但小便不利為黄小便自利為瘀血要之發黄之人心脾藴積發熱引飲脉必浮滑而𦂳數若瘀血症即如狂大便必黒此為異耳或問白虎症亦身熱煩渇引飲小便不利何以不發黄答曰白虎與發黄症相近徧身汗出此為熱越白虎症也頭靣汗出頸已下都無汗發黄症也又問太陽病一身盡痛發熱身如薫黄者何曰太陽中濕也仲景云傷寒發汗已身目為黄所以然者以寒濕在裏不解故也以為不可下也於寒濕中求之或謂傷寒發黄惟陽明與太陰有之俱言小便利者不能發黄何也葢黄者土之正色以太陰與陽明俱属土故發黄也其黄之理外不能汗裏不得小便脾胃之土為熱所蒸故色見於外而發黄也若小便利者熱不内蓄故不能變黄也其有别經之發黄者亦由脾胃之土受邪故也抵當湯抵當丸二方俱見太陽篇血流下焦而瘀者蓄血也大抵傷寒先看靣目次看口舌次看心下至少腹以手揣之若少腹鞕滿若小便不利者是津液留結可利小便若小便自利者是畜血症可下瘀血傷寒失汗熱畜在裏熱化為血其人善忘而如狂血善逸則善忘血下蓄則内急用藥以取盡黒物為効大抵看傷寒病人心下兩脇少腹但有鞕滿處以手按則痛者便當問其小便何如若小便不利乃是水與氣若小便自利者為有血也太陽病六七日表症仍在脉微而沉反不結胸其人發狂者以熱在下焦少腹當鞕滿小便自利者下血乃愈抵當湯主之原文下三條同仲景凡稱太陽症脉沉者皆謂發熱惡寒頭項強痛而脉反沉也其症兼發狂小腹痛者為蓄血此條抵當湯是其例也自經而言則曰太陽自腑而言則曰膀胱陽邪由經而入結於膀胱故曰隨經瘀熱在裏太陽病身黄脉沉結少腹鞕小便不利者為無血也陽明症其人喜忘者必有蓄血所以然者本有久瘀血故令喜忘屎雖鞕大便反易其色必黒宜抵當湯下之病人無表裏症發熱六七日雖脉浮數者可少下之假令已下脉數不解而下不止必協熱而便膿血也或問攻下之法湏外無表症裏有下症然後可攻上言無表裏症况脉更浮數何故言可以下之曰此非風寒之所病是由内傷而致然也若外不惡寒裏無讝語但七八日發熱有爍津液乃陽盛陰虚之時苟不攻之其熱不已必變生焉故云雖脉浮數可下不待沉實而攻之夫内傷者經曰趺陽脉浮而數浮則傷胃數則傷脾此非本病醫特下所為也仲景之意不外是理凡傷寒當下之症皆從太陽陽明在經之邪而入於腑故下之今不言陽明病而但曰病人無表裏症此非自表之裏而病也但為可下故編於陽明篇中學者宜詳玩焉傷寒有熱少腹痛應小便不利今反利者為有血也當下之不可餘藥宜抵當丸按成註身黄屎黒喜忘發狂亦是推廣之詞若依上文只是滿而不鞕耳抵當湯丸藥味同劑如何是二法葢喜忘發狂身黄屎黒者疾之甚也但小腹滿鞕小便利者輕也故有湯丸之别桃仁大黄等分水蛭蝱蟲多者作湯三之二者作丸作丸之名取其數少而緩也故湯用煎服一升丸止服七合也活云若用抵當湯丸更宜詳慎審其有無表症若有蓄血而外不解亦未可便用宜先用桂枝湯以解外緣熱客膀胱太陽經也大陷胸湯方見前太陽病脉浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫又下之動數變遲宜大䧟胸湯按太陽病在表未曽解在表而攻裏可謂虛矣而况所得之脉皆浮而動數乎今得悮下動數變遲矣而又曰胃中空虚又曰短氣燥煩虚之甚矣借曰陽氣内陷心下同鞕而可迅攻乎豈大陷胸之力緩於承氣况已下者不可再下寧不畏其虛乎且經明曰結胸脉浮大者不可下下者死又曰結胸症悉具煩燥者死今曰脉浮又曰煩燥大陷胸果可用乎彼陽病實下結胃中空虛客氣動膈心下懊憹者以梔子䜴湯吐胸中之邪况太陽失下後明有虚症乎傷寒六七日結胸熱實脉沉而𦂳心下痛按之不鞕者大䧟胸湯主之原文下三條同經言所以成結胸者以下之太早故也此不云下後但云傷寒六七日結胸熱實此亦不因下早而結胸者何也夫下早結胸事之常熱實結胸事之變其熱實傳裏為結胸乃法之闗防不盡者故仲景述其症以註方於其下也於此可見古人用心曲盡其妙且如下章以水結胸脇但頭汗出者以大䧟胸湯主之亦在常法之外故條列其症以彰其理也亦或其人本虛或曽吐下而裏氣弱外邪因入故自為結胸者也然所入之因不同其症治則一理而已傷寒十餘日熱結在裏後徃來潮熱者與大柴胡湯但結胸無大熱者此為水結在胸脇也但頭微汗出者大䧟胸湯主之太陽病重發汗而復下之不大便五六日舌上燥而渇日晡所小有潮熱從心下至少腹鞕滿而不可近者大䧟胸湯主之按太陽病已重發汗表則虚矣若復下之更又虛矣不大便五六日可見津液之耗矣非若前章之未曽發汗而但下之傷於早爾今雖有硬痛而可以迅攻之乎若曰潮熱於申酉係陽明属調胃承氣症既又曰少有潮熱猶可疑待之間將無他法以緩取之乎按潮熱本属陽明也太陽潮熱惟此一症耳雜病太陽潮熱則在己午更玩一小字則知邪於太陽為多陽明為少傷寒五六日嘔而發熱者柴胡湯症具而以他藥下之柴胡症仍在者若上下滿而鞕痛者為此結胸也大䧟胸湯主之小䧟胸湯方見前文蛤散藥即方見白通散葱白四莖乾薑一兩附子一枚人尿五合猪膽汁三合小結胸病正在心下按之則痛脉浮滑者小䧟胸湯主之原文下仝上文云鞕滿而不可近者是不待按而亦痛也此云按之則是手按之然後作痛爾上文云至少腹是通一腹而言之此云正在心下則少腹不鞕痛可知矣熱微於前故云小結胸也且結胸脉沉𦂳或寸浮闗沉今脉浮滑知熱氣猶淺尚未深結所以用此湯除胸膈上結熱也病在陽應以汗解之反以冷水潠之若灌之其熱被却服文蛤散不瘥者與五苓散實結胸無熱症者與三物小䧟胸湯白通散亦可服大䧟胸湯太陽本藥也大䧟胸丸陽明藥也小䧟胸湯少陽藥也大䧟胸湯治熱實大䧟胸丸兼喘小䧟胸治痞按經云結胸脉浮大不可下下之則死張云用藥如用兵知可而進知難而退此理勢之必然也夫寸浮闗沉乃結胸可下之脉今脉浮大心下雖結其表邪尚未全結也若輒下之重虚其裏外邪復聚而必死矣仲景所以言此為箴戒使無踵其弊也其脉既不可攻當候其變而待其實假如小結胸症其脉浮滑按之則痛故知邪非深結亦不敢下無過解除心下之熱耳小䧟胸湯主之或又曰結胸倘有外症大䧟胸可用否予曰結胸無外症或有微熱或有小潮熱仲景已明言之其餘别無表症若有外症其邪亦未結實不可以結胸論也經曰傷寒六七日發熱惡寒肢節煩疼微嘔心下支結外症未去柴胡加桂枝湯主之又傷寒六七日已發汗而復下胸脇微結小便不利渇而不嘔但頭汗出徃來寒熱心煩者此為未解也柴胡桂枝亁薑湯主之已上之症雖云心下支結及言胸脇滿微結二條俱有外症所以柴胡加桂枝及加乾薑以和解之如無外症止有胸腹結實而痛者方為結胸病也陽明少陽各方大承氣湯方厚朴去痞枳實泄滿芒硝軟堅大黄蕩寔必痞滿燥寔四症全者方可用小承氣湯方厚朴枳實大黄調胃承氣湯方芒硝大黄甘草發汗後惡寒者虚故也不惡寒但惡熱者實也當和胃氣與調胃承氣湯原文下三十四條同太陽病未解脉陰陽俱停必先振慄汗出而解若欲下之宜調胃承氣湯傷寒十三日過經不解讝語者以有熱當以調胃承氣湯下之太陽病過經十餘日心下温温欲吐而胸中痛大便反溏腹微滿欝欝微煩先此時自極吐下者可與調胃承氣湯陽明潮熱大便微鞕者可與大承氣湯恐有燥屎欲和之法與小承氣湯傷寒若吐若下後不解不大便五六日上至十餘日大承氣湯主之若一服利止後服此叚分作三截看自傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀止為上一截是將潮熱讝語不惡寒不大便對為現證下文又分作一截以辨劇者微者之殊微者但發熱讝語但字為義以發熱讝語之外别無他症其用承氣湯一方利止後服見其熱輕猶恐下之太過也至於劇者發則不識人循衣摸床愓而不安微喘直視如此熱極證危不可不决死生以斷斷以脉弦者生濇者死此陽熱已極若脉弦為陰未絶猶可下之以復其陰若弦濇為陰絶不可救藥而必死矣潮熱者若潮汐之來不失其時一日一發按時而發者謂之潮熱若曰三五發者即是發熱非潮熱也潮熱属陽明陽明旺於未申必於日晡時發乃為潮熱讝語者謂亂言無次數數更端也鄭聲者語鄭重頻煩也只將一字内言重叠頻言之終日慇懃不換他聲也葢神有餘則能機變而亂語數數更端神不足則無變聲而只守一聲也此虚實之分也讝語属陽鄭聲属陰經云實則讝語虛則鄭聲讝語者顛倒錯亂言出無倫常對空獨語如見鬼狀鄭聲者鄭重頻煩語雖謬而鄭重頻煩諄諄不已老年人遇事則諄語不休以陽氣虛故也此讝語鄭聲虛實之所以不同也二者本不難辨但陽盛裏實與陰甚隔陽皆能錯語湏以他症别之大便秘小便赤身熱煩渇而妄語者乃裏實之讝語也小便如常大便洞下或發燥或反發熱而妄言者乃陰隔陽之讝語也陽明病讝語發潮熱脉滑而疾者小承氣湯主之因與承氣一升腹中轉失氣者更服一升陽明病其人多汗以津液外出胃中燥大便必鞕鞕則讝語小承氣湯主之陽明病讝語有潮熱及不能食者胃中必有燥屎五六枚也若能食但鞕耳宜大承氣湯下之汗出讝語者以有燥屎在胃中此為風也湏下之雖經久可下之下之若早語言必亂以表虚裏熱故也宜大承氣湯或問經言胃中有燥屎五六枚何如答曰夫胃為受納大腸為傳過之府燥屎豈有在胃中哉故經言穀消水去形亡也以是知在大腸而不在胃也明矣按胃實者非有物也地道塞而不通也故使胃實是以腹如仰瓦註曰胃上口為賁門胃下口為幽門幽門按小腸上口即大腸上口也大小二腸相㑹為䦨門水滲泄入於膀胱粗􅀈入於大腸結於廣腸廣腸者地道也地道不通土壅塞也則逆上行至胃名曰胃實所以言陽明當下者言上下陽明經不通也言胃中有燥屎五六枚者非在胃中通言陽明也言胃是連及大腸也以其胃為足經故從下而言之也從下而言是在大腸也若胃中實有燥屎則小腸乃傳導之府非受盛之府也啟元子云小腸承奉胃司受盛糟粕受已復化傳入大腸是知燥屎在小腸之下即非胃中有也二陽併病太陽症罷旦發潮熱手足漐漐汗出大便難而讝語者下之則愈宜大承氣湯陽明病下之心中懊憹而煩胃中有燥屎者可攻腹微滿初頭鞕後必溏不可攻之若有燥屎者宜大承氣湯病人煩熱汗出則解又如瘧狀日晡所發熱者属陽明也脉實者宜下之脉浮虛者宜發汗下之與大承氣湯大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也宜大承氣湯病人小便不利大便乍難乍易時有微熱喘冐不能卧者有燥屎也宜大承氣湯太陽病三日發汗不解蒸蒸發熱者属胃也調胃承氣湯主之傷寒吐後腹脹滿者與調胃承氣湯太陽病若吐若下若發汗微煩小便數大便因鞕者與小承氣湯和之愈得病二三日脉弱無太陽柴胡症煩燥心下鞕至四五日雖能食與小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭鞕後必溏未定成鞕攻之必溏湏小便利屎定鞕乃可攻之宜大承氣湯陽明病發熱汗多者急下之宜大承氣湯發汗不解腹滿痛者急下之宜大承氣湯腹滿不减减不足言當下之宜大承氣湯或謂减不足言復曰當下之何也此古之文法如是也言腹滿不减當下之宜大承氣湯此滿而不减之謂也若時滿時减者不可以當下而論假如太陽篇中云傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裏仍在表當湏發汗若頭痛必衂宜桂枝湯縁桂枝為當發汗而設非為治衂也其减不足言之說亦不外乎是理陽明少陽合病必下利其脉不負者順也負者失也互相尅賊名為負也脉浮而數者有宿食也當下之宜大承氣湯少陰病得之二三日口燥咽亁者急下之宜大承氣湯少陰病自利清水色純青心下必痛口亁燥者急下之宜大承氣湯小陰病六七日腹脹不大便者急下之宜大承氣湯或問承氣湯陽明當下之症宜用今少陰病亦用何也葢胃為水穀之海主養四旁四旁有病皆能傳之入胃其胃土燥則腎水亁以二三日則口燥咽亁是熱之深傳之速也故曰急下以全腎水夫土實則水清謂水穀不相混故自利清水而口亁燥此胃土濕熱而致然也下利色青青肝也乃肝邪傳腎縁腎之經脉從肺出絡心注胸中由是而心下痛故急下以去實熱逐腎邪其六七日腹脹不大便以入府之邪壅甚胃土勝則腎涸故急下以逐胃熱滋腎水葢陽明與少陰皆有急下之條然而症雖不同其入府之理則一是以皆用大承氣也下利讝語者有燥屎也宜小承氣湯大法秋宜下凡服下藥用湯勝丸中病即止不必盡劑下利三部脉皆平按之心下鞕者急下之大承氣湯下利脉遲而滑者内實也利未欲止當下之大承氣湯問曰人病宿食何以别之師曰寸口脈浮而大按之又澁尺中亦微而澁故知有宿食當下宜大承氣湯下利不欲食者以為宿食故也當下之宜大承氣湯下利瘥後至其年月日復發以病不盡故也當下之宜大承氣湯下利脉反滑當有所去下之乃愈宜大承氣湯病腹中滿痛者此為實也當下之宜大承氣湯脉雙弦而遲者必心下鞕脉大而𦂳者陽中有陰也可以下之宜大承氣湯或問承氣湯仲景有大小調胃之名何也然傷寒邪熱傳受入裏謂之入府府者聚也葢邪熱與糟粕藴而為實也實則潮熱讝語手心濈濈汗出者此燥屎所為也如人壯大熱大實者宜大承氣湯下之又熱結不堅滿者故减去厚朴枳實加甘草而和緩之故曰調胃承氣也若病大而以小承氣攻之則邪氣不伏病小而以大承氣攻之則過傷正氣且不及還可再攻過則不能復救可不謹哉仲景曰凡欲行大承氣先與小承氣一鍾腹中轉失氣乃有燥屎也可以大氶氣攻之若不轉失氣其不可攻攻之則腹脹不能食而難治又曰服承氣湯得利慎勿再服此諄諄告戒也凡用攻法必先妙筭料量合宜則應手而効若不料量孟浪攻之必至殺人按陽明一症分為太陽正陽少陽三等而以大小調胃承氣下之者按本草曰大黄酒浸入太陽經酒洗入陽明經浸久於洗得酒氣為多故能引之於至髙之分若物在山巔人迹不及必射以取之也故仲景以調胃承氣收入太陽門而大黄下註曰酒浸及詳其用本湯一則曰少少温服二則曰當和胃氣與調胃承氣湯又詳本湯之症則曰不吐不下心煩者又發汗不解蒸蒸發熱又吐後腹脹滿是太陽陽明去表未逺其病在上不當攻之故宜緩劑以調和之也及至正陽陽明則皆曰急下之與大承氣湯而大黄下注曰酒洗是洗輕於浸微升其趍下之性以治其中也至於少陽陽明則去正陽而逼太陽其分為下故小承氣湯中大黄不用酒制少陽不宜下故又曰少與曰微溏之勿令大泄此仲景之妙法也東垣不審胃之云者乃仲景置調胃承氣於太陽篇太陽不宜下故又稱胃以别之却踵成氏之謬以小承氣治太陽脾約之症以調胃承氣治正陽陽明大承氣之症余故不能無辨海云大小調胃三承氣之湯必湏脉浮頭痛惡風惡寒表症盡罷而反發熱惡熱讝語不大便方可用之若脉浮𦂳下之必結胸若脉浮緩下之必痞氣已上三法不可差也若有所差則無形者有遺害假令調胃承氣症用大承氣下之則愈後元氣不復以其氣藥犯之也大承氣症用調胃承氣下之則愈後神癡不清以其氣藥無力也小承氣症若用芒硝下之則或下利不止變而成瘧矣三承氣豈可差乎陶云大凡傷寒邪熱傳裏結實湏看熱氣淺深用藥今之庸醫不分當急下與宜微和胃氣之論一概用大黄芒硝亂投湯劑下之因茲而斃者多矣余謂傷寒之邪傳害非一治之則殊病有三焦俱傷者則痞滿燥實兼全俱宜大承氣湯葢厚朴苦温以去痞枳實苦寒以泄滿芒硝鹹以潤燥軟堅大黄苦寒以泄實去熱病斯愈矣若邪在中焦則有燥實堅三症故用調胃承氣湯以甘草和中芒硝潤燥大黄泄實不用枳朴恐傷上焦虛無氤氲之元氣調胃之名自此始矣若上焦受傷則痞而實用小承氣湯而以枳實厚朴除痞大黄泄實去熱去芒硝不傷下焦血分之真陰謂不伐其根本也若夫大柴胡湯則有表症尚未除而裏症又急不得不下者只得以此湯通表裏而緩治之又有老弱及血氣兩虚之人亦宜用此故經云轉藥孰𦂳有芒硝者𦂳也大承氣最𦂳小承氣次之調胃承氣又次之其大柴胡加大黄小柴胡加芒硝方為轉藥葢為病輕者設也仲景又云蕩滌傷寒熱積皆用湯液切禁丸藥不可不知猪苓湯方猪苓澤瀉茯苓滑石阿膠各一兩陽明病若脉浮發熱渇欲飲水小便不利者猪苓湯主之仲景原文按此浮字悮也活人云脉浮者五苓散脉沉者猪苓湯則知此症脉字下脱一不字也據太陽篇内五苓散乃猪苓澤瀉茯苓三味中加桂白术也陽明篇内猪苓湯乃猪苓澤瀉茯苓三味中加阿膠滑石也桂與白术味甘辛為陽主外阿膠滑石味甘寒為陰主内奉議之言亦可謂不失仲景之㫖矣苐奉議欲區别二藥分曉不覺筆下以沉對浮遂使後人致疑三陽症中不當言脉沉更不復致疑經文之有闕也更詳太陽症固常脉浮而陽明為表之裏故其脉不曰浮而曰長葢長者不浮不沉中之脉也成氏直以脉浮釋之而朱氏却以脉沉言之胥失之矣若曰脉浮者五苓散不浮者猪苓湯則得仲景之意矣又詳少陰篇病下利六七日咳而嘔渇心煩不得眠者猪苓湯一條雖不言脉沉然少陰之脉必沉也豈活人以少陰對太陽一症而言歟以此推之成氏隨文悮釋明矣陽明病汗出多而渇者不可與猪苓湯以汗多胃中燥猪苓湯利其小便故也原文針經曰水穀入於口輸於腸胃其液别為伍天寒衣薄則為溺天熱衣厚則為汗是汗溺一液也汗多為津液外泄胃中亁燥故不可與猪苓湯利小便也小柴胡湯方見太陽中篇傷寒五六日中風徃來寒熱胸脇苦滿黙黙不欲飲食心煩喜嘔或胸中煩而不嘔或渇或腹中痛或脇下痞鞕或心下悸小便不利或不滿身有微熱或欬者與小柴胡主之仲景原文下二十條同或問少陽膽經縈紆盤屈皆多於各經及觀少陽篇中治病至簡又不聞何藥為本經之正法何也夫經絡所據身之後属太陽太陽為陽中之陽陽分也身之前属陽明陽明為陽中之陰陰分也陽為在表陰為在裏少陽在身之側夾於表裏之間故曰半表半裏太陽膀胱水寒也陽明大腸金燥也邪在陰陽二分之中近後膀胱水則惡寒近前陽明金則發熱故徃來寒熱也治法大陽在標可汗而解麻黄湯是也在本可滲而解五苓散是也陽明在標可以解肌葛根是也在本可下而解之承氣湯是也獨少陽居中不表不裏開竅於膽有入無出故禁發汗禁利大便禁利小便惟宜和之以小柴胡湯故名三禁湯冷熱均平從於中治乃和解之劑若犯之則各隨上下前後本變中變與諸變不可勝數醫者宜詳之本方加減法血弱氣盡腠理開邪氣因入與正氣相搏結於脇下正邪分爭徃來寒熱發作有時黙黙不欲飲食臟腑相連其痛必下邪髙痛下故使嘔也小柴胡主之原文接血弱氣盡至結於脇下是釋胸脇苦滿句正邪分爭是釋徃來寒熱句此是倒裝法也至黙黙不欲飲食兼上文滿痛而言也若臟腑相連四句乃釋心煩喜嘔也服柴胡湯已渇者属陽明也以法治之得病六七日脉遲浮弱惡風寒手足温醫二三下之不能食而脇下滿痛靣目及身黄頭項強小便難者與柴胡湯後必下重口渇而飲水嘔者柴胡湯不中與也食穀者噦原文嘔噦而煩渇者小柴胡湯主之傷寒四五日身熱惡風頭項強脇下滿手足温而渇者小柴胡湯主之原文傷寒陽脉濇陰脉弦法當腹中急痛者先與小建中不瘥者與小柴胡湯主之傷寒中風有柴胡症但見一症便是不必悉具凡柴胡湯症而下之若柴胡症不罷者復與柴胡湯必蒸蒸而振却發熱汗出而解太陽病過經十餘日及二三下之後四五日柴胡症仍在者先與小柴胡湯嘔不止心下急欝欝微煩者為未解也與大柴胡下之則愈傷寒十三日不解胸脇滿而嘔日晡所發潮熱已而微利此本柴胡症先服小柴胡湯以解外後宜芒硝主之傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便鞕脉細者此為陽微結必有表復有裏也可與小柴胡湯設不了了者得屎而解陽明病發潮熱大便溏小便自可胸脇滿不結者小柴胡湯主之陽明病脇下鞕滿不大便而嘔舌上白胎者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗出解也陽明中風脉弦浮大而短氣者小柴胡湯主之本太陽病不解轉入少陽者脇下鞕滿乾嘔不能食徃來寒熱尚未吐下脉沉𦂳者與小柴胡湯嘔而發熱者小柴胡湯主之傷寒瘥已後更發熱者小柴胡湯主之脉浮者以汗解之脉沉實者以下解之婦人中風發熱惡寒經水適來得之七八日者主之婦人傷寒發熱經水適來晝日明了夜則讝語者主之仲景傷寒論中言婦人者止此二條耳活人書言婦人傷寒治法與男子不同男子先調氣女子先調血此大畧之辭耳要之脉𦂳無汗為傷寒脉緩有汗為中風熱病脉洪大中暑細弱其症一也當汗當下豈必調血而後行津液耶仲景傷寒論不分男女良以此歟此論固當猶為未也仲景亞聖也世醫所知反不知有是理乎聖人創物賢者述之事可以為天下則聖人已先據之矣何待世人明之乎聖人不言以其同診也後人不知湯液之源故立為婦人法則異於男子常人少具聰明眼者肯以此為是乎然以藥考之則可知也假令桂枝芍藥固營而開衛非血藥而何麻黄防風雖為之發汗本治女子餘疾非血藥而何白虎小柴胡中知母則治熱柴胡則調經皆氣中之血虚也當歸地黄不言可知為血藥白术人皆以為氣劑本草言能利腰臍間血非血藥乎大抵用之在陽便是氣藥用之在陰便是血藥若男子與女人傷寒皆營衛受病其症一也何以云男先調氣女先調血也此二句雲岐子以為治雜病法之常體非為傷寒設也其所以然者以其任衝盛而有子月事行有期有熱入血室一症不得不異也在姙孕不得不保在經血不得不調表裏汗下何常有異也於汗下藥中増損自有調保之義活人云姙娠不用桂枝半夏桃仁柴胡湯減半夏為黄龍湯是則是矣必竟蓄血極而鄰於死湏抵當湯丸則安得不用止是減劑從輕可也故黄帝云婦人身重毒之何如岐伯曰有故無殞亦無殞也大聚大積其可犯也衰其大半而止過者死此所以有從輕之義葢由諸此以知桂枝半夏桃仁可用處必用不可全無但當從輕則可耳保安丸中有桂附牛膝皆隳胎之劑以其數多之中些少是亦從輕而無妨也又為引用必湏少而不可無也大意如此後之君子更宜詳定保劑多破劑少破者從其保破劑多安劑少安者從其破此理不可不知又寒熱多少例寒者多熱者少熱不為之熱熱者多寒者少寒不為之寒按岐伯之論謂姙婦之用毒藥可用而不可過也婦人懐孕謂之重身然用毒藥以治其病者正以内有病之故則有病以當毒藥其子必無殞也不惟子全而母亦無殞也但大積大聚或病甚不堪不得不用此以犯之祗宜衰其大半而止藥行彼病自漸去若過用其藥敗損真氣死矣按男子亦有熱入血室症經云陽明病下血讝語此熱入血室但頭汗者刺期門葢衝脉為血海即血室也男女均有之男子下血讝語婦人寒熱似瘧皆為熱入血室廹血下行則為恊熱而利挾血之脉乍濇乍數或沉伏血熱交併則脉洪盛大抵男子多在左手女多在右手見之也或問小柴胡近世治傷寒發熱不分陰陽而用之何也曰柴胡之苦平乃足少陽經傷寒發熱之藥除半表半裏之熱及徃來寒熱小有日晡潮熱也佐以黄芩之苦寒以退熱半夏生薑之辛以退寒人參大棗之甘温以助正氣解渇生津液則陰陽和而邪氣解矣但太陽經之表熱陽明經之標熱皆不能解也如用之豈曰無害若夾陰傷寒靣赤發熱脉沉足冷者服之立至危殆可不慎哉及内虚有寒大便不實脉息小弱與婦人新産發熱皆不可用也夷堅志云朱肱吴興人尤深於傷寒在南陽大守盛次仲疾作召視之曰小柴胡湯症也請併進三服至晚乃覺滿又視之問所服藥安在取視乃小柴胡散也肱曰古人製咬咀剉如麻豆大煮清汁飲之名曰湯所以入經絡攻病取快今乃為散滯在膈上所以胸滿而病自如也因旋製自煮以進兩服遂安小建中湯方見三卷傷寒陽脉澁陰脉弦法當腹中急痛者先與小建中湯不瘥者與小柴胡湯主之垣云芍藥味酸於土中瀉木為君飴糖甘草甘温補脾養胃為臣水挾木勢亦來侮土故脉弦而腹痛肉桂太辛熱佐芍藥以退水薑棗甘辛温發散陽氣行於經絡皮毛為使故名建中大柴胡湯柴胡八兩大黄二兩枳實四枚半夏半升黄芩三兩芍藥三兩生薑五兩大棗十二枚太陽病過經十餘日及二三下之後四五日柴胡症仍在者先與小柴胡湯嘔不止心下急欝欝微煩者為未解也與大柴胡湯下之則愈仲景原文下四條同傷寒十餘日熱結在裏復徃來寒熱者與大柴胡湯有人病傷寒心煩喜嘔徃來寒熱醫以小柴胡與之不除予曰脉洪大而實熱結在裏小柴胡安能去之仲景云傷寒十餘日熱結在裏復徃來寒熱者大柴胡湯三服而病除葢大黄蕩滌藴熱傷寒中要藥大柴胡酒洗生用按柴胡大黄之藥升降同劑正見仲景處方之妙柴胡升而散外邪大黄降而泄内實使病者熱退氣和而自愈傷寒發熱汗出不解心下痞鞕嘔吐而下利者大柴胡湯主之傷寒後脉沉沉者内實也下解之宜柴胡湯或問大柴胡若内煩裏實者固宜用也其嘔而下利者亦用之何也夫治病節目虚實二者而已裏虚者雖便難而勿攻裏實者雖吐利而可下經曰汗多則便難脉遲尚未可攻以遲為不足即裏氣未實故也此以大柴胡主之凡吐利心腹濡軟為裏虛嘔吐而下利心下痞鞕者為裏實也下之當然况太陽病過經十餘日及二三下之後四五日柴胡症仍在者先與小柴胡湯嘔不止心下急欝欝微煩者為未解也與大柴胡湯下之則愈二節病症雖有參差其裏實同一機也皆與大柴胡者宜也病若二十餘日以上有下症者止宜大柴胡湯恐承氣太峻葢傷寒過經則正氣多虛故也有人患病傷寒目痛鼻亁不得卧大便不通尺寸脉俱大已數日一夕汗出予謂速以大柴胡湯下之醫駭曰陽明自汗津液已涸法當用蜜煎何湏苦用下藥余謂曰子雖知蜜煎穏當還用大柴胡湯此仲景不傳之妙公安能知之余力爭竟投大柴胡二貼愈仲景論陽明之病多汗者急下之人多謂已是自汗若又下之豈不表裏俱虚又如論少陰云少陰病一二日口亁咽燥者急下之人多謂症發於陰得之日淺但見亁燥若更宜下豈不陰氣愈甚舉此二端則其可疑者不可勝數此仲景之書人罕能讀也余謂仲景言急下之者亦猶急當救表急當救裏之説凡稱急者為立變謂纔覺汗未至津液亁燥便速下之則為精捷免致用蜜煎也三陰及各症方桂枝加芍藥即於桂枝湯内倍加芍藥桂枝加大黄湯即於桂枝湯内加大黄本太陽病醫反下之因爾腹滿時痛者属太陰也桂枝加芍藥湯主之仲景原文下二條同表症未罷而醫下之邪乘裏虚當作結胸今不作結胸而作腹滿時痛是属於太陰裏氣不和故腹滿時痛耳時痛者有時而痛非火實之痛也故但與桂枝湯以解表加芍藥以和裏大實痛者桂枝加大黄湯主之大凡表症未罷仍當解表若悞下以虛其裏則餘邪乘虚而入内作大實痛曰大實痛則非時而痛者可例矣故前方但倍芍藥而此則加大黄加大黄者取其苦寒能蕩實也或問太陰有可下者乎曰有經云及太陽症醫反下之因爾腹滿時痛桂枝加芍藥湯大實痛桂枝加大黄湯易老云此非本有是症以其錯下脾傳於胃故為悮下傳也治病必求其本假令腹痛桂枝加芍藥桂枝加大黄何為不只用芍藥大黄之属却於桂枝湯内加之葢以病從太陽中來當以太陽為本也又如結胸症自髙而下脉浮者不可下故先用麻黄湯解表已然後以䧟胸湯下之是亦求其本也至於蓄血下焦血結膀胱是亦從太陽中來侵盡無形之氣乃侵膀胱中有形之血太陰為病脉弱其人續自便利設當用大黄芍藥者宜減之以其人胃氣弱易動故也當歸四逆湯當歸桂枝芍藥細辛各三兩甘草炙木通各三兩大棗二十五枚當歸四逆加吴茱萸生薑湯藥即方見手足厥脉細欲絶者當歸四逆湯主之原文若其人内有久寒者宜當歸四逆加吴茱萸生薑湯主之仲景原文下同按此承上文言雖有手足厥脉細欲絶症候若其人内有久寒則加吴茱萸生薑以散久寒而行陽氣曰久寒者陳久之寒對下直中寒也明矣下利脉大者虚也以其強下之故也設脉浮革因爾腸鳴者属當歸四逆湯主之四逆湯方見太陽中篇傷寒醫下之續得下利清穀不止者當救裏宜四逆湯原文下十條同病發熱頭疼脉反沉者若不瘥身體疼痛當救其裏宜四逆湯發熱頭痛表病也脉反沉者裏脉也經曰表有病者脉當洪大今脉反沉遲故知愈也見表病而得裏脉則當瘥若不瘥為内虛寒甚與此湯救其裏自利不渇者属太陰以其臟有寒故也當温之宜四逆軰經言軰字者為藥性同類惟輕重優劣不同耳凡太陰自利不渇師言有用理中而愈者甚則理中加附子而獲安者凡言軰者葢如此夫四逆湯甘辛相合乃大熱之劑苟輕用之恐有過度之失所以仲景不為定擬也莫若以理中循循而用之至為平穏如不得已者四逆方為用也少陰病脉沉者急温之宜四逆湯少陰病飲食入口則即吐心中温温欲吐復不能吐始得之手足寒脉弦遲者此胸中實不可下也當吐之若膈上有寒飲亁嘔者不可吐也急温之宜四逆湯大汗出熱不去内拘急四肢疼又下利厥逆而惡寒四逆湯主之大汗若大利而厥冷者四逆湯主之嘔而脉弱小便復利身有㣲熱見厥者難治四逆湯主之吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之既吐且利小便復利而大汗出下利清穀内寒外熱脉㣲欲絶者四逆湯主之属霍亂麻黄附子細辛湯麻黄細辛二兩附子一枚少陰病始得之反發熱脉沉者前湯主之原文下三條同或問論傳經之邪自三陽傳至太陰太陰則傳少陰此不言傳經而言始得之何也曰傳經者古人明理之法之意如此安可執一而論哉夫三陽傷寒多自太陽入次第而傳至厥隂者固有也其三陽傷寒亦有自利不渇始自太陰而入者今少陰病始得之反發熱正由自入故云始得之縁少陰無身熱而今有熱故言反發熱以不當發熱而熱也為初病邪淺故與麻黄附子細辛湯以發散之按六經中但少陰症難辨此條要看一反字是以陰症雖云不用麻黄今既始得之反發熱脉沉所以用麻黄附子細辛以温散之耳少陰病得之二三日麻黄附子甘草湯微發汗以二三日無裏症故微發汗也詳仲景發汗湯劑各分輕重不同如麻黄桂枝湯青龍各半越婢等湯各有差等至於少陰發汗二湯雖同用麻黄附子亦有加減輕重之别故以加細辛為重加甘草為輕辛散甘緩之義也其第一症以少陰本無熱今發熱故云反也葢發熱為邪在表而當汗又兼脉沉属陰而當温故以附子温經麻黄散寒而熱湏汗解故加細辛是汗劑之重者第二症既無裏寒之可温又無裏熱之可下求其所以用麻黄附子之義則是脉亦沉方可名曰少隂病身亦發熱方行發汗藥又得之二三日病尚淺比之前症亦稍輕故不重脉症而但曰微發汗所以去細辛加甘草是汗劑之輕者黄連阿膠湯黄連四兩黄芩一兩芍藥二兩阿膠三兩雞子黄二枚生用少陰病得之二三日已上心中煩不得卧前湯主之原文附子湯附子一枚炮白术二兩茯苓白芍人參少隂病得之一二日口中和其背惡寒者當灸之附子湯主之原文下同按背者胸中之府諸陽受氣於胸中而轉行於背内經曰人身之陰陽者背為陽腹為陰陽氣不足陰寒氣盛則背為之惡寒若風寒在表而惡寒者則一身盡寒矣但背惡寒者陰寒氣盛可知如此條是也又或者陰氣不足陽氣内䧟入於陰中表陽新虚有背微惡寒者經所謂傷寒無大熱口燥渇心煩背微惡寒白虎加人參湯主之是也一為陰寒盛氣一為陽氣内䧟何以明之葢陰寒為病則不能消耗津液故於少陰病則曰口中和及陽氣内䧟則熱爍津液為乾故於太陽病則口燥舌亁而渇也要辨陰陽寒熱不同者當於口中潤燥詳之按傷寒以陽為主上件病皆隂勝幾於無陽矣辛甘皆陽也故用附术參苓所以散寒而養陽辛温之藥過多則恐有偏陽之弊故又用芍藥之酸以扶陰經曰火欲實木當平之此用芍藥之意也少陰病身體痛手足寒骨節痛脉沉者附子湯主之桃花湯乾薑一兩赤脂石一斤粳米一升少隂病下利便膿血者桃花湯主之原文下同少隂病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之此症自三陽傳來者純是熱症成無已因其下利而曰脇熱因其用亁薑而曰裏寒余謂不然葢少陰腎水也主禁固二便腎水為火所灼不能濟火火熱尅伐大腸金故下利且便膿血此方用赤石脂以其性寒而澁寒可以濟熱濇可以固脱用乾薑者假其熱以從治猶之白通湯加人尿猪胆乾薑黄連黄芩人參湯用芩連彼假其寒此假其熱均之假以從治爾經曰寒者熱之熱者寒之微者逆之甚者從之逆者正治從者反治從少從多觀其事也正此之謂用粳米恐石脂性寒損胃故用以和之向使少陰有寒則亁薑一兩之寡豈足以温赤脂一斤之多適足以濟寒而殺人矣豈仲景之方乎猪膚方猪黒皮白米粉少陰病下利咽痛胸滿心煩者主之原文膚乃是燖猪刮下黒皮禮運疏云革膚内厚皮膚革外薄皮語云膚淺義取諸此按白粉乃白米粉也其鉛粉亦名白粉又名定粉又名胡粉主治積聚疳利與白米粉不同甘草湯即甘草一味桔梗湯甘草桔梗連翹薄荷竹葉梔子黄芩少陰病二三日咽痛者可與甘草湯不瘥者可與桔梗湯原文苦酒湯藥即方見少陰病咽中生瘡不能語言聲不出者苦酒湯主之原文半夏湯藥即方見半夏散藥即方見少陰病咽中痛半夏散及湯主之原文或問六經傷寒皆不言咽痛惟少陰篇中有咽痛咽傷之症何也夫少陰咽痛乃經絡所繫葢少陰之脉上貫肝膈入肺循喉嚨繫舌本故有咽傷痛之患内經曰所生病者咽腫上氣嗌亁及痛此經脉所繫邪氣循行而致然也白通湯䓤白四莖亁薑附子一枚白通加猪膽汁湯藥即方見少陰病下利白通湯主之原文下同少陰病下利脉微者與白通湯利不止厥逆無脉亁嘔煩者白通加猪膽汁湯主之服湯脉暴出者死微續者生按少陰属腎水藏也得天地閉藏之令主禁固二便客寒居之則痛而失其體不能制水故下利䓤白之辛所以通陽氣薑附之辛所以散陰寒故即䓤白而名之曰白通或謂白通湯及白通加猪膽湯真武湯與通脉四逆湯皆為少陰下利而設除用薑附相同其餘之藥俱各殊異何也曰病殊則藥異少陰下利寒氣已甚非薑不能治此下利之理無殊至兼有之症不一則用藥當各從其宜如白通湯用薑附以散寒止利則加䓤白以通調陽氣若利而亁嘔煩者寒氣太甚内為格拒而姜附非煩者之所宜必嘔而不納故加人尿猪膽汁候温冷而服之以人尿猪膽汁皆鹹苦性寒之物自納而不阻至其所則冷體皆消熱性便發又真武湯治少陰病二三日不已至四五日腹滿小便不利四肢沉重疼痛自下利者為有水氣故多或為之症夫水氣者則寒濕也腎主之腎病不能制水水飲停蓄為水氣腹痛寒濕内甚也四肢沉重疼痛寒濕外甚也小便不利自下利者濕甚而水穀不能别也經曰脾惡濕甘先入脾茯苓白术之甘以益脾逐水寒濕所勝平以辛熱濕滛所勝佐以酸辛故用附子芍藥生薑之酸辛以温經散濕太陽篇中小青龍湯症亦為有水氣故多或為之症如真武湯者不殊此理也通脉四逆治少陰下利清穀裏寒外熱手足厥逆脉微欲絶者為裏寒身熱惡寒而靣色赤為外熱此陰甚於内格陽於外不相通與通脉四逆湯以散陰通陽其或為之症依法加減而治之已主四症俱云下利而兼有或為之症不一是以用藥大同而小異也或云白通湯用附子凡四症惟真武湯一症熟附餘皆生用何也凡附子生用則温經散寒非乾薑佐之則不可炮熟則益陽除濕用生薑相輔允為宜矣乾薑辛熱故佐生附而用生薑辛温少資熟附之功原佐使之妙無出此理然白通等湯以下利為重其真武湯症以寒濕相搏附子亦用炮熟仍用生薑以佐之其生熟之用輕重之分無過此理也真武湯方見三卷内太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲擗地者真武湯主之原文少陰病二三日不已至四五日腹痛小便不利四肢沉重頭痛自下利者此為有水氣其人或咳或小便利或下利或嘔者主之原文通脉四逆湯四逆加葱四莖除甘草少陰病下利清穀裏寒外熱者主之原文下同下利清穀裏寒外熱汗出而厥者主之四逆散甘草柴胡枳實炒芍藥生用各一兩少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之原文此寒邪傳至少陰裏有結熱則陽氣不能交接於四末故四逆而不温用枳實所以破結氣而除裏熱用柴胡所以升發真陽而回四逆甘草和其不調之氣芍藥収其失位之陰是症也雖曰陽邪在裏甚不可下葢傷寒以陽為主四逆有陰進之象若復用苦寒之藥下之則陽益虧矣是在所忌論曰諸四逆者不可下之葢為此也大凡初服藥時無是症服藥後而生新症者故經曰若吐若汗若下後之症是也即壊病也當以何逆而治之若初服藥有是症服藥後只是原症如故不見新有症候者只是病未退仲景所謂服湯一劑盡病症猶在者更作服也汗下同法清碧杜先生曰陽熱病難療陰寒病易治葢熱者傳經變態不一陰寒不傳治之亦一定法耳仁菴嚴先生云凡醫他人治過傷寒湏究前症曽服何藥倘症交雜先以重者為主次論輕者假如傳經之邪治有三法在皮膚者汗之在表裏兩間者和解之在裏者下之此自外入内之治也至若體虚之人交接陰陽飲食不節則裏虛中邪又非在表可汗之法必用大熱之劑温散經曰陰中於邪必内慄也表氣微虛裏氣失守故使邪中於陰也方其裏氣不守而為邪中正氣怯弱故成慄也故經言寒則傷營營者血也血寒則凝而不行致四肢血氣不接而厥身體冷而惡風寒附子乾薑適得其當若寒退而熱毒内攻目中不了了下利清水腹滿又有急下之法此論少陰經之治法也若寒退而手足厥其厥乍凛腹中穪而小便不利又有四逆散之治法所謂少陰傳變與太陽相同者此也猪苓湯猪苓茯苓澤㵼滑石阿膠少陰病下利六七日咳而嘔渇心煩不得眠者主之原文少陰病下利而主此方者分其小便而下利自止也渇欲飲水小便不利而主此方者導其陽邪由溺而泄則津液運化而渇自愈也然猪苓質楛輕清之象也能滲上焦之熱茯苓味甘中宫之性也能滲中焦之濕澤㵼味鹹潤下之性也能滲下焦之濕滑石性寒清肅之令也能滲濕中之熱四物皆滲利則又有利多亡陰之懼故用阿膠佐之以存津液於决瀆耳烏梅丸烏梅三百箇細辛桂枝人參附子炮黄栢六兩黄連一斤乾薑十兩當歸四兩川椒去汗苦酒醋也浸烏梅一宿去核蒸熟和藥蜜凡厥者陰陽氣不相順接便為厥厥者手足逆冷是也原文傷寒脉微而厥至七八日膚冷其人燥無暫安時者此為藏厥非為蚘厥也蚘厥者其人當吐蚘今病者静而復時煩此為藏寒蚘上入膈故煩湏臾復止烏梅丸主之原文蚘音蛔人腹中長蟲俗曰食蟲是也胃中冷必吐蚘吐蚘人皆知為陰也然亦有陽症吐蚘者葢胃中空虛既無穀氣故蚘上而求食至咽而吐又看别症何如不可專以胃冷為説曽記一人陽黄吐蚘又大發斑陽毒症口瘡咽吐蚘皆以冷劑取効是亦有陽症矣麻黄升麻湯麻黄升麻乾薑官桂芍藥甘草黄芩傷寒六七日大下後寸脉沉而遲手足厥逆下部脉不至咽喉不利吐膿血泄利不止者為難治麻黄升麻湯主之仲景麻黄升麻湯為下壊之劑而寸脉沉遲或厥或咽㗋不利咳𠻳膿血或下利不止斷作難治此藥有桂枝湯有麻黄湯有乾薑芍藥甘草湯有白虎湯内更有少陽藥黄芩是也此是三陽合而標病不應下而下之壊而成肺痿也若脉不遲者去乾薑官桂不下利者亦去之寸口脉小者去黄芩此宜隨症而加減之也前人全用藥以其前症悉備故用三陽標藥治之經曰治病必求其本是也亁薑黄連黄芩人參湯方見本湯傷寒本自寒下醫復吐下之寒格更逆吐下者主之原文白頭翁湯白頭翁二兩秦皮黄連黄栢三兩熱利下重者白頭翁湯主之原文下同下利欲飲水者以有熱故也白頭翁湯主之四逆加人參湯本方加人參一兩問曰病發熱頭痛身疼惡寒吐利者此属何病荅曰此為霍亂自吐下又利止復更發熱也惡寒脉微而復利利止亡血也四逆加人參湯主之原文理中丸本方等分蜜丸霍亂頭疼發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之原文大病瘥後喜唾久不了了者胃上有寒當以丸藥温之宜理中丸原文通脉四逆加猪膽汁湯以白通湯加人尿猪膽汁吐已下斷汗出而厥四肢拘急不解脉微欲絶者主之原文燒裩散即裩襠燒灰也傷寒陰陽易之為病其人身體重少氣少腹裏急或引陰中拘攣熱上冲胸頭重不欲舉眼中生花膝脛拘急者燒裩散主之原文取此物者亦以病因於陰陽感召而得故亦以陰陽之理治之又且五味入口鹹入腎腐入腎穢入腎乃濁陰歸地之意也加襠味鹹而腐故能入少陰燒之則温故足以化氣化之則濁故足以入膀胱經曰濁陰歸六腑是也藥物雖陋而用意微枳實梔子豉湯枳實梔子十四枚淡豉四合大病瘥後勞復者枳實梔子豉湯主之若有宿食者大黄如碁子大五六枚原文漿水湯漿水味甘酸而性凉善走故解煩渇化滯物其法以炊粟水熱投冷水中五六日味酸生白花色類漿故名若浸至敗者害人牡蠣澤㵼散大病瘥後從腰以下有水者主之原文自明是書也學精天地人事備儒仙佛所以語皆見孔統症藥方以入微字可針茅超前後今而擅美向猶患於四卷之秘未竭先生之藏茲獲訂與諸篇並行誠斯世之幸但期觀者玩其詞必盡索其觧勿僅大意之求用者得其㫖於以大其施無等陳言之視始克驅除百病不負先生種橘之苦心庶幾𢎞濟羣生俾慰吾友授梓之隠念云右海昏愚山堂後學周瑞冠多氏謹識尚論後篇卷四
