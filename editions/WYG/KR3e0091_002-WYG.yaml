body:
  text: 尚論篇卷二新建喻昌撰尚論陽明經證治大意傷寒之證無如太陽一經風寒參錯表裏差殊難於辨認昌分三篇先列鄙語以引其端後隨仲景原文闡其立言精意俾業醫者得其門而入庶足以窺其富美也而陽明一經之病治之尤難盖胃為水穀之海五臟六府之大源多氣多血之術乃吉凶死生所攸闗仲景著論精詳後人讀之憒憒今僣為尚論請得而要言之也夫陽明者胃也陽明以胃實為正胃實則皆下證也然陽明之邪其來路則繇太陽凡陽明證見八九而太陽證有一二未罷即従太陽而不従陽明可汗而不可下也其去路則趨少陽凡陽明證縦見八九而少陽證畧見一二即従少陽而不従陽明汗下兩不可用也惟風寒之邪已離太陽未接少陽恰好在陽明界内之時用藥亟為攻下則渙然氷釋而不再傳他經津液元氣兩無虧損何快如之此等機㑹間不容髮庸愚無識妄守顓門必俟七日𫝊經已盡方敢言下縦不危殆而津液元氣所喪滋多矣況太陽一經早有十餘日不解者若不辨經而但計日其誤下仍在太陽至陽明二三日内即顯下證反以計日當面錯過及陽明已趨少陽又以計日妄行攻下乃至少陽復轉陽明更全不識其證以至熱邪在胃爍盡津液輕者重而重者死矣所關顧不鉅耶謹將陽明之證亦比太陽之例分為三篇俾觀者了無疑惑斯臨病不致差誤耳陽明經上篇凡外邪初入陽明地界未離太陽淨盡者謂之太陽陽明列於此篇太陽與陽明兩經各半謂之合病兩經連串謂之併病另自名篇於三陽經後不在此例此乃邪入陽明而太陽將盡未盡之證也一陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯原文二陽明病脈浮無汗而喘者發汗則愈宜麻黄湯原文仲景此二條之文前條云風未解後條即不云寒未解者互文也前條云宜發汗後條云發汗則愈者亦互文也盖外邪初入陽明用桂枝湯解肌則風邪仍従衛分出矣用麻黄湯發汗則寒邪仍従營分出矣營分之邪深於衛分且従外出而愈則衛分更不待言矣論中每用互文處其妙義大率若此三陽明病能食者為中風不能食者為中寒原文風則傷衛寒則傷營一定之理是則足三陽經太陽行身之背陽明行身之前少陽行身之側皆可言營衛受邪何仲景於陽明經但以能食不能食分風寒而不以營衛分風寒耶盖營衛交㑹於中焦論其分出之名則營為水穀之精氣衛為水穀之悍氣論其同出之源混然一氣何繇分其孰為營孰為衛哉惟風為陽陽能消榖故能食寒為隂隂不能消穀故不能食以此而辨風寒之邪庶幾確然有據耳仲景析義之精若此如習矣不察者何四脈陽微而汗出少者為自和也汗出多者為太過陽脈實因發其汗出多者亦為太過太過為陽絶於裏亡津液大便因鞕也原文陽微者中風之脈陽微緩也陽實者傷寒之脈陽𦂳實也陽絶即亡津液之互辭仲景毎於亡津液者悉名無陽本文絶陽於裏亡津液大便因鞕甚明註家認作汗多而陽亡於外大謬傷寒發太陽膀胱經之汗即當顧慮陽氣以膀胱主氣化故也發陽明胃經之汗即當顧慮隂津以胃中藏津液故也所以陽明多有熱越之證謂胃中津液隨熱而盡越於外汗出不止耳然則陽明證不論中風傷寒脈微脈實汗出少而邪將自解汗出多則隂津易致竭絶業醫者可不謹持其柄而用重劑發汗以刼人之津液耶觀仲景於太陽發汗之重劑以青龍名之可見亢旱得之則為甘霖若淫雨用之則沈竈産蛙傷禾害稼有載胥及溺已耳此陽明所以有桂枝麻黄湯證而無大青龍湯證也噫微矣哉五問曰陽明病外證云何荅曰身熱汗自出不惡寒反惡熱也原文以此辨陽明中風之外證正兼太陽也六問曰何縁得陽明病荅曰太陽病若發汗若下若利小便此亡津液胃中乾燥因轉屬陽明不更衣内實大便難者此名陽明也原文以此辨陽明中風之裏證此屬正陽陽明可下當置中篇以全文不便分割讀者識之可也七問曰病有一日得之不發熱而惡寒者何也荅曰雖得之一日惡寒將自罷即自汗出而惡熱也原文以此辨陽明傷寒之外證正兼太陽也八問曰惡寒何故自罷荅曰陽明居中土也萬物所歸無所復𫝊始雖惡寒二日自止此為陽明病也原文以此辨陽明傷寒之裏證此屬正陽陽明可下已上八條見仲景於太陽𫝊入陽明之證其辨認之法即少變太陽之定例矣盖太陽有營衛之兩路風則傷衛寒則傷營而陽明則營衛難以辨别辨之全藉於脈與證風邪之脈𫝊至陽明則緩去而遲在寒邪之脈𫝊至陽明則𦂳去而浮在風邪之脈輕髙而上前者風邪本微殊無内向之意雖汗出少而不為過也寒邪之脈已至於實則將去太陽而成可下之證故發其汗太多反為過也如此辨别讀者猶不心花開朗耶至其辨證則以能食不能食為諦盖陽邪能化穀隂邪不能化穀之義也又設四問以辨風寒之在表在裏而定汗下之權衡何其明且盡耶繇是推之病已𫝊經而太陽邪有未盡其用桂枝麻黄二湯即當狹小其制不可使太過明矣太陽邪已盡其用承氣諸湯即當竭蹶従事不可使不及又明矣問經言一脈分為二病謂營衛不同也是則十二經脈中以營衛之故分為二十四病矣乃仲景於陽明一經獨以能食不能食分營衛至於少陽以後更不申營衛之辨其義何居荅曰明哉問也道之原也叔和以後諸賢俱有未徹果識各經皆有營衛曷為將仲景少陽經之文編入太陽經中乎後人更添蛇足謂邪至陽明則已過營衛無復可言果爾則邪至少陽與三隂其過營衛不更逺乎靈樞謂營氣起於中焦衛氣起於下焦而行至中焦是則中焦胃中正是營衛所起之源混然未分而外入之風寒自難辨别也至於少陽以下諸經内經明有一脈分為二病之㫖仲景可以不贅况始先中衛其𫝊經必不轉中于營始先中營其𫝊經必不轉中於衛然則能食為中風不能食為中寒自可繇陽明而類推三隂各經矣此等處須細心體㑹畧一鹵莽謬迷多矣九本太陽病初得時發其汗汗先出不徹因轉屬陽明也原文發其汗兼解肌發汗二義汗出不徹則未得如法故邪不服而轉入陽明也若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下節文全文見陽明中篇表未解而腹大滿則裏亦急故用小承氣湯十太陽病若吐若下若發汗微煩小便數大便因鞕者與小承氣湯和之愈原文微煩小便數大便因鞕皆是邪漸入裏之機故用小承氣湯和之是變不可下之例然曰和則與用下之意不同矣十一傷寒吐後腹脹滿者與調胃承氣湯原文吐後而腹脹滿則邪不在胸其為裏實可知然但脹滿而不痛自不宜用急下之法少與調胃承氣可耳此亦和法非下法也觀正陽陽明篇中腹滿不減減不足言如是之急者止言當下自可類推十二陽明病心下鞕滿者不可攻之攻之利遂不止者死利止者愈原文心下鞕滿邪聚陽明之隔正兼太陽也故不可攻攻之利不止則邪氣未盡真氣先脫故主死也利止則邪去而真氣猶存故自愈也十三傷寒嘔多即有陽明証不可攻之原文嘔屬太陽嘔多則太陽未除縦有陽明諸症在所不計故戒攻下十四食穀欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上焦也原文此條復辨嘔有太陽亦有陽明本自不同若食穀欲嘔則屬胃寒與太陽之惡寒嘔逆原為熱症者相逺正恐悞以寒藥治寒嘔也然服吳茱萸湯轉劇者仍屬太陽熱邪而非胃寒明矣十五陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而𦂳若下之則腹滿小便難也原文此條陽明中風俱該傷寒而言俱太陽未除之候但以腹滿一端知為熱入陽明然終與大實大滿不同若悞下則外邪乗虚内陷而腹愈滿矣小便難者亡津液也十六陽明病脈浮而𦂳咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則燥心憒憒反讝語若加燒鍼必怵惕煩燥不得眠若下之則胃中空虚客氣動膈心中懊憹舌上胎者梔子豉湯主之若渴欲飲水口乾舌燥者白虎加人參湯主之若脈浮發熱渴欲飲水小便不利者猪苓湯主之原文發熱以上與前條同而汗出不惡寒反惡熱身重四端則皆陽明之見症所以汗下燒鍼俱不可用而舌上胎則膈熱甚故湧以梔子鼔而徹去其膈熱則治太陽而無碍陽明矣若前症更加口亁舌燥則宜用白虎湯以解熱生津更加小便不利則宜用猪苓湯以導熱滋亁也十七陽明病汗出多而渴者不可與猪苓湯以汗多胃中燥猪苓湯復利其小便故也原文太陽症中有用五苓散兩解表裏一法矣而太陽入陽明症中復有猪苓湯導熱滋亁一法然汗出多而渴者不可服盖陽明胃經主津液者也津液充則不渴津液少則渴矣故熱邪𫝊入陽明必先耗其津液加以汗多而奪之於外復利其小便而奪之於下則津液有立亡而已故示戒也十八太陽病寸緩闗浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也若其不下者病人不惡寒而渴者此轉屬陽明也小便數者大便必鞕不更衣十日無所苦也渴欲飲水者少少與之但以法救之渴者宜五苓散原文寸緩闗浮尺弱發熱汗出復惡寒純是太陽未罷之症也設非悞下何得心下痞結耶如不悞下則心下亦不痞而太陽症必漸𫝊經乃至不惡寒而渴邪入陽明審矣然陽明津液既偏滲於小便則大腸失其潤而大便之鞕與腸中熱結自是不同所以旬日不更衣亦無苦也以法救之救其津液也與水及用五苓即其法也五苓利水者也其能止渴而救津液者何也盖胃中之邪熱既隨小水而滲下則利其小水而邪熱自消矣邪熱消則津囬而渴止大便且自行矣正内經通因通用之法也前段汗出多而渴者不宜用猪苓湯重驅津液此段仍有汗仍渴但汗出不至於多而渴亦因熱熾其津液方在欲耗未耗之界故與水而用五苓為合法也今世之用五苓者但知水穀偏注於大腸用之利水而止泄至於津液偏滲於小便用之消熱而囬津者則罕故詳及之十九陽明病脈浮而𦂳者必潮熱發作有時但浮者必盜汗出原文陽明脈之浮𦂳即太陽寒傷營之脈也單浮即太陽風傷衛之脈也但𫝊至陽明仲景不欲以營衛辨症而姑變其文耳至於太陽症有未罷各條雖悉尚恐未明再舉潮熱及盜汗陽明之必至者辨之確然無疑矣従前註解皆是斷章取義而不㑹其大意不知脈𦂳與潮熱脈浮與盜汗非的對之症也不過藉以辨陽明八九太陽一二之候耳至謂浮為陽盛陽盛則隂虚隂虛則盜汗出節外生枝幾于說夢矣二十陽明中風脈弦浮大而短氣腹都滿脇下及心痛久按之氣不通鼻亁不得汗嗜卧一身及面目悉黄小便難有潮熱時時噦耳前後腫刺之小差外不解病過十日脈續浮者與小柴胡湯脈但浮無餘症者與麻黄湯若不尿腹滿加噦者不治原文此條陽明中風之症居七八而中寒之症亦居二三觀本文不得汗反用麻黄湯其義自見也然此一症為陽明第一重症何以知之太陽症既未罷而少陽症亦兼見是陽明所主之位前後皆邪而本經之瀰滿流連更不待言矣盖陽明脈本大兼以少陽之弦太陽之浮則陽明之大正未易衰也腹滿鼻亁嗜卧一身面目悉黄潮熱陽明之症既盡見兼以少陽之脇痛太陽之膀胱不利乃至時時噦耳前後腫則陽明之諸症正未易除也所以病過十日外症不解必審其脈症或可引陽明之邪従少陽出則用小柴胡湯或可引陽明之邪従太陽出則用麻黄湯方合法若不尿腹滿加噦則真氣垂盡更無力可送其邪故知藥不能治也二十一陽明病脈遲食難用飽飽則微煩頭眩必小便難此欲作穀癉雖下之腹滿如故所以然者脈遲故也原文脈遲則表症將除似乎可下然得食而微煩仍是外邪助其内熱也熱蒸食而上攻故頭眩小便必難者濕熱土攻水道必不順也欲作穀癉者水穀之濕得熱蒸而四迄遍身發黄勢所必至下之腹滿如故病既未除其脈之遲者愈益難復故以為戒註謂下之則外邪内陷殊不切要盖腹滿已是邪陷寧俟下之始陷耶所以然者脈遲則胃不實徒下其糟粕不惟無益而反害之耳然則脈復其常然後膀胱之氣化行濕熱自除穀癉自退又不言可知矣二十二陽明病若中寒不能食小便不利手足濈然汗出此欲作固瘕必大便初鞕後溏所以然者以胃中冷水穀不别故也原文註謂固為堅固瘕為積聚大謬盖大便初鞕後溏因成瘕泄瘕泄即溏泄久而不止則曰固瘕也二十三陽明病初欲食小便反不利大便自調其人骨節疼翕然如有熱狀奄然發狂濈然汗出而解者此水不勝穀氣與汗共併脈𦂳則愈原文此段文義本明註謂得汗則外邪盡解脈𦂳且愈全非本文來意觀上二條一以小便少而成穀癉是濕熱繇胃上攻胸腦則頭眩而身發黄一以小便不利而成固瘕是濕熱繇胃下滲大腸則手足汗出而成溏泄此條小便反不利本當成穀癉及瘕泄之症况其人骨節疼濕勝也翕然如有熱狀熱勝也濕熱交勝乃忽然發狂濈然汗出而解者何以得此哉此是胃氣有權能驅陽明之水與熱故水熱不能勝與汗共併而出也脈𦂳則愈言不遲也脈𦂳疾則胃氣强盛所以肌肉開而濈然大汗若脈遲則胃中虚冷偏滲之水不能透而為汗即手足多汗而周身之濕與熱又未能共併而出此胃强能食脈健之人所以得病易愈耶二十四陽明病不能食以其熱必噦所以然者胃中虚冷故也以其人本虚故攻其熱必噦原文之攻熱謂寒下藥也二十五脈浮而遲表熱裏寒下利清穀者四逆湯主之若胃中虚冷不能食者飲水則噦原文表熱裏寒法當先救其裏太陽經中下利不止身疼痛者已用四逆湯不為過其在陽明之表熱不當牽制更可知矣此病比前一條虚寒更甚故不但攻其熱必噦即飲以水而亦噦矣前云能食者為中風不能食者為中寒矣此上五條一云食難用飽一云欲食似乎指中風為言一云中寒不能食及後二條之不能食又明指中寒為言所以後人拘執其說而悞為註釋也不知此五條重舉風寒症中之能食不能食辨胃氣之强弱非辨外邪也故五症中惟水不勝穀氣脈𦂳則愈一症為胃氣勝其四條俱是脈遲胃冷反為水熱所勝之症夫陽寒之症皆熱症也而其人胃中虚冷者又去可一例而推盖胃既虚冷則水穀混然無别熱邪𫝊入必不能遽變為實也胃不實則不可下而熱邪既入轉蒸水穀之氣蘊崇為病即下之而水熱不去徒令胃氣垂絶而作噦耳仲景一一挈出而於後條下利清穀一症主之以四逆湯則前條之較輕者宜主之以溫胃更不待言惟合五條而總㑹其立言之意始不至於𫝊訛耳門人問濈然汗出而病解乃手足濈然汗出者反作固瘕何手足不宜於汗耶荅曰前代之業毉者皆極大聰明學問之人故仲景書為中人以上舉一隅能以三隅反者設也胃氣虚寒之人外邪入之必轉増其熱胃熱故膀胱亦熱氣化不行小便因之不利小便不利而盡注於大腸則為洞泄即末條之下利清穀者是也小便不利乗胃熱而滲於脾則四肢先見色黄乃至遍身發黄而成穀癉者是也今手足濈然得汗則脾中之濕熱行而色黄穀癉之患可免但汗従手足而出水熱之氣未得遍泄於週身不過少分大腸奔迫之勢故不為洞泄而為瘕泄耳無病之人小便不行尚漬為他病况傷寒症極赤極熱之小便停蓄不行能無此三種之變耶一遡其源而輕重自分矣二十六陽明病但頭眩不惡寒故能食而咳其人必咽痛若不欬者咽不痛原文此胃熱協風邪而上攻之症也二十七陽明病法多汗反無汗其身如蟲行皮中狀者此以久虛故也原文此胃熱協寒邪而鬱於肌膚之症也言久虚者明所以不能透出於肌表之故也非謂當用補也二十八陽明病反無汗而小便利二三日嘔而欬手足厥者必苦頭痛若不欬不嘔手足不厥者頭不痛原文陽明症本不頭痛若無汗嘔咳手足厥者得之寒因而邪熱深也然小便利則邪熱不在内而在外不在下而在上故知必苦頭痛也若不欬不嘔不厥而小便利者邪熱必順水道而出豈有逆攻巔頂之理哉二十九陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯主之原文下之而外有熱心中懊憹飢不能食幾成結胸矣然手足溫則陽氣未至傷陷不結胸則外邪原屬輕微若其人頭汗出者亦是膈中鬱熱上蒸所致宜因其髙而揚之用梔子豉湯以徹其熱則陽得下通於隂而週身濈然汗解并可知矣此二條皆濕熱上攻之症三十陽明病口燥但欲漱水不欲嚥此必衂原文口中亁燥與渴異漱水不欲嚥知不渴也陽明氣血俱多以潄水不欲嚥知邪入血分陽明之脈起於鼻故知血得熱而妄行必繇鼻而出也三十一脈浮發熱口亁鼻燥能食者則衂原文脈浮發熱口亁鼻燥陽明邪熱熾矣能食為風邪風性上行所以衂也三十二陽明病發熱汗出者此為熱越不能發黄也但頭汗出身無汗劑頸而還小便不利渴飲水漿者此為瘀熱在裏身必發黄茵陳蒿湯主之原文三十三陽明病面合赤色寒可攻之必發熱色黄小便不利也原文三十四陽明病無汗小便不利心中懊憹者身必發黄原文三十五陽明病被火額上微汗出小便不利者必發黄原文合四條觀之陽明病濕停熱鬱而煩渴有加勢必發黄然汗出熱従外越則黄可免小便多熱従下泄則黄可免若悞攻之其熱邪愈陷津液愈傷而汗與小便愈不可得矣悞火之則熱邪愈熾津液上奔額雖微汗而週身之汗與小便愈不可得矣發黄之變安能免乎發黄與前穀癉本同一症但彼因脈遲胃冷而得則與固瘕及噦同源而與此異派三十六陽明病下血讝語者此為熱入血室但頭汗出者刺期門隨其熱而瀉之濈然汗出則愈原文婦人病傷寒經水適來適斷則邪熱乗之而入于血室讝語如見鬼狀當刺期門乃男子陽明經病下血而讝語者亦為熱入血室亦刺期門詳後少陽篇末三十七陽明症其人喜忘者必有畜血所以然者本有久瘀血故令喜忘屎雖鞭大便反易其色必黒宜抵當湯下之原文水陽經熱結膀胱之症輕者如狂重者發狂如狂者血自下但用桃核桂枝加入承氣湯因勢利導血去則愈發狂者血不下須用抵當湯亟下其血乃愈詳太陽上篇此條陽明喜忘之症本差減於如狂乃用藥反循發狂之例者何耶盖太陽少血陽明多血陽明之血一結則較太陽更為難動所以宜用抵當湯峻攻之法耳但太陽云主之則確乎不易此云宜用則症有輕重不等在于臨時酌量矣三十八病人無表裏症發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消穀善飢至六七日不大便者有瘀血也宜抵當湯若脈數不解而下利不止必協熱而便膿血也原文雖云無表裏症然發熱則浮數表症尚在也其所以可下者以七八日為時既久而發熱脈數則胃中熱熾津液盡亡勢不得不用下法如大柴胡湯之類是也若下後脈數不解可知果胃中熱熾其候當消穀善飢然穀食既多則大便必多乃至六七日竟不大便其症非氣結而為血結明矣所以亦宜於抵當湯也若數不解而下利不止註謂用抵當湯下之數仍不解大謬此乃對假令已下脈數不解五句之文見已下脈數不解反六七日不大便則宜抵當以下其血若已下脈數不解而下利不止則不宜抵當之峻但當消息以清其血分熱邪若血分之邪不除必協熱而便膿血矣合三條總是熱入血室故隨下血與不下血而異治也然要知陽明尚兼太陽則不但胃中熱熾而膀胱隨經之熱亦未盡解此所以宜於抵當湯乎三十九病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈浮虚者宜發汗下之與大承氣湯發汗宜桂枝湯原文病人得汗後煩熱解太陽經之邪將盡未盡其人復如瘧狀日晡時發熱則邪入陽明審矣盖日晡者申酉時乃陽明之王時也發熱即朝熱乃陽明之本候也然雖已入陽明尚恐未離太陽故必重辨其脈脈實者方為正陽陽明宜下之若脈浮虚者仍是陽明而兼太陽更宜汗而不宜下矣發汗宜桂枝湯宜字最妙見前既得汗而煩熱解此畨只宜用桂枝和營衛以盡陽明兼帶之邪斷不可悞用麻黄湯矣陽明經中篇凡外邪已離太陽未接少陽謂之正陽陽明列於此篇凡外感之邪全入陽明所轄地界已離太陽未接少陽此際當用下法確無疑矣然其邪復有在經在府之不同在經者與太少為隣仍是𫝊經之邪在府者則入於胃而不𫝊經但在經者之用下常恐胃有未實篇中無限消息遲􅆦若在府則胃已大實惟有急下以存津液而已一陽明之為病胃家實是也原文以胃家㝠揭正陽陽明之總見邪到本經遂入胃而成胃實之症也不然陽明病其胃不實者多矣於義安取乎二傷寒三日陽明脈大原文傷寒一日太陽二日陽明三日少陽乃𫝊經之次第其實不以日拘也此云三日陽明脈大正見二日之陽明𫝊自太陽必兼乎浮𦂳浮緩未定是正陽陽明也若正陽陽明氣血俱多其脈必大而與太陽别矣言外見三日症兼少陽則其脈必大而弦又不得為正陽陽明也噫微矣哉三傷寒發熱無汗嘔不能食而反汗出濈濈然者是轉屬陽明也原文四傷寒轉繫陽明者其人濈濈然微汗出也原文濈濈者肌肉開而微汗不乾之貌發熱無汗嘔不能食皆傷寒之症也傷寒無汗何以反濈濈汗出耶可見症已轉屬正陽陽明矣既濈然汗出則熱除嘔止可知矣五太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之原文蒸蒸者熱勢自内騰達於外如蒸炊然胃實之騐也其熱蒸蒸勢必其汗濈濈矣妙哉形容乎惟熱在胃故用承氣以調其胃胃調則病渙然除矣六陽明病本自汗出醫更重發汗病已差尚微煩不了了者此大便必鞕故也以亡津液胃中乾燥故令大便鞕當問其小便日幾行若本小便日三四行今日再行故知大便不久出今為小便數少以津液當還入胃中故知不久必大便也原文七陽明病自汗出若發汗小便自利者此為津液内竭雖鞕不可攻之當須自欲大便宜蜜煎導而通之若土𤓰根及與大猪膽汗皆可為導原文八陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裏也手足濈然而汗出者此大便已鞕也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下原文陽後半節入明上篇脈遲汗出不惡寒身重短氣腹滿喘潮熱入者乃陽明之外邪欲解可以攻裏而不為大悞之候也然曰欲解曰可攻不過用小承氣及調胃承氣之法耳必手足濈然汗出方可驗胃實便鞕外邪盡解而當従大承氣急下之法也申酉戌間獨熱餘時不熱者為潮熱若汗多微發熱惡寒是陽明證尚兼太陽縦腹大滿胃終不實只可微和胃氣以従權而已九病人不大便五六日繞臍痛煩燥發作有時者此有燥屎故使不大便也原文十大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有㝛食故也宜大承氣湯原文十一病人小便不利大便乍難乍易時有微熱喘冐不能卧者有燥屎也宜大承氣湯原文十二陽明病潮熱大便微鞕者可與大承氣湯不鞕者不可與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎乃可攻之若不轉失氣此但初頭鞕後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便鞕而少也以小承氣湯和之不轉失氣者慎不可攻也原文轉失氣者屁出也腹中之氣得攻藥不為轉動則屬虚寒所以悞攻而症變脹滿不能食及噦也攻後重復發熱又是胃熱至此方熾大便因可得鞕但為時未久必少耳仍以小承氣湯和之若腹中氣仍不轉則不但用大承氣大差即用小承氣亦小差矣十三陽明病下之心中懊憹而煩胃中有燥屎者可攻腹微滿初頭鞕後必溏不可攻之若有燥屎者宜大承氣湯原文以小承氣湯試其可下而用大承氣湯下之矣設下後心中懊憹而煩又屬熱重藥輕當再進大承氣以協濟前藥亟驅熱邪則悶煩自解也一云胃中有燥屎者一云若有燥屎者俱指試其轉失氣及繞臍痛腹滿痛小便不利煩燥時有微熱喘冒不能卧七證言也十四得病二三日脈弱無太陽柴胡證煩燥心下硬至四五日雖能食以小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯原文無太陽少陽之證則煩燥心下硬屬正陽陽明之可下無疑矣乃其人脈弱雖是能食亦止可少用小承氣微和胃氣和之而當必覺小安俟隔日再以小承氣稍稍多進總因脈弱故爾遲徊也至六七日竟不大便似乎胃實乃小便復少正恐胃弱而膀胱氣化之源窒轉滲大腸初硬後溏耳所以小便利屎定硬乃可攻之此段之雖能食雖不能食全與辨風寒無涉另有二義見雖能食者不可以為胃强而輕下也雖不能食者不可以為胃中有燥屎而輕下也後九條云讝語有潮熱反不能食者胃中必有燥屎五六枚與此五發前後註釋俱差十五陽明病不吐不下心煩者可與調胃承氣湯原文胃氣及津液既不繇吐下而傷則心煩明係胃中熱熾故可與調胃承氣以安胃氣而全津液也合九條總是以外證之解與不解氣之轉與不轉臍腹之痛與不痛脈之弱與不弱汗出之多與不多小便之利與不利邪熱之熾與不熾津液之乾與不乾而辨腹中之燥屎多與不多溏與不溏以消息微下之法故惟手足濈然汗出大便已硬者主之以大承氣湯其他諸證一則曰宜用導法再則曰不可攻之再則曰宜小承氣湯再則曰少與小承氣湯再則曰明日更與一升再則曰宜大承氣湯全是商量治法聽人臨時斟酌以祈無悞所以不用主之二字此等處關係安危最大盖熱邪入胃不以寒藥治之則胃傷然寒藥本以救胃也不及則藥不勝邪太過則藥反傷正况乎不勝其邪勢必盡傷其正徒傷其正又未必盡去其邪此仲景所為諄復於二者之間耶十六陽明病讝語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉失氣者更服一升若不轉失氣勿更與之明日不大便脈反微澀者裏虚也為難治不可更與承氣湯也原文讝語而發潮熱陽明之下證審矣更兼其脈滑疾復與脈弱者不倫故主之以小承氣湯一定之法也然尚未知其裏證若何必轉失氣方可再服若服後不轉失氣并不大便脈反微而且澀又是裏氣虚寒之證盖陽明居於中土其表虚表實來自太陽至此已明其裏虚裏實茫然未卜故用法不可令虚者益虚有如此之鄭重也十七夫實則讝語虚則鄭聲鄭聲重語也原文鄭聲者鄭重之聲正氣不足聲出重濁也亦辨裏實裏虛之一端也十八直視讝語喘滿者死下利者亦死原文此條當㑹意讀謂讝語之人直視者死喘滿者死下利者死其義始明盖讝語者心火亢極也加以直視則腎水垂絶心火愈無制故主死也喘滿者邪聚陽位而上争正不勝邪氣従上脫故主死也下利者邪聚隂位而下奪正不勝邪氣従下脫故主死也十九發汗多若重發汗者亡其陽讝語脈短者死脈自和者不死原文註擬此為太陽經脫簡不知太陽經無讝語之例必日久而兼陽明少陽方有讝語故此言太陽經得病時發汗過多及𫝊陽明時重發其汗亡陽而讝語之一證也亡陽之人所存者隂氣耳故神魂無主而妄見妄聞與熱邪乗心之候不同况汗多則大邪必従汗解止慮陽神飛越難返故脈短則隂陽不附脈和則隂陽未離其生死但従脈定耳其脈既短安問藥之長哉門人問亡陽而讝語四逆湯可用乎荅曰仲景不言方而子欲言之曷不詳之仲景耶盖亡陽固必急囬其陽然邪𫝊陽明胃熱之熾否津液之竭否裏證之實否俱不可知設不辨悉欲囬其陽先竭其隂竟何益哉此仲景不言藥乃其所以聖也然得子此問而仲景之妙義愈彰矣二十陽明病其人多汗以津液外出胃中燥大便必鞕鞕則讝語小承氣湯主之若一服讝語止更莫復服原文此條舉讝語之因汗多津越者為言二十一傷寒四五日脈沈而喘滿沈為在裏而反發其汗津液越出大便為難表虚裏實久則讝語原文此舉讝語因悞汗而致者其曰裏實亦即上文胃中燥大便必鞕之互辭其不出方者亦即上文小承氣湯之互意也二十二傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱讝語者大承氣湯主之若一服利止後服原文此條舉讝語之勢重者為言而勢重之中復分二等劇者生死仍憑乎脈微者則主以大承氣湯比上條之小承氣為更進矣前云讝語脈短者死此云脈弦者生前云讝語脈滑疾者用小承氣此云脈澀者死更互一字而大意躍然三十三汗出讝語者以有燥屎在胃中此為風也須下之過經乃可下之下之若早語言必亂以表虛裏實故也下之則愈宜大承氣湯原文此條之文似淺而實深仲景懼人不解已自為註脚不識後人何故茫然胃有燥屎本當用下以讝語而兼汗出知其風邪在胸必俟過經下之始不増擾所以然者風性喜行數變下之若早徒引之走空竅亂神明耳然胃有燥屎下之不為大悞其小悞止在未辨證兼乎風若此者必再一大下庶大腸空而風邪得以併出故自愈此通因通用之法亦將差就錯之法也二十四陽明病讝語有潮熱反不能食者胃中必有燥屎五六枚也若能食者但鞕耳宜大承氣湯原文有燥屎則腸胃熱結故不能食若能食則腸胃未結故但鞕耳前條云其後發熱者必大便鞕而少也此云但鞕耳不更言其少乃於胃中有燥屎者言其五六枚之多亦互舉以辨微細之意不可忽也俱宜大承氣湯者已結者開其結未結者滌其熱不令更結同一讝語潮熱故同一治至於藥制之大小必有分矣合九條觀之既云實則讝語矣乃其用治遲徊審諦始以和法為攻法俟服藥後重辨脈證不敢徑情急攻即攻之又一服利止後服何其鄭重耶可見所謂實者乃邪氣實也邪氣實正氣未有不虚况津液為邪所耗而至於讝語方寸幾于無主其虚為何如哉邪實不可不下正虚不可太下斟酌於邪正之間以權宜而善其治良工苦心要當三復於聖言矣二十五陽明病發熱汗多者急下之宜大承氣湯原文胃中止一津液汗多則津液外滲加以發熱則津液盡隨熱勢蒸蒸騰達於外更無他法可止其汗惟有急下一法引熱勢従大腸而出庶津液不致盡越於外耳前條云發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之可見調胃之義乃和緩其胃中之熱以存津液也此證發熱而至於汗多明是始先未行調胃所致故宜急下無取緩調二十六發汗不解腹滿痛者急下之宜大承氣湯主之腹滿不減減不足言當下之宜大承氣湯原文發汗不解而反腹中滿痛則邪不在表而在裏亦惟有急下一法庶滿痛去而病自解也減不足言四字形容腹滿如繪見滿至十分即減去一二分不足殺其勢也此所以縦有外邪未解而當下無疑耳二十七傷寒六七日目中不了了睛不和無表裏證大便難身微熱者此為實也急下之宜大承氣湯原文此一條辨證最微細大便難則非久祕裏證不急也身微熱則非大熱表證不急也故曰無表裏證只可因是而騐其熱邪在中耳熱邪在中亦不為急但其人目中不了了睛不和則急矣以陽明之脈絡於目絡中之邪且盛則在經之盛更可知故惟有急下之而已按少隂經有急下三法以救腎水一本經水竭一木邪涌水一土邪凌水而陽明經亦有急下三法以救津液一汗多津越於外一腹滿津結於内一目睛不慧津枯於中合兩經下法以觀病情生理恍覺身在氷壺腹飲上池矣二十九陽明病欲解時従申至戌上原文三十脈浮而芤浮為陽芤為隂浮芤相摶胃氣生熱其陽則絶原文其陽則絶即無陽之互辭謂津液内亡也當下不下故至此耳三十一趺傷脈浮而濇浮則胃氣强濇則小便數浮濇相摶大便則難其脾為約麻仁丸主之脾約之證在太陽陽明已當用麻仁丸潤下失此不用延至正陽陽明胃中津液甕乾杯罄下無及矣然則浮濇之脈轉為浮芤不可類推乎詳見本卷末荅門人脾約問陽明經下篇凡外邪已趨少陽未離陽明謂之少陽陽明列於此篇凡屬正陽陽明之證病已入於胃腑故下之則愈其有胃不實而下證不具者病仍在經在經之邪不解必隨經而𫝊少陽口苦咽乾目眩耳聾胸脇滿痛之證必兼見一二故謂之少陽陽明其實乃是陽明少陽也少陽主半表半裏陽明證中纔兼少陽即表裏皆不可攻故例中止用和法少陽陽明合病另有顓條附三陽經後一陽明病發潮熱大便溏小便自可胸脇滿不去者小柴胡湯主之原文潮熱本陽明胃實之候若大便溏小便自可則胃全不實更加胸脇滿不去則證已𫝊入少陽矣纔兼少陽即有汗下二禁惟小柴胡一方合表裏中而總和之乃少陽一經之正法故陽明少陽亦取用之無别法也二陽明病脇下鞕滿不大便而嘔舌上白胎者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗出解也原文不但大便溏為胃未實即使不大便而見脇下鞕滿嘔與舌胎之證則少陽為多亦當従小柴胡湯分解隂陽則上下通和濈然汗出而胎嘔脇滿之外證一時俱解矣既云津液得下則大便自行亦可知矣此一和而表裏俱徹所以為貴也上焦得通津液得下八字闗係病機最切風寒之邪協津液而上聚于膈中為喘為嘔為水逆為結胸嘗十居六七是風寒不解則津液必不得下倘悞行發散不惟津液不下且轉増上逆之勢愈無退息之期矣此所以和之於中而上焦反通也至於雜病項中如痰火哮喘咳𠻳瘰癧等症又皆火勢薰蒸日久頑痰膠結經隧所以火不内熄則津液必不能下灌靈根而清華盡化為敗濁耳夫人之得以長享者惟賴後天水穀之氣生此津液津液結則病津液竭則死矣故治病而不知救人之津液者真庸工也論太陽陽明少陽陽明原有可下之證三問曰病有太陽陽明有正陽陽明有少陽陽明何謂也答曰太陽陽明者脾約是也正陽陽明者胃家實是也少陽陽明者發汗利小便已胃中燥煩實大便難是也原文註謂脾約乃太陽之邪徑趨入胃而成胃實貽悞千古詳後答門人問脾約論附少陽轉陽明二證此與陽明兼帶少陽之症迥殊故另揭出少陽陽明者發汗利小便已胃中燥煩實大便難是也陽明原文病已𫝊少陽經而去陽明經逺矣乃従少陽經治法發汗利小便已其人方纔胃中燥煩實大便難者是少陽重轉陽明而成可下之一證也服柴胡湯已渴者屬陽明也以法治之少陽原文上此條亦互上條之意解見少陽附太隂轉陽明一證傷寒脈浮而緩手足自溫者是為繫在太隂太隂者身當發黄若小便利者不能發黄至七八日大便硬者陽明病也太隂原文脈浮而緩本為表證然無發熱惡寒外候而手足自溫者是邪已去表而入裏其脈之浮緩又是邪在太隂以脾脈主緩故也邪入太隂勢必蒸濕為黄若小便自利則濕行而發黄之患可免但脾濕既行胃益亁燥胃燥則大便必硬因復轉為陽明内實而成可下之證也附少隂轉陽明一證少隂病六七日腹脹不大便者急下之宜大承氣湯少隂原文少隂之證自利者最多虚寒則下利清穀滑脫則下利膿血故多用溫法此以六七日不大便而腹脹可見熱邪轉歸陽明而為胃實之證所以宜於急下也附厥隂轉陽明之證下利讝語者有燥屎也宜小承氣湯厥隂原文下利則熱不結胃不實何得讝語耶此必邪返於胃内有燥屎故雖下利而結者自若也半利半結所以不宜大承氣而宜於小承氣微動其結耳附答客難大意客有熟仲景之書者難昌曰所分陽明三篇將仲景陽明證中七十四條収盡無遺大開後人眼目可謂智矣祗是過矜其智而掩昔賢之長鄙見微有不滿耳昌曰余何敢哉客曰王叔和當日編次陽明一經首列問有太陽陽明有正陽陽明有少陽陽明者何也仲景答曰太陽陽明者脾約是也正陽陽明者胃家實是也少陽陽明者發汗利小便已胃中燥大便難是也聖言煌煌子既遵其例何反後其文耶昌曰三段揭首叔和已悞曷可再悞昌分三篇不従兹起見也三篇舉以統括七十餘條之義若叔和所列不過是絶無僅有之一證以冠篇首則陽明一經之大㫖盡失此無難辨者盖當日之問乃問三陽經中可下之證所以答云太陽陽明之可下者除是脾約少陽陽明之可下者除是發汗利小便已胃中燥大便難舍此二證則太陽少陽必無一定之下法矣今分三篇以明太少二陽之不可下乃以可下之條混引其端昌之所不敢出也又况少陽陽明所謂發汗利小便已胃中燥大便難者乃是病邪已去陽明全入少陽及發汗利小便後少陽症亦盡罷其邪不入三隂重復轉到陽明所以名為少陽陽明與始先病在陽明畧兼少陽一二者有何干渉哉客始為之心折附答門人奇問門人問治傷寒之法軌則雖多必有精一之理可以貫徹終始者請吾師試舉一言以蔽之可乎余曰傷寒之變千蹊萬徑如之何其可以一言括耶門人曰如痘疹秘訣謂起先開盤時要有根脚有根脚則漿成及至灌膿時要無根脚無根脚則毒化此亦片言居要者吾師曷不倣而言之余笑曰若是則姑擬一言以答子之奇問亦無難者凡治傷寒之訣起先惟恐𫝊經𫝊經則變生其後惟恐不𫝊經不𫝊經則勢篤此二語不識可括其義否門人躊躇曰起先惟恐𫝊經韙矣其後惟恐不𫝊經之說太奇且太創未之前聞也余曰仲景言之再四但子輩雙眸未炯見同未見耳何奇創之有耶仲景云陽明居中土也萬物所歸無所復𫝊盖陽明之脈行身之前邪入其經則有前經後經相𫝊之次第而陽明之府乃中州之胃為水穀之海臟腑經脈之總司邪入其中則無復𫝊次之可言所以惟有下奪一法奪其土而邪自不留耳此仲景於陽明經内特挈不𫝊之妙理也又云陽明中風脈弦浮大而短氣腹都滿脇下及心痛久按之氣不通鼻乾不得汗嗜卧一身及面目悉黄小便難有潮熱時時噦耳前後腫刺之小差外不解過經十日脈續浮者與小柴胡湯脈但浮無餘證者與麻黄湯若不屎腹滿加噦者不治此一段至理千古無人看出總不識其所言者何事詎知脈弦浮大而氣反短連腹都滿者邪不𫝊也脇下及心痛乃至久按之氣不通者邪不𫝊也鼻亁不得汗嗜卧表裏俱困乃至一身及面目悉蒸為黄者邪不𫝊也小便難有潮熱時時噦者胃熱熾盛上下道窮邪不𫝊也耳前後腫刺之小差者内邪不𫝊乃至外抉其血亦不散但其腫小差也外不解過經十日留連極矣所謂萬物所歸無所復𫝊者原為美事孰知病邪歸之而不𫝊反成如此之危候耶要知陽明之邪來自太陽去自少陽所以脈續浮者與小柴胡湯推其邪使速往少陽去路也脈但浮無餘症者與麻黄湯推其邪使速還太陽來路也若不屎腹滿則胃邪内壅不下行矣而更加噦則胃氣將竭愈上逆矣再有何法可以驅其邪而使之𫝊哉又云太陽病十日已去脈浮細而嗜卧者外已觧也設胸滿脇痛者與小柴胡湯脈但浮者與麻黄湯見脈浮細而嗜卧邪已盡𫝊於外而解散者方可無慮設胸滿脇痛則當與小柴胡湯推之速往少陽而出設脈但浮無餘症則當與麻黄湯推之速往太陽而出是皆惟恐其邪之不𫝊暗伏危機也必識此意然後始識仲景用藥之故不然豈有十餘日後而無故張皇反用麻黄湯之理哉凡此皆因太少二陽與陽明連貫故用表法所謂従外入者驅而出之于外也復有表裏隂陽之間正已虚而邪不盡無可速𫝊之候仲景用法悉従外邪不能𫝊出起見如太陽病未解脈隂陽俱停必先振慄汗出而解設不振慄則邪不能𫝊之於表而無従得汗可知也然既云隂陽兩停其𫝊表𫝊裏未可預定所以惟陽脈微者方是邪不能𫝊表當従汗之而解惟隂脈微者方是邪不能𫝊裏當従下之而解此其故甚可思也若非邪住不傳之候則陽脈微者當補其陽隂脈微者當補其隂矣豈有反汗之而傷其陽下之而傷其隂之理哉又如太陽病過經十餘日及二三下之後四五日柴胡症仍在者先與小柴胡湯服之本當蒸蒸而振却發熱汗出而解矣乃反加嘔不止心下急鬱鬱微煩者此邪因屢下而入裏已深非一柴胡湯可以盡提之𫝊出于表必再與大柴胡湯分提表裏之邪陽邪𫝊陽隂邪𫝊隂一舉而分解之始為合法不然豈有嘔急鬱煩表症轉増反行兼解其裏之理哉又如傷寒五六日頭汗出微惡寒手足冷心下滿口不飲食大便鞕脈細者此為陽微結乃是說陽分之邪微微結聚不能𫝊出於表裏故本文即繼之曰必有表復有裏也其㫖甚明也末云可與小柴胡湯設不了了者得屎而解即前證過經十餘日用大小柴胡分提使𫝊之法也迺知舍此更無可使其𫝊矣又如發汗吐下後虚煩不得眠若劇者必反覆顛倒心中懊憹此邪退正虚而餘邪阻滯不能𫝊散以致無可奈何也此時將汗之乎下之乎和之乎溫之乎仲景巧用梔子豉湯湧載其餘邪於上俾一吐而盡𫝊無餘設非此一法従髙而越有殆而已矣又如云食穀則噦不能食攻其熱則噦欲飲水者與水則噦不能食者與水則噦何其言之不一耶皆是為胃氣虚寒餘邪不能𫝊散者致其叮嚀也更有穀癉一證邪熱在胃不能𫝊出反蒸食而發黄固瘕一證胃氣虚寒水停不行反滲大腸而瘕泄此三證者仲景但言證而不言治學者倘不透此一闗果何従而施治耶是則邪之𫝊與不𫝊所闗如此甚鉅乃治傷寒家初不量邪勢之淺深胃氣之厚薄而貿貿以従事也實繇先聖法則未經昔賢闡繹後學漫無入路耳夫足太陽膀胱足陽明胃足少陽膽皆府也何必獨歸陽明始不𫝊耶盖膀胱主出胃主納膽不主出納所以惟陽明胃為藏納之地具載物之體𫝊經之邪必歸陽明始能消之若夫胃土告困不能消邪則在府之邪漫無出路久之必漸漬於本經其脈必仍轉為浮所以仲景云脈續浮者與柴胡湯此中復有奥義其義維何即必有表復有裏之說也故用柴胡湯提出少陽俾循經次而𫝊太隂少隂厥隂以盡其邪乃始得以無患耳若但浮無餘證則是有表無裏只用麻黄湯提出太陽其邪立解不勞餘力矣得仲景之神者目擊道存即如天以四時成嵗中土各旺于季月之末然後木庇其根火收其焰金銷其肅水藏其瀾使非𫝊之中土則木火金水不相連貫何以化機盈眸不息乎人之飲食入胃清氣升而濁氣降渣滓不留者其妙惟在於𫝊設一日不𫝊則積滯而不能化矣至於仙家攅簇五行東三南二木火相戀歸于中土西四北一金水相親歸于中土其妙更在于不𫝊設𫝊則流散而不能造矣然則中土之𫝊與不𫝊足盡天人之藴又何疑于醫事哉門人爽然曰似此剔出傷寒神髓以立言數之可千推之可萬恍疑身陟天漢星津烱烱光芒流射肺腑矣請名之曰伐髓迪光論門人問脾約一症胃强脾弱脾不為胃行其津液如懦夫受其悍妻之約束寧不為家之索乎余曰何以見之曰仲景云趺陽脈浮而澀浮則胃氣强澀則小便數浮澀相摶大便為難其脾為約麻仁丸主之以是知胃强脾弱也余曰脾弱即當補矣何為麻仁丸中反用大黄枳實厚朴乎子輩日聆師說而腹笥従前相仍之陋甚非所望也仲景說胃强原未說脾弱况其所謂胃强者正是因脾之强而强盖約者省約也脾氣過强將三五日胃中所受之穀省約為一二彈丸而出全是脾土過燥致令腸胃中之津液日漸乾枯所以大便為難也設脾氣弱即當便泄矣豈有反難之理乎相𫝊謂脾弱不能約束胃中之水何以反能約束胃中之穀耶在陽明例中凡宜攻下者惟恐邪未入胃大便弗鞕又恐初鞕後溏不可妄攻若欲攻之先與小承氣試其轉失氣方可攻皆是慮夫脾氣之弱故爾躊躇也若夫脾約之症在太陽已即當下矣更何待陽明耶子輩傅㑹前人以脾約為脾弱將指吳起之殺妻者為懦夫乎有悖聖言矣門人又問曰今乃知脾約之解矣觸類而推太陽陽明之脾約與少陽陽明之胃中燥煩實大便難者同是一症此其所以俱可攻下耶余曰是未可言觸類也因難之曰邪熱自太陽而陽明而少陽為日既久爍其津液大便固當難矣其在太陽方病之始邪未入胃何得津液即便消耗而大腸燥結耶且太陽表邪未盡又何不俟𫝊經即亟亟潤下而自犯太陽之禁耶門人不能對因誨之曰脾約一症乃是未病外感之先其人素慣脾約三五日一次大便者乃至感受風寒即邪未入胃而胃已先實所以邪至陽明不患胃之不實但患無津液以奉其邪立至枯槁耳仲景大變太陽禁下之例而另立麻仁九一法以潤下之不比一時暫結者可用湯藥蕩滌之耳此義従前瞶瞶凡遇素成脾約之人亦必俟經盡方下百無一生矣故因子問而暢發之附問難門人大意暇日門人聚譚仲景製方之妙主伯亞旅天然一定因問曰仲景於太陽經中有兼帶陽明經者其風傷衛則桂枝湯中加葛根其寒傷營則麻黄湯中加葛根有兼帶少陽經者其風傷衛則桂枝湯中加柴胡其寒傷營則麻黄湯中加柴胡合併之病亦然是則陽明經以葛根為主藥少陽經以柴胡為主藥矣乃少陽經顓用小柴胡湯而陽明一經全不用葛根湯者何耶門人不能對因誨之曰此有二義太陽而畧兼陽明則以方來之陽明為重故加葛根陽明而尚兼太陽則以未罷之太陽為重故不用葛根且陽明主肌肉者也而用葛根太開其肌肉則津液盡従外泄恐胃愈燥而隂立亡故不用者所以存津液耳本經前條有云陽脈實因發其汗出多者亦為太過太過為陽絶于裏亡津液大便因鞕也是陽脈實者且不可過汗其陽脈微者又當何如耶仲景所以陽明諸症全不用葛根之意益彰彰矣小兒佈痘見㸃之時第一戒用葛根用之則肌竅盡開一齊擁出昔賢云見㸃之後忌用升麻湯以升麻湯中有葛根耳後人悞謂見㸃後忌用升麻至于葛根反恣用無忌只遺一湯字而葛根等兔脫升麻等雉罹兒命遭枉等恒河沙數矣因與治傷寒濫用葛根刼人津液者並舉示戒焉尚論篇卷二
